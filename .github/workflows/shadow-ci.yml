name: Shadow CI - Vibe Monitor

on:
  push:
    branches:
      - main
  # Optional: allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vibe-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Run Full-Spectrum Vibe Monitor
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY_SHADOW }}
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          uv run python3 tools/tools/scripts/vibe_monitor.py --coverage universal --budget-cap 10.0
