name: Shadow CI - Vibe Monitor

on:
  push:
    branches:
      - main
  # Optional: allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vibe-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Full-Spectrum Vibe Monitor
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY_SHADOW }}
        run: python3 tools/scripts/vibe_monitor.py --coverage universal --budget-cap 10.0
