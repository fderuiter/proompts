name: Repository Checks
# Validate prompt files, core logic, and UI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Run all checks via validator
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/validate_prompts.sh
