[tox]
envlist = py3, lint, mypy
skipsdist = true

[testenv]
deps = -rrequirements.txt
setenv =
    PYTHONPATH = {toxinidir}
commands =
    # Logic checks
    pytest {posargs:tests}
    
    # Custom scripts
    python3 tools/scripts/test_workflows.py
    python3 tools/scripts/check_prompts.py
    python3 tools/scripts/validate_prompt_schema.py
    python3 tools/scripts/governance_manifest_generator.py
    python3 tools/scripts/generate_overviews.py
    
    # Docs & Generation Check
    python3 tools/scripts/update_docs_index.py
    python3 tools/scripts/update_docs_index.py --check
    python3 tools/scripts/generate_docs.py
    python3 tools/scripts/generate_docs.py --check
    python3 tools/scripts/check_broken_links.py

[testenv:lint]
deps = -rrequirements.txt
commands =
    yamllint .

[testenv:mypy]
deps = -rrequirements.txt
commands =
    mypy --explicit-package-bases --ignore-missing-imports tools/scripts tests
