[tox]
envlist = py3, lint, mypy
skipsdist = true

[testenv]
deps = -rrequirements.txt
setenv =
    PYTHONPATH = {toxinidir}
commands =
    # Syntax and bypass checks
    python3 -c "import sys, glob; sys.exit(__import__('subprocess').call([sys.executable, 'scripts/check_bypasses.py'] + glob.glob('promptops/**/*.py', recursive=True) + glob.glob('tools/**/*.py', recursive=True)))"

    # Logic checks
    pytest {posargs:tests}
    
    # Custom scripts
    python3 tools/tools/scripts/test_workflows.py
    promptops validate --strict
    python3 tools/tools/scripts/governance_manifest_generator.py
    python3 tools/tools/scripts/generate_overviews.py
    
    # Docs & Generation Check
    promptops docs
    python3 tools/tools/scripts/check_broken_links.py

[testenv:lint]
deps = -rrequirements.txt
commands =
    yamllint .

[testenv:mypy]
deps = -rrequirements.txt
commands =
    mypy --ignore-missing-imports .
