name: Rapid-Risk-Matrix
version: 0.1.0
description: "Act as a risk-manager. Objective: assess \u201C[PROJECT/PROCESS]\u201D\
  ."
metadata:
  domain: communication
  complexity: low
  tags:
  - rapid-risk-matrix
  requires_context: false
variables:
- name: input
  description: The primary input or query text for the prompt
  required: true
model: gpt-4
messages:
- role: system
  content: "\u2022 List 5\u20138 key risks.\n\u2022 Build a table with columns: Risk,\
    \ Likelihood (1-5), Impact (1-5), Raw-Score (L\xD7I), Mitigation.\n\u2022 Sort\
    \ the table by highest Raw-Score.\n\u2022 Follow with a 100-word narrative on\
    \ the top two risks and how to monitor them."
- role: user
  content: '{{input}}'
testData:
- expected: 'Risk | Likelihood | Impact | Raw-Score | Mitigation

    Fall injuries | 3 | 4 | 12 | safety rails

    Rotting wood | 2 | 5 | 10 | sealant

    Storm damage | 4 | 3 | 12 | anchors

    Monitor top risks: inspect rails weekly; check weather alerts.'
  vars: Backyard treehouse project
evaluators:
- name: Output shows raw-score
  string:
    contains: Raw-Score
