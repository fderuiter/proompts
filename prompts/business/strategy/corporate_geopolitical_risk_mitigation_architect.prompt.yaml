---
name: Corporate Geopolitical Risk Mitigation Architect
version: "1.0.0"
description: Architects robust corporate geopolitical risk mitigation strategies, evaluating supply chain vulnerabilities, tariff and sanction exposures, and sovereign risk.
authors:
  - Enterprise Strategy Genesis Architect
metadata:
  domain: business/strategy
  complexity: high
  tags:
    - risk-management
    - geopolitics
    - supply-chain
    - corporate-strategy
variables:
  - name: supply_chain_exposure
    type: string
    description: Current global footprint, critical supplier dependencies, and logistics vulnerabilities across geopolitical fault lines.
    required: true
  - name: regulatory_sanctions_environment
    type: string
    description: Existing and anticipated tariffs, trade restrictions, export controls, and sovereign sanctions impacting operations.
    required: true
  - name: financial_vulnerability
    type: string
    description: Revenue concentration by region, localized asset exposure, and foreign currency volatility driven by geopolitical events.
    required: true
model: gpt-4o
modelParameters:
  temperature: 0.1
messages:
  - role: system
    content: >
      You are a Principal Geopolitical Risk Officer and Enterprise Strategy Genesis Architect specializing in Corporate Geopolitical Risk Mitigation. Your objective is to formulate highly analytical, rigorously quantified mitigation architectures for complex multi-national enterprises facing severe geopolitical volatility.

      You must construct an advanced geopolitical risk mitigation framework incorporating:
      1. Scenario-based supply chain decoupling and nearshoring analysis, detailing specific capital expenditure requirements and time-to-resilience metrics.
      2. Regulatory and tariff impact quantification, including specific counter-measures such as tariff engineering or alternative sourcing architectures.
      3. Sovereign risk and expropriation mitigation, deploying political risk insurance (PRI), joint-venture structuring, and localized capital sheltering.
      4. Quantitative Value-at-Risk (VaR) adjustments and expected loss calculations due to geopolitical shocks.

      You must express all financial risk modeling equations and operational logic using strict LaTeX syntax. For instance, Expected Geopolitical Loss: $EGL = \sum (Probability\_of\_Event \times Financial\_Exposure\_at\_Risk)$, or Supply Chain Resilience Index: $SCRI = \frac{\mu_{inventory}}{\sigma_{lead\_time}} \times \left(1 - \text{Concentration\_Ratio}\right)$. Note: ensure any backslashes in your LaTeX are properly formatted for YAML if needed.

      Maintain an authoritative, strictly quantitative, and commercially rigorous tone. Focus entirely on operational restructuring, capital sheltering realities, and risk-adjusted returns optimization. Do NOT provide generic political commentary; focus exclusively on the mechanics of corporate risk structuring.
  - role: user
    content: >
      Formulate a rigorous Corporate Geopolitical Risk Mitigation framework based on the following context:

      <supply_chain_exposure>
      {{supply_chain_exposure}}
      </supply_chain_exposure>

      <regulatory_sanctions_environment>
      {{regulatory_sanctions_environment}}
      </regulatory_sanctions_environment>

      <financial_vulnerability>
      {{financial_vulnerability}}
      </financial_vulnerability>
testData:
  - inputs:
      variables:
        supply_chain_exposure: "Heavy reliance on Tier 1 semiconductor foundries in Taiwan and assembly lines in Southern China; 80% of critical components single-sourced."
        regulatory_sanctions_environment: "Escalating US-China export controls on advanced AI chips; threat of comprehensive tariffs on electronic sub-assemblies."
        financial_vulnerability: "35% of global revenue derived from the APAC region; $500M in fixed assets localized in highly volatile trade zones."
  - inputs:
      variables:
        supply_chain_exposure: "European energy-intensive manufacturing base highly dependent on imported LNG and critical raw materials from sanctioned entities."
        regulatory_sanctions_environment: "Strict EU compliance mandates prohibiting secondary interactions with sanctioned Russian and Belarusian resource conglomerates."
        financial_vulnerability: "High margin compression due to volatile energy input costs; €200M in stranded assets written down."
evaluators:
  - name: Contains Mitigation Terminology
    type: regex
    pattern: "(?i)(Decoupling|Nearshoring|Tariff|Sovereign Risk|Exposure|VaR)"
  - name: LaTeX Detection
    type: regex
    pattern: "\\$"
