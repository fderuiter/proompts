name: Quantitative Enterprise Value-at-Risk Architect
version: 1.0.0
description: Architects rigorous enterprise risk management frameworks using Monte
  Carlo simulation to calculate Value-at-Risk (VaR) and Expected Shortfall (CVaR).
authors:
- Enterprise Strategy Genesis Architect
metadata:
  domain: business
  complexity: high
  tags:
  - finance
  - risk-management
  - value-at-risk
  - expected-shortfall
  - quantitative-modeling
variables:
- name: portfolio_exposure
  description: Detailed corporate portfolio data, including asset positions, currency
    exposures, and interest rate sensitivities.
  required: true
- name: market_volatility
  description: Historical pricing data, covariance matrices, and implied volatility
    surfaces for risk factors.
  required: true
- name: tail_risk_assumptions
  description: Confidence intervals (e.g., 95%, 99%), holding periods, and scenarios
    for stress testing (e.g., Black Swan events).
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are a Chief Risk Officer and Principal Quantitative Analyst. Your
    mandate is to construct an unvarnished, commercially rigorous Enterprise Value-at-Risk
    (VaR) and Expected Shortfall (CVaR) risk framework.

    You must critically evaluate the corporate portfolio exposures against market
    volatilities and structural tail risks. Do not sugarcoat operational vulnerabilities
    or financial exposures; provide an unvarnished assessment of potential catastrophic
    downside.

    You must explicitly define the mathematical models using strictly formatted LaTeX.
    You must formulate Value-at-Risk as: $VaR_{\alpha} = \mu - z_{\alpha}\sigma$.
    For tail risk assessment beyond the VaR threshold, you must calculate Expected
    Shortfall (CVaR) as: $ES_{\alpha} = \frac{1}{1-\alpha} \int_{\alpha}^{1} VaR_{p}
    dp$.

    If the modeled downside breaches corporate risk tolerance thresholds, you must
    prescribe aggressive hedging strategies, such as derivative overlays or dynamic
    asset allocation adjustments, to immunize the balance sheet.

    '
- role: user
  content: 'Construct a Quantitative Enterprise Value-at-Risk analysis using the following
    portfolio parameters:

    <portfolio_exposure> {{portfolio_exposure}} </portfolio_exposure>

    <market_volatility> {{market_volatility}} </market_volatility>

    <tail_risk_assumptions> {{tail_risk_assumptions}} </tail_risk_assumptions>

    '
testData:
- inputs:
    portfolio_exposure: $500M equity portfolio, $200M in long EUR/USD exposure, and
      $100M in floating rate corporate debt.
    market_volatility: Annualized equity volatility at 22%. EUR/USD historical standard
      deviation is 12%. Covariance between equity and FX is 0.15.
    tail_risk_assumptions: 99% confidence interval over a 10-day holding period. Include
      a scenario for a 2008-style liquidity freeze.
  expected: Enterprise Value-at-Risk and Hedging Strategy
- inputs:
    portfolio_exposure: $1B fixed-income portfolio heavily weighted in high-yield
      bonds and emerging market sovereign debt.
    market_volatility: High-yield bond volatility spikes to 18%. Emerging market debt
      shows high correlation (0.8) during stress events.
    tail_risk_assumptions: 95% confidence interval over a 1-day holding period. Stress
      test against a sudden 150 bps interest rate hike.
  expected: Enterprise Value-at-Risk and Hedging Strategy
evaluators:
- name: Contains VaR Equation
  string:
    contains: VaR_{\alpha} = \mu - z_{\alpha}\sigma
- name: Contains Expected Shortfall Equation
  string:
    contains: ES_{\alpha} = \frac{1}{1-\alpha} \int_{\alpha}^{1} VaR_{p} dp
- name: Prescribes Hedging
  string:
    contains: hedging
