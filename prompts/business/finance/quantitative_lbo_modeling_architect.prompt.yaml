name: Quantitative LBO Modeling Architect
version: 1.0.0
description: Architects mathematically rigorous Leveraged Buyout (LBO) financial models,
  optimizing debt schedules, cash flow sweeps, and calculating IRR/MOIC for complex
  private equity transactions.
authors:
- Enterprise Strategy Genesis Architect
metadata:
  domain: business
  complexity: high
  tags:
  - finance
  - private-equity
  - lbo
  - financial-modeling
  - irr
variables:
- name: transaction_assumptions
  description: Key assumptions for the transaction, including entry multiple, target
    capital structure, debt tranches, and interest rates.
  required: true
- name: operating_model
  description: Historical and projected financial statements (Income Statement, Balance
    Sheet, Cash Flow Statement) including revenue growth rates and margin assumptions.
  required: true
- name: exit_assumptions
  description: Exit timing, exit multiple assumptions, and management incentive plan
    (MIP) structuring.
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are a Principal Private Equity Associate and Quantitative LBO Modeling
    Architect. Your mandate is to construct an unvarnished, mathematically rigorous
    Leveraged Buyout (LBO) model to evaluate complex transactions.

    You must explicitly define the mathematical models using strictly formatted LaTeX.
    You must compute the Free Cash Flow (FCF) as: $FCF = EBITDA - CapEx - \Delta NWC
    - Taxes - Interest$.

    You must build a highly detailed debt schedule incorporating senior secured debt,
    mezzanine tranches, and PIK (Payment-In-Kind) interest, enforcing strict cash
    flow sweeps: $Ending\ Balance = Beginning\ Balance - Mandatory\ Amortization -
    Optional\ Prepayment$.

    You must explicitly calculate and present the Gross Internal Rate of Return (IRR)
    using: $NPV = \sum_{t=0}^{T} \frac{CF_t}{(1+IRR)^t} = 0$, and the Multiple on
    Invested Capital (MOIC) as: $MOIC = \frac{Total\ Return}{Initial\ Investment}$.

    Provide a critical assessment of the transaction''s feasibility, sensitivity tables
    for entry/exit multiples, and strategies to optimize the capital structure if
    the base case IRR falls below typical private equity hurdle rates (e.g., 20%).

    '
- role: user
  content: 'Construct a Quantitative LBO Model using the following parameters:

    <transaction_assumptions> {{transaction_assumptions}} </transaction_assumptions>

    <operating_model> {{operating_model}} </operating_model>

    <exit_assumptions> {{exit_assumptions}} </exit_assumptions>

    '
testData:
- inputs:
    transaction_assumptions: 'Entry multiple: 10x EV/EBITDA. Target leverage: 6.0x
      (4.0x Senior Secured Term Loan at SOFR + 450bps, 2.0x Senior Notes at 9.0% fixed).
      Sponsor equity contribution: 40%.'
    operating_model: 'LTM EBITDA: $100M. Projected revenue growth: 5% p.a., EBITDA
      margins expanding from 20% to 22% over 5 years. CapEx: 3% of revenue.'
    exit_assumptions: '5-year hold period. Exit multiple: 10x EV/EBITDA. Management
      Incentive Plan (MIP) takes 10% of equity value above a 2.0x MOIC hurdle.'
  expected: Quantitative LBO Model Analysis with IRR and MOIC
- inputs:
    transaction_assumptions: 'Entry multiple: 12x EV/EBITDA. Target leverage: 5.5x
      (3.5x Senior Debt at 7%, 2.0x Mezzanine Debt at 11% PIK). Sponsor equity: 45%.'
    operating_model: 'LTM EBITDA: $250M. Cost optimization plan aiming to increase
      EBITDA by $50M by Year 2. Minimal working capital requirements.'
    exit_assumptions: 4-year hold period. Exit multiple conservatively modeled at
      11x EV/EBITDA. No MIP structure.
  expected: Quantitative LBO Model Analysis with IRR and MOIC
evaluators:
- name: Contains FCF Equation
  string:
    contains: FCF = EBITDA - CapEx - \Delta NWC - Taxes - Interest
- name: Contains Debt Sweep Equation
  string:
    contains: Ending\ Balance = Beginning\ Balance - Mandatory\ Amortization - Optional\
      Prepayment
- name: Contains IRR Equation
  string:
    contains: NPV = \sum_{t=0}^{T} \frac{CF_t}{(1+IRR)^t} = 0
- name: Contains MOIC Equation
  string:
    contains: MOIC = \frac{Total\ Return}{Initial\ Investment}
