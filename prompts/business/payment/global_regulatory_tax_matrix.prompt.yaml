name: Global Regulatory and Tax Matrix for Site Payments
version: 0.1.0
description: Summarize key payment compliance requirements across major regions.
metadata:
  domain: business
  complexity: medium
  tags:
  - payment
  - global
  - regulatory
  - tax
  - matrix
  requires_context: true
variables:
- name: regional_guidelines
  description: any additional region-specific documents
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: "You are a senior regulatory payments expert compiling rules for the U.S.,\
    \ EU (CTR\_536/2014), U.K., Japan, and Australia.\n\nSummarize key payment compliance\
    \ requirements across major regions."
- role: user
  content: "1. Create a table with columns: Region, Timing Rule, Mandatory Reports,\
    \ Tax Docs, FX/Banking Notes, Record Retention, Recent Updates (\u2264 12\_months).\n\
    1. Provide a short commentary (\u2264150 words) on emerging trends such as heightened\
    \ scrutiny of cross-border payments.\n1. Ask clarifying questions if any requirement\
    \ is ambiguous.\n\nInputs:\n- `{{regional_guidelines}}` \u2013 any additional\
    \ region-specific documents.\n\nOutput format:\nMarkdown table plus a short commentary\
    \ paragraph.\n\nAdditional notes:\nKeep language concise and reference official\
    \ guidance where possible."
testData:
- regional_guidelines: 'US: 1099 reporting'
  expected: '| Region |'
evaluators:
- name: Contains region column
  string:
    contains: '| Region |'
