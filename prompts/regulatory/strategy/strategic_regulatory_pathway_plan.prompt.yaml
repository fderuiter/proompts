name: Strategic Regulatory Pathway Plan
version: 0.1.0
description: Outline a holistic global regulatory pathway for a medical device or
  IVD.
metadata:
  domain: regulatory
  complexity: medium
  tags:
  - regulatory-strategy
  - strategic
  - regulatory
  - pathway
  - plan
  requires_context: false
variables:
- name: device_name
  description: product name
  required: true
- name: intended_use
  description: summary of clinical application
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: 'You are a regulatory strategy consultant. The user is developing `{{device_name}}`
    intended for `{{intended_use}}` in the US, EU (MDR/IVDR), and APAC markets.


    Outline a holistic global regulatory pathway for a medical device or IVD.'
- role: user
  content: "1. Determine classification in each region.\n1. List applicable standards\
    \ such as ISO\_13485 and ISO\_14971.\n1. Specify submission types (e.g., FDA 510(k),\
    \ EU CE technical documentation).\n1. Provide key timelines for major milestones.\n\
    1. Highlight potential pitfalls and mitigation strategies.\n\nInputs:\n- `{{device_name}}`\
    \ \u2014 product name.\n- `{{intended_use}}` \u2014 summary of clinical application.\n\
    \nOutput format:\nBulleted sections or tables summarizing classifications, required\
    \ standards, submission types, timelines, and pitfalls.\n\nAdditional notes:\n\
    Keep advice concise and action\u2011oriented for a global audience."
testData: []
evaluators: []
