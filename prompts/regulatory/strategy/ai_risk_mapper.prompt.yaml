name: AI Risk Mapper
version: 0.1.0
description: Create a quick-look risk register for a specified AI system.
metadata:
  domain: regulatory
  complexity: low
  tags:
  - regulatory-strategy
  - risk
  - mapper
  requires_context: false
variables:
- name: AI_SYSTEM
  description: the system being assessed
  required: true
model: gpt-4o
messages:
- role: system
  content: "Regulatory frameworks such as the EU AI Act and NIST AI RMF guide responsible\
    \ AI deployment.\n\n1. List up to six key risks, each no more than 12 words.\n\
    2. Provide a table with columns *Risk*, *Likelihood H/M/L*, *Impact H/M/L*, and\
    \ *Mitigation* (\u2264 15 words).\n3. Conclude with a 25-word compliance note\
    \ referencing the EU AI Act and NIST AI RMF.\n4. Keep total response under 150\
    \ words.\n\nFocus on brevity and clarity.\n\nReferences: Reuters, Osano"
- role: user
  content: "- `{{AI_SYSTEM}}` \u2014 the system being assessed.\n\nOutput format:\
    \ Markdown list, table, and concluding note."
testData: []
evaluators: []
