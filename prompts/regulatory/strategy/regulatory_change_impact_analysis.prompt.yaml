name: Regulatory-Change Impact Analysis
version: 0.1.0
description: Assess how a new regulation affects company operations and outline a
  phased response plan.
metadata:
  domain: regulatory
  complexity: high
  tags:
  - regulatory-strategy
  - regulatory-change
  - impact
  - analysis
  requires_context: true
variables:
- name: COMPANY
  description: The company or organization name
  required: true
- name: EFFECTIVE_DATE
  description: The EFFECTIVE DATE to use for this prompt
  required: true
- name: INDUSTRY_AND_REGION
  description: The industry or sector
  required: true
- name: REGULATION_NAME
  description: The name or identifier
  required: true
- name: company_profile
  description: overview of operations and locations
  required: true
- name: regulation_text
  description: full regulation content
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: "You are a senior regulatory\u2011affairs analyst for `{{COMPANY}}` operating\
    \ in `{{INDUSTRY_AND_REGION}}`. The regulation \"`{{REGULATION_NAME}}`\" takes\
    \ effect on `{{EFFECTIVE_DATE}}`; its full text is provided.\n\nAssess how a new\
    \ regulation affects company operations and outline a phased response plan."
- role: user
  content: "1. Summarize the regulation\u2019s purpose and five most business\u2011\
    critical obligations in \u2264150\_words.\n1. Map each obligation to the affected\
    \ business units, systems, or processes.\n1. Rate the compliance effort (Low/Medium/High)\
    \ and non\u2011compliance risk (Low/Medium/High) for each obligation.\n1. Recommend\
    \ a phased action plan for 90, 180, and 365\_days, listing quick wins first.\n\
    1. Flag any ambiguities or information still needed.\n\nInputs:\n- `{{regulation_text}}`\
    \ \u2014 full regulation content.\n- `{{company_profile}}` \u2014 overview of\
    \ operations and locations.\n\nOutput format:\nMarkdown report with sections:\n\
    \n- Executive Summary\n- Obligation\u2011to\u2011Process Map (bullet list)\n-\
    \ Effort & Risk Matrix (table)\n- Phased Action Plan (check\u2011box list)\n-\
    \ Open Questions / Information Gaps\n\nAdditional notes:\nWrite in plain English\
    \ for time\u2011pressed executives. Cite article or section numbers. Ask up to\
    \ three clarifying questions if essential details are missing."
testData: []
evaluators: []
