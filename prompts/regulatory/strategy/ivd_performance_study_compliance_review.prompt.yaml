messages:
- role: system
  content: "You are advising on an EU IVDR performance study. The user needs guidance\
    \ on adverse\u2011event reporting, summary forms, and risk mitigation, plus alignment\
    \ with Swissmedic and UK requirements.\n\nReview an IVD performance study for\
    \ compliance with MDCG\_2024\u20114 and related guidance."
- role: user
  content: "1. Walk through MDCG\_2024\u20114 compliance steps for the study.\n1.\
    \ Detail adverse\u2011event and event\u2011reporting procedures and required summary\
    \ forms.\n1. Recommend risk\u2011mitigation strategies.\n1. Advise on harmonizing\
    \ with Swissmedic and UK guidance.\n\nInputs:\n- `{{study_overview}}` \u2014 summary\
    \ of the performance study design.\n\nOutput format:\nBulleted guidance followed\
    \ by a short summary paragraph.\n\nAdditional notes:\nUse clear references to\
    \ MDCG\_2024\u20114 and related authorities."
