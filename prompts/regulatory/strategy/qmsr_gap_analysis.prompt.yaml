name: 21 CFR 820 / QMSR Gap-Analysis & Remediation
version: 0.1.0
description: "Evaluate the quality-management system against current 21\_CFR\_820\
  \ and the proposed QMSR."
metadata:
  domain: regulatory
  complexity: medium
  tags:
  - regulatory-strategy
  - cfr
  - '820'
  - qmsr
  - gap-analysis
  requires_context: true
variables:
- name: device_class
  description: The device class to use for this prompt
  required: true
- name: employee_count
  description: The employee count to use for this prompt
  required: true
- name: qms_documents
  description: procedures, SOP list, audit reports
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: "You are an MDSAP lead auditor specializing in medical\u2011device quality\
    \ systems. The organization provides QMS procedures, SOP lists, and the latest\
    \ internal\u2011audit report. Site size is `{{employee_count}}` and device risk\
    \ class is `{{device_class}}`.\n\nEvaluate the quality-management system against\
    \ current 21\_CFR\_820 and the proposed QMSR."
- role: user
  content: "1. Ask clarifying questions if any documents or processes are unclear.\n\
    1. Once clarified, conduct the analysis and deliver:\n   - High\u2011level summary\
    \ (\u2264120 words).\n   - Clause\u2011by\u2011clause gap checklist table (Regulation/Clause,\
    \ Evidence Reviewed, Deficiency, Risk Rating, Recommended Action).\n   - Heat\u2011\
    map snapshot using emoji scale (\U0001F7E2/\U0001F7E1/\U0001F534) for each subpart.\n\
    \   - 90\u2011day remediation road\u2011map with quick wins versus long\u2011\
    lead tasks.\n   - Top five supplier\u2011control and documentation hot spots.\n\
    \   - Inspection readiness score (0\u2011100) with justification.\n   - References\
    \ to 21\_CFR\_820, ISO\_13485, and draft QMSR sections.\n\nInputs:\n- `{{qms_documents}}`\
    \ \u2014 procedures, SOP list, audit reports.\n\nOutput format:\nMarkdown sections\
    \ and tables as listed above.\n\nAdditional notes:\nEnsure recommendations align\
    \ with ISO\_13485:2016 and proposed QMSR requirements."
testData: []
evaluators: []
