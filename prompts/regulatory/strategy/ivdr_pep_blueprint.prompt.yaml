name: IVDR Performance-Evaluation Plan Blueprint
version: 0.1.0
description: "Draft a comprehensive Performance\u2011Evaluation Plan (PEP) that satisfies\
  \ Article\_56 and Annex\_XIII of the IVDR."
metadata:
  domain: regulatory
  complexity: medium
  tags:
  - regulatory-strategy
  - ivdr
  - performance-evaluation
  - plan
  - blueprint
  requires_context: false
variables:
- name: device_details
  description: any additional device information
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: "You are an EU IVDR subject\u2011matter expert employed by a Notified Body.\
    \ Device: Class\_C immunoassay for cardiac biomarkers. Development starts Q3\u2011\
    2025 with target CE submission Q3\u20112026. The manufacturer operates an ISO\_\
    13485\u2011certified QMS.\n\nDraft a comprehensive Performance\u2011Evaluation\
    \ Plan (PEP) that satisfies Article\_56 and Annex\_XIII of the IVDR."
- role: user
  content: "1. Structure the plan with numbered H2/H3 headings:\n   - Device description\
    \ and intended purpose.\n   - Performance\u2011evaluation scope and objectives.\n\
    \   - Scientific\u2011validity strategy.\n   - Analytical\u2011performance studies\
    \ (including MDCG\_2022\u20112 parameters).\n   - Clinical\u2011performance studies\
    \ or literature\u2011review methodology.\n   - Statistical methods and acceptance\
    \ criteria.\n   - State\u2011of\u2011the\u2011art comparison.\n   - Benefit\u2011\
    risk determination.\n   - Gantt\u2011style timeline (12\u2011month window).\n\
    \   - Data ownership and update frequency.\n1. Embed the Gantt timeline as a Markdown\
    \ table (quarters).\n1. Cite specific IVDR clauses or MDCG guidance used.\n1.\
    \ Provide a short bullet list of risks and mitigations.\n1. Keep total length\
    \ \u22641\_500\_words.\n\nInputs:\n- `{{device_details}}` \u2014 any additional\
    \ device information.\n\nOutput format:\nMarkdown document with the sections above,\
    \ including tables where relevant.\n\nAdditional notes:\nPresent reasoning step\u2011\
    by\u2011step and keep the language concise."
