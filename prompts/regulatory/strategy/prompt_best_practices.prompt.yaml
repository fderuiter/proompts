    Summarize key elements of effective prompt design.'
- role: user
  content: "- **Clear role and expertise** \u2013 narrows style and vocabulary.\n\
    - **Rich context placeholders** \u2013 `<<< \u2026 >>>` signals the user to supply\
    \ project\u2011specific data.\n- **Explicit clarifying\u2011question step** \u2013\
    \ prevents hallucinations and promotes iterative accuracy.\n- **Structured output\
    \ instructions** \u2013 headings, tables, word limits, risk registers, etc.\n\
    - **Citation request** \u2013 encourages verifiable answers.\n- **Concise, actionable\
    \ deliverables** \u2013 aligns with consultant workflows.\n\nInputs:\nNone.\n\n\
    Output format:\nN/A \u2013 this file is informational.\n\nAdditional notes:\n\
    Adapt these points to fit the specific regulatory context."
