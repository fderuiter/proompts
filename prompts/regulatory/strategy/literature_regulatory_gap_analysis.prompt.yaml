name: Literature & Regulatory Gap Analysis
version: 0.1.0
description: Identify evidence and regulatory gaps for a planned pivotal clinical
  study.
metadata:
  domain: regulatory
  complexity: medium
  tags:
  - regulatory-strategy
  - literature
  - regulatory
  - gap
  - analysis
  requires_context: true
variables:
- name: device_or_ivd
  description: description of the medical device or IVD
  required: true
- name: target_indication
  description: proposed indication for use
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: 'You are an expert clinical trial strategist. The user plans a pivotal
    study of `{{device_or_ivd}}` for `{{target_indication}}`.


    Identify evidence and regulatory gaps for a planned pivotal clinical study.'
- role: user
  content: "1. Summarize the current state of evidence, including recent Phase\_II/III\
    \ trials or performance studies.\n1. Identify data gaps or unmet requirements\
    \ based on FDA and EMA guidance (for example, FDA pivotal study design guidance\
    \ or EU MDCG\_2022\u20112).\n1. Recommend trial design elements\u2014endpoints,\
    \ sample size, comparator, inclusion and exclusion criteria\u2014to address those\
    \ gaps. Provide references where appropriate.\n\nInputs:\n- `{{device_or_ivd}}`\
    \ \u2014 description of the medical device or IVD.\n- `{{target_indication}}`\
    \ \u2014 proposed indication for use.\n\nOutput format:\nMarkdown bullet list\
    \ or table summarizing findings and recommendations.\n\nAdditional notes:\nKeep\
    \ the analysis concise and reference authoritative guidance documents."
testData: []
evaluators: []
