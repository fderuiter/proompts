name: EU MDR Technical-Documentation Gap Assessment
version: 0.1.0
description: "Identify deficiencies in technical documentation against EU MDR Annex\_\
  II and\_III."
metadata:
  domain: regulatory
  complexity: medium
  tags:
  - regulatory-strategy
  - mdr
  - technical-documentation
  - gap
  - assessment
  requires_context: true
variables:
- name: device_info
  description: device description and classification details
  required: true
- name: technical_docs
  description: "draft Annex\_II and\_III content"
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: "You are a senior EU\_MDR consultant and lead Notified Body auditor. The\
    \ device is a Class\_IIb electrosurgical generator transitioning from the MDD,\
    \ with re\u2011certification due 31\_Dec\_2028. Draft Annex\_II and\_III files\
    \ are supplied.\n\nIdentify deficiencies in technical documentation against EU\
    \ MDR Annex\_II and\_III."
- role: user
  content: "1. Review each section against Annex\_II and\_III requirements.\n1. List\
    \ every deficiency in a table with columns:\n   - MDR clause or annex reference.\n\
    \   - Gap description (\u226440 words).\n   - Risk level (High\_\\| Medium\_\\\
    | Low).\n   - Recommended corrective action.\n1. Prioritize the findings into\
    \ a top\u201110 action plan with owners and timelines.\n\nInputs:\n- `{{technical_docs}}`\
    \ \u2014 draft Annex\_II and\_III content.\n- `{{device_info}}` \u2014 device\
    \ description and classification details.\n\nOutput format:\nMarkdown table followed\
    \ by a \u2264200\u2011word action\u2011plan narrative.\n\nAdditional notes:\n\
    Think step\u2011by\u2011step and summarize your reasoning. Cite exact MDR clauses\
    \ used."
testData: []
evaluators: []
