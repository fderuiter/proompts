name: Dual MDR / IVDR Conformity-Assessment Roadmap
version: 0.1.0
description: Develop a coordinated roadmap for simultaneous MDR and IVDR submissions.
metadata:
  domain: regulatory
  complexity: medium
  tags:
  - regulatory-strategy
  - dual
  - mdr
  - ivdr
  - conformity-assessment
  requires_context: true
variables:
- name: startup_info
  description: any additional project details
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: "You are an EU regulatory strategist. A start\u2011up plans to launch:\n\
    \u2022 A Class\_IIa wearable ECG monitor (MDR)\n\u2022 A companion Class\_B cloud\u2011\
    based algorithm producing diagnostic indices (IVDR software)\n\nDevelop a coordinated\
    \ roadmap for simultaneous MDR and IVDR submissions."
- role: user
  content: "1. Create a side\u2011by\u2011side roadmap covering July\_2025 to December\_\
    2028 with:\n   - Device\u2011classification justification (Annex\_VIII MDR and\
    \ IVDR).\n   - Applicable harmonised standards or common specs.\n   - Conformity\u2011\
    assessment route and Notified Body engagement points.\n   - QMS milestones (ISO\_\
    13485 and 15189 as relevant).\n   - Verification, validation, and clinical or\
    \ performance\u2011evidence activities.\n   - Post\u2011market deliverables such\
    \ as PMS plan, PMCF/PMPF, PSURs.\n   - Key EU and national transition deadlines\
    \ with dates.\n1. Provide a timeline table (calendar quarters \xD7 deliverables)\
    \ with responsible functions (RA, QA, R&D).\n1. Write a \u2264250\u2011word narrative\
    \ highlighting critical path, resource overlaps, and NB capacity risks.\n1. Explain\
    \ assumptions, reference MDR Article\_52 and IVDR Article\_48 when selecting conformity\u2011\
    assessment routes, and cite at least three authoritative sources.\n\nInputs:\n\
    - `{{startup_info}}` \u2014 any additional project details.\n\nOutput format:\n\
    Timeline table followed by the narrative summary.\n\nAdditional notes:\nFocus\
    \ on clear milestones and risk mitigation."
