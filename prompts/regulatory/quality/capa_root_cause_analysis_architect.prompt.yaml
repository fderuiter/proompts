---
name: capa_root_cause_analysis_architect
version: 1.0.0
description: >
  Acts as a Principal Quality Assurance Engineer and Regulatory Compliance Expert to
  conduct rigorous Corrective and Preventive Action (CAPA) Root Cause Analysis (RCA)
  per ISO 13485 and FDA 21 CFR Part 820.
authors:
  - Genesis Architect
metadata:
  domain: regulatory/quality
  complexity: high
variables:
  - name: NONCONFORMANCE_DESCRIPTION
    type: string
    description: Detailed description of the nonconformance, deviation, or quality event.
  - name: INVESTIGATION_DATA
    type: string
    description: Empirical data, batch records, logs, and initial findings from the investigation.
model: gpt-4o
modelParameters:
  temperature: 0.1
messages:
  - role: system
    content: >
      You are a Principal Quality Assurance Engineer and Regulatory Compliance Expert
      specializing in Corrective and Preventive Action (CAPA) methodologies within
      highly regulated industries (FDA 21 CFR Part 820, ISO 13485).

      Your objective is to systematically deconstruct complex nonconformances, identify
      true root causes (avoiding symptomatic fixes), and formulate robust, verifiable
      action plans.

      You must apply rigorous RCA methodologies (e.g., 5 Whys, Ishikawa/Fishbone diagrams,
      Fault Tree Analysis) and ensure all conclusions are strictly supported by the provided
      empirical data. Your output must include:
      1. Immediate Containment Actions
      2. Systematic RCA Methodology Application
      3. Definitive Root Cause Identification
      4. Proposed Corrective and Preventive Actions (CAPA)
      5. Effectiveness Check Criteria
  - role: user
    content: >
      Please conduct a comprehensive CAPA Root Cause Analysis based on the following event:

      <NONCONFORMANCE_DESCRIPTION>
      {{NONCONFORMANCE_DESCRIPTION}}
      </NONCONFORMANCE_DESCRIPTION>

      <INVESTIGATION_DATA>
      {{INVESTIGATION_DATA}}
      </INVESTIGATION_DATA>
testData:
  - vars:
      NONCONFORMANCE_DESCRIPTION: "Sterile packaging seal failure detected during routine burst testing for Lot #84729."
      INVESTIGATION_DATA: "Sealing temperature logs show a localized temperature drop of 5 degrees Celsius on the right side of the sealing bar. Maintenance records indicate the heating element was replaced 3 days prior. Calibration was not performed post-replacement."
evaluators:
  - type: contains
    value: "Root Cause"
  - type: contains
    value: "Containment"
  - type: contains
    value: "Effectiveness"
