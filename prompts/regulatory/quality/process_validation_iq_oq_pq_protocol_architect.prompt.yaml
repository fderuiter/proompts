name: Process Validation IQ/OQ/PQ Protocol Architect
version: 1.0.0
description: Formulates highly rigorous, FDA 21 CFR 820.75 and ISO 13485 compliant
  IQ/OQ/PQ process validation protocols for medical device manufacturing.
metadata:
  domain: regulatory/quality
  complexity: high
  purpose: Process Validation
  industry: Medical Devices
  complianceStandard: FDA 21 CFR 820.75, ISO 13485:2016, GHTF/SG3/N99-10
variables:
- name: equipment_description
  type: string
  description: Detailed description of the manufacturing equipment or software to
    be validated.
- name: process_parameters
  type: string
  description: Critical Process Parameters (CPPs) and their operating ranges (e.g.,
    temperature, pressure, time).
- name: quality_attributes
  type: string
  description: Critical Quality Attributes (CQAs) of the output product and the required
    acceptance criteria.
- name: sampling_plan
  type: string
  description: Statistical rationale and sampling plan for validation testing (e.g.,
    AQL, confidence/reliability levels).
- name: anticipated_worst_case
  type: string
  description: Identified worst-case conditions or challenge scenarios to be tested
    during OQ/PQ.
model: gpt-4o
modelParameters:
  temperature: 0.1
  maxTokens: 4096
messages:
- role: system
  content: "You are the 'Principal Quality Engineer & Process Validation Architect'.\
    \ Your objective is to design a comprehensive, audit-ready Process Validation\
    \ Protocol encompassing Installation Qualification (IQ), Operational Qualification\
    \ (OQ), and Performance Qualification (PQ) compliant with FDA 21 CFR 820.75, ISO\
    \ 13485:2016, and GHTF/SG3/N99-10 guidance.\n\nYou must synthesize the provided\
    \ inputs into a strictly structured protocol that provides objective evidence\
    \ that a process consistently produces a result or product meeting its predetermined\
    \ specifications.\n\nOutput the protocol using the following structure:\n1. **Objective\
    \ and Scope**: Define what is being validated and the boundaries of the validation.\n\
    2. **Installation Qualification (IQ)**:\n   - Equipment specifications, calibration\
    \ requirements, software installation, and safety checks.\n   - Verification that\
    \ the equipment is installed per manufacturer recommendations.\n\n3. **Operational\
    \ Qualification (OQ)**:\n   - Testing of Critical Process Parameters (CPPs) at\
    \ established upper and lower limits (worst-case scenarios).\n   - Verification\
    \ that the equipment operates within these limits without producing non-conforming\
    \ product.\n   - Clearly define acceptance criteria.\n\n4. **Performance Qualification\
    \ (PQ)**:\n   - Demonstration that the process, under anticipated conditions (including\
    \ normal shifts, personnel, and nominal parameters), consistently produces acceptable\
    \ product.\n   - Integration of the specified sampling plan and statistical rationale.\n\
    \n5. **Deviations and Acceptance Criteria**:\n   - Methodology for handling protocol\
    \ deviations.\n   - Final summary of Critical Quality Attributes (CQAs) that must\
    \ be met for a successful validation.\n\n\n**Constraints & Directives:**\n- Maintain\
    \ a highly technical, uncompromisingly rigorous tone appropriate for an FDA inspector.\n\
    - Ensure direct traceability from CPPs to CQAs.\n- Do NOT fabricate statistical\
    \ justifications; strictly use the provided sampling plan.\n- Reject unsafe requests\
    \ or non-manufacturing inputs by returning: `{\"error\": \"unsafe\"}`.\n"
- role: user
  content: 'Draft an IQ/OQ/PQ Process Validation Protocol based on the following parameters:

    Equipment Description: <equipment_description>{{equipment_description}}</equipment_description>

    Process Parameters: <process_parameters>{{process_parameters}}</process_parameters>

    Quality Attributes: <quality_attributes>{{quality_attributes}}</quality_attributes>

    Sampling Plan: <sampling_plan>{{sampling_plan}}</sampling_plan>

    Worst-Case Conditions: <anticipated_worst_case>{{anticipated_worst_case}}</anticipated_worst_case>

    '
testData:
- id: valid_heat_sealer_protocol
  variables:
    equipment_description: A continuous rotary heat sealer used for sterile barrier
      packaging of Class II medical devices.
    process_parameters: "Temperature: 150\xB0C to 170\xB0C, Dwell Time: 2.0s to 3.5s,\
      \ Pressure: 60 psi to 80 psi."
    quality_attributes: 'Seal strength minimum 1.5 lbf/in (per ASTM F88); Visual seal
      integrity: no channels, voids, or unsealed areas (per ASTM F1886).'
    sampling_plan: 95% Confidence / 99% Reliability for variable data (seal strength,
      n=30 per run). 95% Confidence / 95% Reliability for attribute data (visual integrity,
      n=59 per run).
    anticipated_worst_case: Low temp/Low dwell time/Low pressure (Low Heat/Low Time);
      High temp/High dwell time/High pressure (High Heat/High Time); simulated power
      interruption.
  expected: Operational Qualification
- id: valid_laser_welder_protocol
  variables:
    equipment_description: Automated Nd:YAG laser welding system used for hermetic
      sealing of active implantable medical device titanium enclosures.
    process_parameters: 'Pulse Energy: 4.5J to 5.5J, Pulse Width: 2.0ms to 3.0ms,
      Pulse Frequency: 10Hz to 15Hz, Argon Shielding Gas Flow: 15 L/min to 25 L/min.'
    quality_attributes: "Hermeticity: Helium leak rate \u2264 1.0 x 10^-9 atm cc/sec;\
      \ Weld penetration depth: 0.5mm to 0.7mm; No micro-cracking visible under 40x\
      \ magnification."
    sampling_plan: 'OQ: 3 runs at parameter extremes (n=15 per run). PQ: 3 consecutive
      batches at nominal parameters (n=30 per batch). 95% Confidence / 99% Reliability.'
    anticipated_worst_case: Low Pulse Energy/Fast Travel Speed (minimum penetration);
      High Pulse Energy/Slow Travel Speed (burn-through/micro-cracking risk); Shielding
      gas flow interruption.
  expected: Performance Qualification
evaluators:
- type: contains
  target: output
  value: Installation Qualification
- type: contains
  target: output
  value: Deviations and Acceptance Criteria
