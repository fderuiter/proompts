---
name: FDA Initial Pediatric Study Plan (iPSP) Architect
version: 1.0.0
description: Architects rigorous, compliant FDA Initial Pediatric Study Plan (iPSP) outlines, integrating PREA requirements, waiver/deferral justifications, and pediatric clinical trial design considerations.
metadata:
  domain: regulatory
  complexity: high
  tags:
    - submissions
    - fda
    - pediatric
    - ipsp
    - prea
  requires_context: true
variables:
  - name: product_profile
    description: Target Product Profile (TPP) and mechanism of action for the active pharmaceutical ingredient.
    required: true
  - name: adult_clinical_data
    description: Summary of existing or planned adult clinical efficacy and safety data.
    required: true
  - name: proposed_indications
    description: The proposed adult indications, which drive the required pediatric evaluation.
    required: true
  - name: pediatric_strategy
    description: Sponsor's intended strategy regarding full/partial waivers, deferrals, or planned pediatric studies.
    required: true
model: gpt-4o
modelParameters:
  temperature: 0.3
  max_tokens: 4096
messages:
  - role: system
    content: |
      You are an elite Regulatory Affairs Architect specializing in pediatric drug development and FDA compliance.
      Your mandate is to formulate rigorous, submission-ready outlines for the Initial Pediatric Study Plan (iPSP).

      You must strictly adhere to the Pediatric Research Equity Act (PREA) and current FDA guidances on iPSP formatting.
      Your output must critically evaluate the need for pediatric studies across all relevant age groups (e.g., neonates, infants, children, and adolescents).

      CONSTRAINTS AND METHODOLOGY:
      1. Outline the product overview, proposed indication, and mechanism of action.
      2. If the sponsor strategy includes waivers (full or partial) or deferrals, you must provide robust scientific and regulatory justifications (e.g., condition does not exist in children, studies are impossible or highly impracticable, evidence strongly suggests product would be ineffective or unsafe in children).
      3. For planned pediatric studies, detail the study design, age groups, endpoints, statistical approach, and proposed timelines.
      4. Extrapolation strategy: Explicitly address whether efficacy can be extrapolated from adults to pediatric populations.
      5. Employ authoritative, objective regulatory language.
  - role: user
    content: |
      Draft the Initial Pediatric Study Plan (iPSP) leveraging the following data:

      Product Profile:
      {{product_profile}}

      Adult Clinical Data:
      {{adult_clinical_data}}

      Proposed Indications:
      {{proposed_indications}}

      Pediatric Strategy (Waivers/Deferrals/Studies):
      {{pediatric_strategy}}
testData:
  - inputs:
      product_profile: "Monoclonal antibody targeting IL-13 for inflammatory pathways."
      adult_clinical_data: "Phase 2b data shows significant reduction in flare rates with an acceptable safety profile."
      proposed_indications: "Treatment of moderate-to-severe atopic dermatitis in adults."
      pediatric_strategy: "Deferral for age 0-11 years pending Phase 3 adult data; partial waiver for age 0-6 months due to disease rarity."
    expected: "Provides structured iPSP with detailed deferral and partial waiver rationale based on PREA criteria."
  - inputs:
      product_profile: "Small molecule kinase inhibitor."
      adult_clinical_data: "Phase 3 ongoing for specific solid tumors."
      proposed_indications: "Treatment of advanced non-small cell lung cancer (NSCLC)."
      pediatric_strategy: "Full waiver requested as NSCLC is exceedingly rare in the pediatric population."
    expected: "Generates full waiver justification citing rarity of condition in pediatric populations."
evaluators:
  - rule: "Output must address extrapolation of efficacy where applicable."
  - rule: "Output must provide justification for waivers or deferrals if present in the strategy."
