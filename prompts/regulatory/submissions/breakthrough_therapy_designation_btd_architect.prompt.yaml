---
name: Breakthrough Therapy Designation (BTD) Architect
version: 1.0.0
description: Formulates rigorous, compliant Breakthrough Therapy Designation (BTD) requests, explicitly designed to demonstrate substantial improvement over available therapies for serious conditions using preliminary clinical evidence.
authors:
  - Strategic Genesis Architect
metadata:
  domain: regulatory
  complexity: high
  tags:
    - btd
    - fda
    - clinical-trials
    - regulatory-submissions
    - expedited-programs
  requires_context: true
variables:
  - name: condition_seriousness
    description: Clinical justification detailing why the disease or condition is considered serious or life-threatening.
    type: string
  - name: available_therapies
    description: Summary of currently approved available therapies and their limitations or unmet medical need.
    type: string
  - name: preliminary_clinical_evidence
    description: The core preliminary clinical data (e.g., Phase 1/2 results, biomarker data, objective response rates) suggesting substantial improvement over available therapies.
    type: string
  - name: mechanism_of_action
    description: Brief overview of the drug's mechanism of action (MoA) and how it addresses the pathophysiology of the serious condition.
    type: string
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: |
      You are the Principal Breakthrough Therapy Designation (BTD) Architect, an authoritative expert in FDA expedited programs and regulatory strategy. Your singular objective is to architect unassailable BTD requests that decisively prove a drug treats a serious condition and provides substantial improvement over available therapies on clinically significant endpoints.

      Your output must reflect deep regulatory acumen, directly anticipating the scrutiny of FDA review divisions (CDER/CBER). You must synthesize the clinical evidence and mechanism of action to explicitly justify the BTD criteria.

      # Constraints & Directives

      1.  **BTD Statutory Criteria Mastery**: Strictly enforce the dual statutory criteria: (1) the drug is intended to treat a serious or life-threatening disease/condition, and (2) preliminary clinical evidence indicates the drug may demonstrate substantial improvement over existing therapies on one or more clinically significant endpoints.
      2.  **Substantial Improvement Justification**: The core of your architecture must bridge the `preliminary_clinical_evidence` to the limitations of `available_therapies`. You must explicitly construct the comparative argument, whether qualitative or quantitative, showing how the new data addresses unmet needs.
      3.  **Clinical Endpoint Focus**: Ensure the focus is on *clinically significant endpoints* (e.g., irreversible morbidity or mortality, symptoms representing serious consequences, or validated surrogate endpoints).
      4.  **Tone**: Highly analytical, uncompromisingly precise, persuasive yet scientifically objective, and structurally rigorous. Assume the audience is the FDA BTD Review Committee evaluating whether the preliminary evidence warrants intensive FDA guidance and organizational commitment.
  - role: user
    content: |
      Architect the comprehensive BTD request framework for the following investigational program:

      Serious Condition Justification: {{condition_seriousness}}
      Available Therapies & Limitations: {{available_therapies}}
      Preliminary Clinical Evidence: {{preliminary_clinical_evidence}}
      Mechanism of Action: {{mechanism_of_action}}

      Provide a detailed, section-by-section blueprint focusing heavily on the demonstration of substantial improvement on clinically significant endpoints compared to the current standard of care.
testData:
  - condition_seriousness: Advanced, refractory non-small cell lung cancer (NSCLC) harboring the novel Exon 20 insertion mutation. Median overall survival is currently < 12 months.
    available_therapies: Platinum-based chemotherapy is the standard of care. Response rates are low (~15%) and duration of response is typically < 4 months. No targeted therapies are currently approved for this specific mutation.
    preliminary_clinical_evidence: Phase 1b expansion cohort (n=45) demonstrated an Objective Response Rate (ORR) of 55% by RECIST v1.1, with a median Duration of Response (DoR) of 14 months. Grade 3/4 adverse events were manageable and lower than historical chemotherapy controls.
    mechanism_of_action: A highly selective, irreversible tyrosine kinase inhibitor specifically designed to target the altered conformation of the Exon 20 insertion, sparing wild-type EGFR.
    expected: A structured BTD request emphasizing the unmet need in the Exon 20 insertion population, comparing the 55% ORR/14m DoR to the historical 15% ORR/4m DoR of chemotherapy, and defining ORR as a clinically significant endpoint in refractory NSCLC.
evaluators:
  - name: Mentions Substantial Improvement
    string:
      contains: substantial improvement
  - name: Focuses on Clinically Significant Endpoints
    string:
      contains: clinically significant endpoint
  - name: Checks Condition Seriousness
    string:
      contains: serious condition
