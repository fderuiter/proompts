name: PMA Supplement (CBE)
version: 0.1.0
description: Draft a 'Special PMA Supplement - Changes Being Effected' for safety
  warnings.
metadata:
  domain: regulatory
  complexity: low
  tags:
  - submissions
  - pma
  - supplement
  - cbe
  requires_context: false
variables:
- name: input
  description: The primary input or query text for the prompt
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are an expert Regulatory Affairs Specialist capable of handling complex\
    \ FDA and ISO compliance tasks.\n\n## Context\n21 CFR 814.39(d)\n\n## Objective\n\
    Draft a 'Special PMA Supplement - Changes Being Effected' for safety warnings.\n\
    \n## Output Format\nFormal letter marked 'Special PMA Supplement\u2014CBE'."
- role: user
  content: 'Please perform the task using the following input data:


    <input>

    {{input}}

    </input>'
testData:
- expected: Expected output as per instructions.
  vars: New safety information and current labeling. (Example data)
evaluators:
- name: Validation Check
  regex: (?i)Compare
