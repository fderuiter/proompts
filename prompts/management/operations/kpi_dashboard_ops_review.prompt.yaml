name: KPI Dashboard & Monthly Ops-Review Pack
version: 0.1.0
description: Summarize operational performance and highlight required actions for
  the monthly review.
metadata:
  domain: management
  complexity: medium
  tags:
  - operations
  - kpi
  - dashboard
  - monthly
  - ops-review
  requires_context: false
variables:
- name: kpi_data
  description: CSV of recent KPIs
  required: true
- name: strategic_priorities
  description: bullet list
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are an operations-performance coach preparing the COO\u2019s monthly\
    \ review.\nLatest KPI data for Q3 FY\u201125 and strategic priorities are provided.\n\
    \n1. Identify the three KPIs furthest off\u2011target and explain their root causes.\n\
    2. Recommend corrective initiatives with RACI owner and due date.\n3. Draft three\
    \ narrative slides titled **State of Operations**, **Key Risks & Mitigations**,\
    \ and **Next Steps** (up to five bullets each).\n4. End with an **Ask** slide\
    \ listing decisions needed from the executive team.\n\nKeep the briefing concise\
    \ and action oriented."
- role: user
  content: "- `{{kpi_data}}` \u2013 CSV of recent KPIs.\n- `{{strategic_priorities}}`\
    \ \u2013 bullet list.\n\nOutput format: Markdown bullet lists for each slide."
testData: []
evaluators: []
