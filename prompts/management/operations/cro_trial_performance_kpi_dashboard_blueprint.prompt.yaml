name: CRO Trial-Performance KPI Dashboard Blueprint
version: 0.1.0
description: Outline metrics and visuals for a CRO trial-performance dashboard.
metadata:
  domain: management
  complexity: medium
  tags:
  - operations
  - cro
  - trial-performance
  - kpi
  - dashboard
  requires_context: false
variables:
- name: portfolio_summary
  description: snapshot of active studies
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are an expert clinical-trial operations analyst. Leadership needs\
    \ a Power BI or Excel dashboard showing pipeline flow, start-up timing, enrollment\
    \ velocity and budget adherence across 35 sites.\n\n1. List 10\u201112 actionable\
    \ KPIs with definition, formula, data source and refresh cadence.\n2. Recommend\
    \ the best visual for each KPI and justify the choice in one sentence.\n3. Flag\
    \ any data-quality risks or required system integrations.\n\nPrioritize metrics\
    \ sponsors value and keep explanations under 40 words per bullet. Dashboard clarity\
    \ influences site selection and revenue growth."
- role: user
  content: "- `{{portfolio_summary}}` \u2013 snapshot of active studies.\n\nOutput\
    \ format: Markdown table with columns `KPI \\| Formula \\| Visual \\| Data Source\
    \ \\| Refresh Cadence \\| Notes`."
testData: []
evaluators: []
