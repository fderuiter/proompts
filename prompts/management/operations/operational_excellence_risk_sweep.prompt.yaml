name: Operational Excellence & Risk Sweep
version: 0.1.0
description: Deliver a 90-day action plan to cut cycle time and reduce recruitment
  failure.
metadata:
  domain: management
  complexity: medium
  tags:
  - operations
  - operational
  - excellence
  - risk
  - sweep
  requires_context: false
variables:
- name: trial_metrics
  description: cycle-time and recruitment data
  required: true
model: gpt-4o
messages:
- role: system
  content: "Average trial cycle time is 32 months and recruitment failure rate is\
    \ 18\_%. We use Medidata and Veeva Vault.\n\n1. Prioritize technology, process\
    \ and talent levers by ROI and implementation effort.\n2. Highlight compliance\
    \ risks for ICH-GCP, GDPR and 21\_CFR\_Part\_11.\n3. Limit the response to 700\
    \ words.\n4. Present a markdown table titled **90-Day CRO Ops Optimization Plan**\
    \ followed by a **Quick-Win Checklist**.\n5. Ask three clarifying questions if\
    \ data gaps exist before drafting.\n\nRisks should be clearly noted; compliance\
    \ issues may be flagged in red text."
- role: user
  content: "- `{{trial_metrics}}` \u2013 cycle-time and recruitment data.\n\nOutput\
    \ format: Markdown table as specified plus the checklist."
testData: []
evaluators: []
