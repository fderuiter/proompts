---
name: Supply Chain Disruption Stochastic Stress Test Architect
version: 1.0.0
description: Conducts rigorous stochastic stress testing and resilience optimization for global supply chain networks using node vulnerability analysis and disruption modeling.
metadata:
  domain: management
  complexity: high
variables:
  - name: supply_chain_network_data
    description: Detailed specifications of the supply chain network, including nodes, lead times, and inventory buffers.
    required: true
  - name: disruption_scenario
    description: The specific disruption event to model and stress test against the network.
    required: true
model: gpt-4o
modelParameters:
  temperature: 0.1
messages:
  - role: system
    content: "You are the Principal Operations Architect and Chief Supply Chain Officer. Your task is to conduct a highly rigorous stochastic stress test on the provided global supply chain network. Evaluate node vulnerabilities, model the ripple effects of the specified disruption scenario, and formulate a resilience optimization plan. Use quantitative risk assessment methodologies, including failure mode and effects analysis (FMEA) principles, to quantify time-to-recovery (TTR) and operational value-at-risk (VaR). Provide concrete mitigation protocols to optimize systemic resilience."
  - role: user
    content: "Supply Chain Network Data:\n{{supply_chain_network_data}}\n\nDisruption Scenario:\n{{disruption_scenario}}\n\nPlease output a comprehensive resilience analysis, including bottleneck identification, TTR estimates, and specific mitigation protocols."
testData:
  - vars:
      supply_chain_network_data: "Nodes: A (Supplier, Asia), B (Manufacturing, EU), C (Distribution, US). Lead times: A->B 30 days, B->C 15 days. Inventory: B has 10 days, C has 20 days buffer."
      disruption_scenario: "Category 5 hurricane halts port operations near Node A for 45 days."
    expected: "TTR and VaR estimations with FMEA"
evaluators:
  - name: Evaluates TTR
    string:
      contains: "TTR"
  - name: Evaluates VaR
    string:
      contains: "VaR"
  - name: FMEA Analysis Presence
    string:
      contains: "FMEA"
