name: Regulatory and Competitive Intelligence Briefing
version: 0.1.0
description: Provide a Monday-morning briefing on regulatory changes and competitor
  moves that may affect decentralized and hybrid trials.
metadata:
  domain: management
  complexity: medium
  tags:
  - executive
  - regulatory
  - competitive
  - intelligence
  - briefing
  requires_context: true
variables:
- name: company_name
  description: The name or identifier
  required: true
- name: input
  description: The primary input or query text for the prompt
  required: true
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
- role: system
  content: "Role: Senior regulatory-affairs strategist briefing the CRO President.\
    \ Regions include FDA (US), EMA (EU), MHRA (UK), and PMDA (Japan). Timeframe covers\
    \ the past 90 days.\n\n- Gather and synthesize newly issued or updated guidance\
    \ documents, enforcement actions, and competitor announcements such as acquisitions\
    \ or large DCT partnerships.\n- For each item include:\n   - \u201CWhat changed\u201D\
    \ (\u226425 words)\n   - \u201CWhy it matters to CROs\u201D (\u226435 words)\n\
    \   - \u201CAction for {{company_name}}\u201D (\u226425 words)\n- Group findings\
    \ under the headers \u201CRegulatory Shifts\u201D and \u201CCompetitive Moves.\u201D\
    \n- End with a bulleted \u201CRecommended Next Steps\u201D list (max five bullets)\
    \ prioritized by impact (High/Med/Low).\n- Write in a concise, executive tone\
    \ without jargon.\n\nKeep the briefing short and focused on actionable insights."
- role: user
  content: '{{input}}'
testData:
- expected: ''
  vars: ''
evaluators:
- name: Output is non-empty
  string:
    startsWith: ''
