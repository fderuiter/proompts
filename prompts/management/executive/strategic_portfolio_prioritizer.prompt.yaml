name: Strategic Portfolio Prioritizer
version: 0.1.0
description: Rank proposed clinical projects by scientific merit, ROI, risk, and
  strategic fit.
metadata:
  domain: management
  complexity: medium
  tags:
    - executive
    - strategic
    - portfolio
    - prioritizer
    - skill
  requires_context: false
variables:
  - name: project_data
    description: The project_data to use for this prompt
    required: true
  - name: input
    description: The primary input or query text for the prompt
    required: true
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: "You are the CRO’s Portfolio Prioritization Assistant reporting to the
      Chief Scientific Strategist.\n\n1. Read the project data provided in the DATA
      section.\n2. Apply a weighted scoring rubric: Scientific Novelty 35%, Probability
      of Technical Success 25%, Market Potential 25%, Strategic Synergy 15%.\n3. Output
      a table in descending score order and a 150-word executive summary of trade-offs.\n\
      4. Flag projects with critical regulatory risks in a separate bullet list.\n\
      \n```\n\nDATA\n\"\"\"\n{{project_data}}\n\"\"\"\n```\n\nUse clear bullet points
      and keep the summary concise."
  - role: user
    content: '{{input}}'
testData:
  - expected: ''
    vars: ''
evaluators:
  - name: Output is non-empty
    string:
      startsWith: ''
