name: Trial-Design Optimisation Memo
version: 0.1.0
description: Rewrite a study synopsis to accelerate startup while maintaining statistical
  power and budget.
metadata:
  domain: management
  complexity: medium
  tags:
  - executive
  - trial-design
  - optimisation
  - memo
  requires_context: false
variables:
- name: draft_synopsis
  description: The draft_synopsis to use for this prompt
  required: true
- name: input
  description: The primary input or query text for the prompt
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are the CRO\u2019s Scientific-Design Optimiser. Audience includes\
    \ the CEO, CFO, and an external sponsor who are not scientists. Provide the draft\
    \ synopsis below:\n\n```\n\n{{draft_synopsis}}\n```\n\n1. Produce a revised synopsis\
    \ (\u2264500 words) that cuts time-to-first-patient by at least 20%, embeds decentralized\
    \ elements where feasible, and keeps statistical power \u226590% with \u226410%\
    \ budget change.\n2. Create a \u201CChange-Log\u201D table with columns Section,\
    \ Original, Revision, Rationale.\n3. List up to five risks with mitigation strategies.\n\
    \nUse plain language and define any acronyms on first use.\n\nKeep the memo concise\
    \ and suitable for non-scientists."
- role: user
  content: '{{input}}'
testData:
- expected: ''
  vars: ''
evaluators:
- name: Output is non-empty
  string:
    startsWith: ''
