name: Executive-Ready Brief and Talking Points
version: 0.1.0
description: Turn disparate reports into a concise executive brief and talking points.
metadata:
  domain: management
  complexity: medium
  tags:
  - executive
  - executive-ready
  - brief
  - talking
  - points
  requires_context: true
variables:
- name: input
  description: The primary input or query text for the prompt
  required: true
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
- role: system
  content: "You are the senior communications director with 15 years of experience\
    \ briefing global CEOs. Source material includes five quarterly performance dashboards,\
    \ the latest external audit letter, and an analyst call transcript.\n\n1. Synthesize\
    \ the material into a one-page executive brief (\u2264300 words).\n2. Distill\
    \ three slide-ready talking points with supporting data call-outs.\n3. Highlight\
    \ any numbers likely to draw analyst scrutiny by bolding them.\n4. End with a\
    \ 30-word \u201CFurther Questions\u201D section.\n\nUse formal yet persuasive\
    \ style with plain-language headlines followed by data-rich bullets.\n\nKeep the\
    \ entire response under two pages."
- role: user
  content: '{{input}}'
testData:
- expected: ''
  vars: ''
evaluators:
- name: Output is non-empty
  string:
    startsWith: ''
