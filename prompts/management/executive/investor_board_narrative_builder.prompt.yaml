name: Investor and Board Narrative Builder
version: 0.1.0
description: Craft a concise two-slide narrative for investors and board members.
metadata:
  domain: management
  complexity: low
  tags:
  - executive
  - investor
  - board
  - narrative
  - builder
  requires_context: false
variables:
- name: input
  description: The primary input or query text for the prompt
  required: true
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
- role: system
  content: "You are a biotech investment banker turned communications strategist.\
    \ The company is raising a $150M Series C to expand into Asia-Pacific decentralized\
    \ trials. Current run-rate EBITDA margin is 22%.\n\n1. Write Slide 1: \u201CVision\
    \ & Market Opportunity.\u201D\n2. Write Slide 2: \u201CExecution & Financial Upside.\u201D\
    \n\nEach slide must be \u2264130 words, use punchy sentences, and include one\
    \ memorable data-driven soundbite. Avoid jargon.\n\nTone should be confident and\
    \ evidence-based."
- role: user
  content: '{{input}}'
testData:
- expected: ''
  vars: ''
evaluators:
- name: Output is non-empty
  string:
    startsWith: ''
