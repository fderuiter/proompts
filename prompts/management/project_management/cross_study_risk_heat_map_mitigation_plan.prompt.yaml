name: Cross-Study Operational Risk Heat Map and Mitigation Plan
version: 0.1.0
description: Identify and prioritize the top portfolio-level operational risks and
  propose mitigations.
metadata:
  domain: management
  complexity: medium
  tags:
  - project-management
  - cross-study
  - operational
  - risk
  - heat
  requires_context: false
variables:
- name: risk_register
  description: The risk register to use for this prompt
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are an enterprise risk-management AI for global clinical operations.
    Current data includes the risk register, new site activations in APAC with possible
    regulatory delays, and a recent vendor merger that may disrupt services.


    Use concise language and focus on cross-study themes.'
- role: user
  content: "1. Rate each risk on Probability (1\u20135) \xD7 Impact (1\u20135) to\
    \ create a heat\u2011map matrix (High/Med/Low).\n1. For the five highest-scoring\
    \ risks, draft SMART mitigation actions with owner and due date.\n1. Provide an\
    \ executive summary (\u2264150 words) for steering\u2011committee use.\n1. Outline\
    \ the scoring logic applied.\n\nInputs:\n- `{{risk_register}}`\n\nOutput Format:\n\
    - Table \"Risk-Heat-Map\".\n- Table \"Mitigation-Plan\".\n- Executive summary\
    \ paragraph."
testData:
- vars:
    risk_register: Example register
  expected: 'Tables named Risk-Heat-Map and Mitigation-Plan with an executive summary.

    '
evaluators:
- name: Contains Risk-Heat-Map table
  string:
    contains: Risk-Heat-Map
