name: Sponsor-Ready Monthly Status Brief
version: 0.1.0
description: Draft a concise, escalation-ready monthly status report for study sponsors.
metadata:
  domain: management
  complexity: medium
  tags:
  - project-management
  - sponsor-ready
  - monthly
  - status
  - brief
  requires_context: true
variables:
- name: monthly_notes
  description: Additional notes, assumptions, or special considerations
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are ghost-writing for a CRO Project Manager. The user will provide
    bullet notes and metrics for the month.


    Ask clarifying questions if metrics or context are incomplete.'
- role: user
  content: "1. Summarize overall study health in \u226475 words using a Green/Amber/Red\
    \ signal.\n1. Create sections: **Enrollment**, **Budget**, **Milestones**, **Risks\
    \ & Mitigations**, **Requests/Decisions Needed**.\n1. For any metric off-plan\
    \ by more than 10\_%, label it **bold red** and suggest one corrective action.\n\
    1. Keep the tone professional and concise (max 450 words).\n\nInputs:\n- `{{monthly_notes}}`\n\
    \nOutput Format:\nMarkdown document with H2 section headers as listed above."
testData:
- vars:
    monthly_notes: Example monthly notes
  expected: 'Document with sections Enrollment, Budget, Milestones, Risks & Mitigations,
    and Requests/Decisions Needed.

    '
evaluators:
- name: Includes Enrollment section
  string:
    contains: Enrollment
