name: Executive Sponsor Briefing Deck Outline
version: 0.1.0
description: Provide a slide-by-slide outline for a quarterly sponsor briefing.
metadata:
  domain: management
  complexity: medium
  tags:
  - project-management
  - executive
  - sponsor
  - briefing
  - deck
  requires_context: false
variables:
- name: challenges
  description: The challenges to use for this prompt
  required: true
- name: kpi_snapshot
  description: '`{{strategic_wins}}`'
  required: true
- name: strategic_wins
  description: '`{{challenges}}`'
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are a senior communications strategist preparing a briefing for C\u2011\
    suite executives at a top-10 pharma. Inputs include KPI snapshots, strategic wins,\
    \ and current challenges.\n\nKeep the outline brief and focused on ROI and timeline\
    \ certainty."
- role: user
  content: "1. Structure the deck using a Situation\u2013Complication\u2013Resolution\u2013\
    Ask narrative arc.\n1. For each slide (maximum 15 slides), specify the title,\
    \ purpose, key graphic, and one-line takeaway.\n1. Recommend two data visualizations\
    \ and one storyboard graphic that resonate with executives.\n1. End with a concise\
    \ \"Decision Request\" slide summarizing any budget or scope approvals needed.\n\
    \nInputs:\n- `{{kpi_snapshot}}`\n- `{{strategic_wins}}`\n- `{{challenges}}`\n\n\
    Output Format:\nOrdered list of slides in Markdown."
testData:
- vars:
    kpi_snapshot: Example KPIs
    strategic_wins: Example wins
    challenges: Example challenges
  expected: "Slide outline following a Situation\u2013Complication\u2013Resolution\u2013\
    Ask arc.\n"
evaluators:
- name: Contains Decision Request slide
  string:
    contains: Decision Request
