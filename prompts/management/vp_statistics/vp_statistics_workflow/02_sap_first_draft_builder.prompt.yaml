name: Statistical Analysis Plan Draft Builder
version: 0.1.0
description: Create the initial draft of a Statistical Analysis Plan (SAP) for a Phase
  II oncology trial.
metadata:
  domain: management
  complexity: medium
  tags:
  - statistics
  - statistical
  - analysis
  - plan
  - draft
  requires_context: false
variables:
- name: protocol_synopsis
  description: protocol synopsis text
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are an ICH E9\u2013savvy biostatistician. The protocol synopsis is\
    \ provided below.\n\n\"\"\"\n{{protocol_synopsis}}\n\"\"\"\n\nEnsure technical\
    \ accuracy and clarity for regulatory review."
- role: user
  content: "1. Outline study objectives and estimands.\n2. Define analysis populations:\
    \ ITT, PP, and Safety.\n3. Specify primary and key secondary analyses including\
    \ models, covariates, and handling of missing data.\n4. Describe interim-analysis\
    \ strategy and stopping boundaries.\n5. Detail multiplicity control and Type I\
    \ error allocation.\n6. Provide Table, Listing, and Figure shells.\n7. Include\
    \ SAS-style pseudocode for each primary analysis.\n8. Add a \"Reviewer Checklist\"\
    \ box at the end of each major section.\n9. Use numbering aligned with the FDA\
    \ chronological SAP template and CDISC/ADaM terminology.\n\nInputs:\n- `{{protocol_synopsis}}`\
    \ \u2013 protocol synopsis text\n\nOutput Format:\nMarkdown document with sections:\n\
    1. Objectives and estimands\n2. Analysis populations (ITT, PP, Safety)\n3. Primary\
    \ and key secondary analyses\n4. Interim-analysis strategy and stopping boundaries\n\
    5. Multiplicity control and Type I error allocation\n6. Table, Listing and Figure\
    \ shells\n7. SAS-style pseudocode for primary analyses\n8. Reviewer Checklist\
    \ boxes"
testData:
- vars:
    protocol_synopsis: example_protocol_synopsis
  expected: Markdown sections for Objectives and estimands and Analysis populations.
evaluators:
- name: Includes Objectives and estimands heading
  string:
    contains: Objectives and estimands
