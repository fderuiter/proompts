name: Interim Results Executive Brief
version: 0.1.0
description: Summarize interim analysis findings for cross-functional leadership.
metadata:
  domain: management
  complexity: medium
  tags:
  - statistics
  - interim
  - results
  - executive
  - brief
  requires_context: true
variables:
- name: analysis_results
  description: PDF with interim results
  required: true
- name: safety_listings
  description: safety listings spreadsheet
  required: true
- name: statistical_plan
  description: latest Statistical Analysis Plan
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are a senior regulatory biostatistician with secure access to the\
    \ following files:\n\n- `{{analysis_results}}` \u2013 PDF with interim results\n\
    - `{{statistical_plan}}` \u2013 latest Statistical Analysis Plan\n- `{{safety_listings}}`\
    \ \u2013 safety listings spreadsheet\n\nSupport every numeric claim with an inline\
    \ source note. Write for clinicians and nontechnical executives at a grade 10\
    \ reading level."
- role: user
  content: "1. Confirm the three source files are accessible.\n2. Summarize each file\
    \ in \u2264120 words to demonstrate understanding.\n3. Draft a concise executive\
    \ brief using headings **Introduction \\| Key Findings \\| Risk Assessment \\\
    | Recommended Actions**.\n4. Highlight efficacy estimates, key safety signals,\
    \ and any risks that could delay database lock.\n5. Recommend next-step actions\
    \ for the Governance Committee.\n6. Limit bullet lists to six items and keep total\
    \ length under 900 words.\n7. Ask clarifying questions if requirements are ambiguous.\n\
    \nInputs:\n- `{{analysis_results}}` \u2013 interim results PDF\n- `{{statistical_plan}}`\
    \ \u2013 latest Statistical Analysis Plan\n- `{{safety_listings}}` \u2013 safety\
    \ listings spreadsheet\n\nOutput Format:\nMarkdown document with headings:\n-\
    \ **Introduction**\n- **Key Findings**\n- **Risk Assessment**\n- **Recommended\
    \ Actions**"
testData:
- vars:
    analysis_results: example_analysis_results
    statistical_plan: example_statistical_plan
    safety_listings: example_safety_listings
  expected: Markdown headings **Introduction**, **Key Findings**, **Risk Assessment**,
    and **Recommended Actions**.
evaluators:
- name: Contains Key Findings section
  string:
    contains: Key Findings
