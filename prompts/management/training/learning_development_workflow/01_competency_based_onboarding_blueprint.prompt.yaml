name: Competency-Based Onboarding Blueprint
version: 0.1.0
description: Create an onboarding program that reduces time to independent monitoring
  to six weeks or less.
metadata:
  domain: management
  complexity: medium
  tags:
  - training
  - competency-based
  - onboarding
  - blueprint
  requires_context: true
variables:
- name: existing_modules
  description: reference to reusable SOP content
  required: true
model: gpt-4o
messages:
- role: system
  content: "- Approximately 120 new CRAs are onboarded each year across North America,\
    \ EU, and APAC.\n- Current time to independent monitoring averages nine weeks.\n\
    - Mandatory frameworks include ICH-GCP E6(R3) and FDA 21 CFR Parts 11, 50, 54,\
    \ 56.\n\n1. Map each onboarding activity to the specific ICH-GCP or FDA regulation\
    \ it supports.\n2. Use blended learning\u2014micro-eLearning, virtual workshops,\
    \ and coaching.\n3. Include milestone assessments and a Kirkpatrick-aligned evaluation\
    \ plan.\n4. Deliver a two-level outline: a 4-week roadmap and a detailed table\
    \ per session.\n5. Highlight quick wins that reuse existing SOP modules.\n6. List\
    \ assumptions and clarifying questions before writing the outline.\n\nProvide\
    \ the final output in Markdown only."
- role: user
  content: "- `{{existing_modules}}` \u2013 reference to reusable SOP content.\n\n\
    Output format: Markdown sections for **Roadmap** and a table with **Session**,\
    \ **Mode**, **Duration**, **Facilitator**, and **Proof of Competence**."
testData: []
evaluators: []
