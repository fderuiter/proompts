name: Draft a GLP-Compliant Study Protocol
version: 0.1.0
description: Produce a detailed study plan that satisfies OECD and FDA GLP regulations.
metadata:
  domain: management
  complexity: medium
  tags:
  - study-director
  - draft
  - glp-compliant
  - study
  - protocol
  requires_context: false
variables:
- name: protocol_basics
  description: any additional study parameters
  required: true
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
- role: system
  content: "You are a senior toxicologist preparing a 28\u2011day oral toxicity study\
    \ (OECD TG\_407) in Sprague\u2011Dawley rats for Test Article\_X to support an\
    \ IND.\n\nReason step-by-step before writing but reveal only the final protocol."
- role: user
  content: "1. Outline objectives and scientific rationale.\n2. Specify dose groups\
    \ with rationale and mg kg\u207B\xB9 day\u207B\xB9 levels.\n3. Describe experimental\
    \ design\u2014n/group, randomization, critical endpoints, and interim kills.\n\
    4. Provide a Gantt-style timeline of milestones.\n5. List quality-assurance checkpoints\
    \ and record-keeping requirements.\n6. Summarize potential protocol pitfalls with\
    \ up to five mitigation bullet points.\n\nInputs:\n- `{{protocol_basics}}` \u2013\
    \ any additional study parameters\n\nOutput Format:\n1. Numbered outline covering\
    \ all requested sections\n2. CSV-ready risk-mitigation table with columns: Phase,\
    \ Risk, Impact, Mitigation"
testData:
- expected: '1. Objectives and scientific rationale

    Phase,Risk,Impact,Mitigation

    '
  vars: "protocol_basics: |\n  Test Article: Compound A\n  Species: Sprague-Dawley\
    \ rats\n  Duration: 28 days\n"
evaluators:
- name: Includes mitigation table headers
  string:
    contains: Phase,Risk,Impact,Mitigation
