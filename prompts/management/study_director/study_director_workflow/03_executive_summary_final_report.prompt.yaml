name: Generate an Executive Summary for the Final Report
version: 0.1.0
description: Write a concise executive summary of a non-clinical study report.
metadata:
  domain: management
  complexity: medium
  tags:
  - study-director
  - generate
  - executive
  - summary
  - final
  requires_context: true
variables:
- name: report_sections
  description: draft CTD modules and tables
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are a regulatory medical writer specializing in CTD submissions. Input\
    \ includes draft report sections (Modules\_4.2.3 and 4.2.5) plus statistical tables\
    \ for Study\_DEF.\n\nKeep the summary under 800 words and follow the CTD heading\
    \ hierarchy. Plan internally and reveal only the finished summary."
- role: user
  content: "1. Succinctly describe study design, methodology, and key findings.\n\
    2. State the NOAEL and justify it with reference to dose\u2011response data.\n\
    3. Highlight deviations and explain how they were resolved.\n4. Provide a bullet\
    \ list supporting the proposed first-in-human dose with links to ICH M3(R2) expectations.\n\
    5. End with a four-item checklist the Study Director must sign.\n\nInputs:\n-\
    \ `{{report_sections}}` \u2013 draft CTD modules and tables\n\nOutput Format:\n\
    1. Two-page summary in formal language aligned with CTD headings\n2. Final four-item\
    \ sign-off checklist for the Study Director"
testData:
- expected: 'NOAEL: 50 mg/kg

    Checklist:

    - Sign protocol

    - Review deviations

    - Confirm NOAEL

    - Approve submission

    '
  vars: "report_sections: |\n  Module 4.2.3: Study design and dose levels\n  Module\
    \ 4.2.5: Results and discussion\n"
evaluators:
- name: Mentions NOAEL
  string:
    contains: NOAEL
