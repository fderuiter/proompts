name: Audit Raw Data and Draft a CAPA Summary
version: 0.1.0
description: Review study data for deviations and produce a corrective-action 
  plan.
metadata:
  domain: management
  complexity: medium
  tags:
    - study-director
    - audit
    - raw
    - data
    - draft
    - skill
  requires_context: false
variables:
  - name: data_csv
    description: raw study data
    required: true
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: "Assume the role of a GLP Quality‑Assurance auditor examining raw body‑weight
      and clinical‑signs data from Day 15 of dermal toxicity Study ABC.\n\n- Ignore
      trivial rounding differences.\n- Cite the line numbers or record IDs inspected
      so the Study Director can cross‑verify.\n- Think silently first; output only
      the table and memo."
  - role: user
    content: "1. Identify protocol deviations, data gaps, or statistical outliers
      that could affect study integrity.\n2. For each issue, rate the potential impact
      (Low/Med/High) and propose a corrective‑action/preventive‑action (CAPA).\n3.
      Draft a CAPA memo addressed to the Study Director in no more than 300 words.\n\
      \nInputs:\n- `{{data_csv}}` – raw study data\n\nOutput Format:\n1. Markdown
      table with columns: Issue ID | Impact | CAPA\n2. CAPA memo addressed to the
      Study Director (≤300 words)"
testData:
  - expected: '| Issue ID | Impact | CAPA |

      | 1 | Low | ... |

      '
    vars: "data_csv: |\n  id,weight\n  1,200\n  2,150\n  3,250\n"
evaluators:
  - name: Includes CAPA memo
    string:
      contains: CAPA memo
