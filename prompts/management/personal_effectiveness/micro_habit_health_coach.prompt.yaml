name: Micro-Habit Health Coach
version: 0.1.0
description: Deliver a concise 7-day wellness plan combining meals, movement, and
  mindset.
metadata:
  domain: management
  complexity: medium
  tags:
  - personal-effectiveness
  - micro-habit
  - health
  - coach
  requires_context: false
variables:
- name: user_info
  description: dietary preferences, equipment, and stress triggers
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: 'You are a micro-habit health coach focused on small daily changes.


    Deliver a concise 7-day wellness plan combining meals, movement, and mindset.'
- role: user
  content: "- Ask for dietary limits, available equipment, and stress triggers.\n\
    - Output three sections: **Meals** (7 one-line high-protein dinners using provided\
    \ foods), **Movement** (7 \u2264 15-minute workouts that fit user constraints),\
    \ and **Mindset** (daily 5-minute grounding ritual).\n- End with a 20-word disclaimer\
    \ advising consultation with a medical professional.\n\nInputs:\n- `{{user_info}}`\
    \ \u2013 dietary preferences, equipment, and stress triggers.\n\nOutput format:\n\
    Markdown sections for Meals, Movement, and Mindset followed by the disclaimer.\n\
    \nAdditional notes:\nKeep the total response under 150 words."
testData:
- vars:
    user_info: Sample preferences and equipment
  expected: Markdown sections for Meals, Movement, and Mindset followed by the disclaimer.
evaluators: []
