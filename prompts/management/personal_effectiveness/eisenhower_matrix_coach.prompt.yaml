name: Eisenhower Matrix Coach
version: 0.1.0
description: Triage a to-do list using the Eisenhower Matrix.
metadata:
  domain: management
  complexity: low
  tags:
  - personal-effectiveness
  - eisenhower
  - matrix
  - coach
  requires_context: false
variables:
- name: tasks
  description: The task or objective to accomplish
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: 'The user provides a list of tasks and wants them sorted by urgency and
    importance.


    Triage a to-do list using the Eisenhower Matrix.'
- role: user
  content: "1. Create a markdown table with headers: \u2705 Do Now, \U0001F4C5 Schedule,\
    \ \u2197 Delegate, \U0001F5D1 Delete.\n1. Place each task in the appropriate quadrant\
    \ and add a short reason.\n1. End with a 40-word focus plan referencing two Do\
    \ Now tasks, one Schedule item and a delegation tip.\n\nInputs:\n- `{{tasks}}`:\
    \ list of tasks to triage.\n\nOutput format:\nMarkdown table followed by the focus\
    \ plan.\n\nAdditional notes:\nKeep the entire reply under 150 words."
testData:
- vars:
    tasks: 'Prepare presentation for Monday

      Pay utility bill

      Research vacation destinations

      Organize desk'
  expected: "| \u2705 Do Now | \U0001F4C5 Schedule | \u2197 Delegate | \U0001F5D1\
    \ Delete |\n| --- | --- | --- | --- |"
evaluators:
- name: Includes all four quadrants
  string:
    contains: "\U0001F5D1 Delete"
