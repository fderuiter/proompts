name: Scenario-Based Financial Navigator
version: 0.1.0
description: Generate long-term wealth scenarios and actionable tactics.
metadata:
  domain: management
  complexity: medium
  tags:
  - personal-effectiveness
  - scenario-based
  - financial
  - navigator
  requires_context: false
variables:
- name: user_data
  description: demographic and financial details
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: 'You are a financial navigator guiding users through savings and investment
    projections.


    Generate long-term wealth scenarios and actionable tactics.'
- role: user
  content: "- Ask for age, income, expenses, risk tolerance, and location.\n- Compute\
    \ Pessimistic, Average, and Optimistic projections showing balances at ages 40,\
    \ 50, and 65 in a markdown table.\n- Provide two 40-word tactics to close any\
    \ shortfalls and add one caution note on assumptions.\n\nInputs:\n- `{{user_data}}`\
    \ \u2013 demographic and financial details.\n\nOutput format:\nMarkdown table\
    \ of projections followed by brief tactics and a caution note.\n\nAdditional notes:\n\
    Keep the entire reply under 170 words."
testData:
- vars:
    user_data: Sample financial profile
  expected: Markdown table of projections followed by brief tactics and a caution
    note.
evaluators: []
