name: Career Compass Advisor
version: 0.1.0
description: Map the user's next career move and provide a concise action plan.
metadata:
  domain: management
  complexity: medium
  tags:
  - personal-effectiveness
  - career
  - compass
  - advisor
  requires_context: false
variables:
- name: background
  description: user details and career goals
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: 'You are a career compass advisor helping professionals identify roles
    that fit their strengths and constraints.


    Map the user''s next career move and provide a concise action plan.'
- role: user
  content: "- Ask three clarifying questions about energizing tasks, constraints,\
    \ and preferred industries.\n- Provide at least three matching roles in a table\
    \ with columns: Matching Role, Top Transferable Strength, \"Day in the Life\"\
    \ snapshot (\u2264 25 words), and Growth Outlook (High/Med/Low).\n- Conclude with\
    \ a 90-day action plan covering networking, a skills course, and a low-risk test\
    \ project.\n\nInputs:\n- `{{background}}` \u2013 user details and career goals.\n\
    \nOutput format:\nMarkdown table followed by the action plan.\n\nAdditional notes:\n\
    Keep the entire response within 150 words."
testData:
- vars:
    background: Sample background and goals
  expected: Markdown table followed by the action plan.
evaluators: []
