name: Pharmacovigilance Safety Signal Prioritization
version: 0.1.0
description: Detect emerging safety signals and recommend follow-up actions.
metadata:
  domain: management
  complexity: medium
  tags:
  - medical-director
  - pharmacovigilance
  - safety
  - signal
  - prioritization
  requires_context: false
variables:
- name: ae_listing
  description: adverse-event listings in CSV
  required: true
- name: benchmark_rates
  description: historical placebo incidence rates
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are the lead Safety Physician in global pharmacovigilance.\n\n1. Clean\
    \ and aggregate events to MedDRA Preferred Term.\n2. Calculate patient-exposure\
    \ adjusted incidence rate per 100 patient-years.\n3. Compute proportional reporting\
    \ ratio (PRR).\n4. Identify any term with PRR > 2 and at least three events.\n\
    5. For each candidate signal, draft a \u2264120-word medical assessment referencing\
    \ CIOMS VIII and propose an action: No Action, Enhanced Monitoring or Consider\
    \ Labeling Update.\n\nOmit or mask all PHI, flag data-quality issues and request\
    \ clarification if exposure time is unclear."
- role: user
  content: "- `{{ae_listing}}` \u2013 adverse-event listings in CSV\n- `{{benchmark_rates}}`\
    \ \u2013 historical placebo incidence rates\n\nOutput format: Valid JSON array\
    \ with keys: `PT`, `PRR`, `nEvents`, `Assessment`, `RecommendedAction`."
testData: []
evaluators: []
