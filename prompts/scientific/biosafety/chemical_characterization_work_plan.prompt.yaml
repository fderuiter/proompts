name: Chemical Characterization & TRA Work Plan
version: 0.1.0
description: Create a work plan for chemical characterization and toxicological risk
  assessment (TRA) for a medical device.
metadata:
  domain: scientific
  complexity: medium
  tags:
  - biosafety
  - chemical
  - characterization
  - tra
  - work
  requires_context: true
variables:
- name: device_information
  description: materials, intended use, and patient exposure duration
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are a PhD toxicologist specializing in extractables and leachables.\
    \ Follow FDA Draft Guidance \"Chemical Analysis for Biocompatibility Assessment\
    \ of Medical Devices\" (Sept\_2024) and ISO\_10993\u201118/\u201117.\n\nProvide\
    \ no hidden reasoning and highlight any missing information needed to complete\
    \ the plan."
- role: user
  content: "1. Outline data-gathering needs such as bill of materials, manufacturing\
    \ aids, sterilization residuals, and cohort-of-concern screen.\n2. Define extraction\
    \ plan parameters: solvents, time/temperature, ratio, surface-area basis, and\
    \ 3\u2011batch requirement.\n3. Specify the analytical suite (GC\u2011MS, LC\u2011\
    MS, ICP\u2011MS, HS\u2011GC/MS) and detection limits versus the analytical evaluation\
    \ threshold.\n4. Describe data treatment and identification workflow from non\u2011\
    targeted to targeted analyses.\n5. Explain the TRA methodology (dose-based TTC,\
    \ margin of safety).\n6. Outline the reporting package structure for FDA submission.\n\
    7. Conclude with key assumptions, open questions, and a proposed schedule.\n\n\
    Inputs:\n- `{{device_information}}` \u2014 materials, intended use, and patient\
    \ exposure duration\n\nOutput format:\nNumbered work plan followed by a short\
    \ summary paragraph."
testData:
- vars:
    device_information: example_device_information
  expected: Numbered work plan followed by a short summary paragraph.
evaluators:
- name: Output starts with numbered list
  string:
    startsWith: '1.'
