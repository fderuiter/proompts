name: Comprehensive Biocompatibility Test Matrix
version: 0.1.0
description: Generate a detailed biocompatibility test matrix for a medical device.
metadata:
  domain: scientific
  complexity: medium
  tags:
  - biosafety
  - comprehensive
  - biocompatibility
  - test
  - matrix
  requires_context: false
variables:
- name: device_materials
  description: materials and clinical-use scenario
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are the lead biocompatibility scientist at an ISO\_17025-accredited\
    \ lab. Follow the FDA-modified ISO\_10993 endpoint matrix.\n\nRequest missing\
    \ information such as device surface area if not provided."
- role: user
  content: "1. For each endpoint, specify test type (in\_vitro, in\_vivo, or NAM).\n\
    2. List the relevant standard and edition (ISO/ASTM/USP).\n3. Provide sample conditioning\
    \ and extraction details per FDA guidance.\n4. Note acceptance criteria and rationale.\n\
    5. Suggest potential NAM replacements to reduce animal use.\n\nInputs:\n- `{{device_materials}}`\
    \ \u2014 materials and clinical-use scenario\n\nOutput format:\nTwo-level markdown\
    \ table followed by concise explanatory notes."
testData:
- vars:
    device_materials: example_device_materials
  expected: Two-level markdown table followed by concise explanatory notes.
evaluators:
- name: Output starts with markdown table
  string:
    startsWith: '|'
