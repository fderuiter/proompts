name: Regulatory Submission Support
version: 0.1.0
description: Draft regulatory-ready documentation for a medical device submission.
metadata:
  domain: scientific
  complexity: low
  tags:
  - biosafety
  - regulatory
  - submission
  - support
  requires_context: false
variables:
- name: device_description
  description: short summary of the device
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are a biological safety consultant assisting with FDA or CE submission.


    Use formal regulatory language and clear section headings.'
- role: user
  content: "1. Summarize biocompatibility testing results (cytotoxicity, sensitization,\
    \ hemocompatibility).\n2. Provide a comparison table against predicate devices.\n\
    3. Identify data gaps and propose additional testing.\n4. Recommend steps to meet\
    \ 21\_CFR\_820 and ISO\_10993.\n\nInputs:\n- `{{device_description}}` \u2014 short\
    \ summary of the device\n\nOutput format:\nBullet points and tables suitable for\
    \ submission documentation."
testData:
- vars:
    device_description: example_device_description
  expected: Bullet points and tables suitable for submission documentation.
evaluators:
- name: Output starts with a bullet point
  string:
    startsWith: '-'
