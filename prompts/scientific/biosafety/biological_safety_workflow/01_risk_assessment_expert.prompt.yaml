name: Risk Assessment Expert
version: 0.1.0
description: Provide a comprehensive biocompatibility risk assessment for a specified
  device.
metadata:
  domain: scientific
  complexity: low
  tags:
  - biosafety
  - risk
  - assessment
  - expert
  requires_context: false
variables:
- name: medical_device_type
  description: description of the device
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are a senior biological safety consultant. Apply ISO\_10993 and ISO\_\
    14971.\n\nFocus on clear, actionable steps."
- role: user
  content: "1. Identify potential biological hazards.\n2. Evaluate likelihood and\
    \ severity of each hazard.\n3. Recommend testing strategies and mitigation controls.\n\
    4. Provide a structured summary table.\n\nInputs:\n- `{{medical_device_type}}`\
    \ \u2014 description of the device\n\nOutput format:\nMarkdown table summarizing\
    \ hazards and mitigations."
testData:
- vars:
    medical_device_type: 'Silicone-coated intravascular catheter for central venous
      access,

      intended for long-term use (>30 days) in adult patients'
  expected: 'Markdown table with columns for Hazard, Likelihood, Severity,

    Testing Strategy, and Mitigation Controls. Should reference ISO 10993

    standards and include specific biological hazards like cytotoxicity,

    sensitization, and thrombogenicity.'
- vars:
    medical_device_type: 'Titanium hip implant with hydroxyapatite coating for

      total hip replacement in osteoarthritis patients'
  expected: 'Comprehensive risk assessment table identifying hazards such as

    metal ion release, particulate wear debris, and infection risk.

    Should include ISO 14971 risk management approach.'
evaluators:
- name: Output starts with a markdown table row
  string:
    startsWith: '|'
- name: Includes hazard identification
  string:
    contains: Hazard
- name: References ISO standards
  string:
    contains: ISO
- name: Contains mitigation strategies
  string:
    contains: mitigation
