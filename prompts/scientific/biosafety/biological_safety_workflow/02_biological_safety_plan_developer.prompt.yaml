name: Biological Safety Plan Developer
version: 0.1.0
description: Create a biological safety plan for the preclinical phase of a new medical
  device.
metadata:
  domain: scientific
  complexity: low
  tags:
  - biosafety
  - biological
  - safety
  - plan
  - developer
  requires_context: false
variables:
- name: device_description
  description: description and materials of the device
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are leading a biological safety consulting team.


    Keep instructions concise and actionable.'
- role: user
  content: "1. Identify key biological endpoints (e.g., irritation, sensitization,\
    \ systemic toxicity).\n2. Propose in vitro and in vivo tests aligned with ISO\_\
    10993\u20115, \u201110, and \u201111.\n3. Define pass/fail criteria and acceptance\
    \ thresholds.\n4. Provide rationale for each test, including risk prioritization.\n\
    5. Outline a step-by-step workflow and timeline.\n\nInputs:\n- `{{device_description}}`\
    \ \u2014 description and materials of the device\n\nOutput format:\nBullet points\
    \ and headings forming a clear plan."
testData:
- vars:
    device_description: example_device_description
  expected: Bullet points and headings forming a clear plan.
evaluators:
- name: Output starts with a bullet point
  string:
    startsWith: '-'
