evaluators:
- type: model_graded
  model: gpt-4o
  prompt: >
    You are a Senior Systems Neurophysiologist. Evaluate the generated biophysical
    CPG model design.

    Assess the following:

    1. Does the response utilize strictly formatted LaTeX equations, specifically
    containing the membrane equation $\tau_m \frac{dV_m}{dt} = -I_{leak} - I_{syn}
    + I_{ext}$ and the Nernst equation?

    2. Are the specific ionic conductances (e.g., $I_T$, $I_h$) and synaptic transmission
    mechanisms correctly formulated using Hodgkin-Huxley kinetics?

    3. Does the design accurately reflect the specified circuit topology and incorporate
    dynamical systems analysis (e.g., phase-plane, bifurcations)?

    4. Is the persona highly authoritative and devoid of explanatory filler?

    Return YES if all constraints are met and mathematically rigorous, otherwise return
    NO.
