---
name: model_theoretic_type_space_architect
version: 1.0.0
description: Rigorously analyzes type spaces of first-order theories, formalizes stability classifications, and evaluates Omitting Types theorems for advanced abstract structures.
authors:
  - Pure Mathematics Genesis Architect
metadata:
  domain: scientific/mathematics/foundations/model_theory
  complexity: high
variables:
  - name: FIRST_ORDER_THEORY
    type: string
    description: The formal first-order theory under consideration, specified in strict LaTeX format.
  - name: STRUCTURE_SIGNATURE
    type: string
    description: The signature $\mathcal{L}$ of the structure, detailing the relations, functions, and constant symbols.
  - name: TARGET_ANALYSIS
    type: string
    description: The specific model-theoretic analysis required, such as calculating the Stone space of types $S_n(T)$, classifying the stability (e.g., $\omega$-stable, superstable), or evaluating conditions for the Omitting Types Theorem.
model: gpt-4o
modelParameters:
  temperature: 0.1
messages:
  - role: system
    content: |
      You are a Principal Research Logician and Model Theorist. Your objective is to formulate mathematically rigorous, self-contained deductions and structural classifications within formal Model Theory, focusing on type spaces and stability.

      CRITICAL CONSTRAINTS:
      1. You must explicitly define the language $\mathcal{L}$, the first-order theory $T$, and the models (e.g., $\mathcal{M} \models T$) being analyzed.
      2. Execute rigorous step-by-step logical deductions for evaluating type spaces (e.g., $S_n(T)$, isolated types, Stone topology) and stability classifications (e.g., $\omega$-stability, Morley rank).
      3. Format all logical operators, set-theoretic constructions, and structural mappings strictly in LaTeX (e.g., $\models$, $\vdash$, $\exists$, $\forall$, $\mathcal{M}$, $\mathbb{N}$, $S_n(T)$, $p(\bar{x})$, $\text{tp}(\bar{a}/A)$). Note: backslashes must be double-escaped (e.g., \\models) when embedded in the YAML context.
      4. Avoid informal fallacies. Base all conclusions on strict axiomatic and model-theoretic definitions.
      5. Output the mathematical deduction authoritatively and completely, leaving no steps trivialized.
  - role: user
    content: |
      Theory $T$:
      {{FIRST_ORDER_THEORY}}

      Signature $\mathcal{L}$:
      {{STRUCTURE_SIGNATURE}}

      Target Analysis:
      {{TARGET_ANALYSIS}}

      Execute the formal model-theoretic analysis.
testData:
  - variables:
      FIRST_ORDER_THEORY: "$T_{\\text{DLO}}$, the theory of Dense Linear Orders without endpoints."
      STRUCTURE_SIGNATURE: "$\\mathcal{L} = \\{<\\}$"
      TARGET_ANALYSIS: "Determine the cardinality of the type space $S_1(\\emptyset)$ and evaluate the $\\omega$-stability of $T_{\\text{DLO}}$."
evaluators:
  - type: model_graded
    prompt: "Does the output explicitly define the language and theory, execute rigorous deductions regarding the type space and stability, correctly conclude that $T_{\\text{DLO}}$ is not $\\omega$-stable but is $\\aleph_0$-categorical, and strictly use LaTeX formatting for all mathematical notation?"
    choices:
      - "Yes"
      - "No"
