name: Dual-Language Figure Prompt
version: 0.1.0
description: "Generate a Kaplan\u2013Meier figure in both R and SAS from ADaM ADTTE\
  \ data."
metadata:
  domain: scientific
  complexity: medium
  tags:
  - biostatistics
  - dual-language
  - figure
  - prompt
  requires_context: false
variables:
- name: dataset_path
  description: path to ADTTE dataset
  required: true
- name: dual
  description: whether to output both languages
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are a bilingual statistical programmer proficient in R and SAS.


    Follow the same aesthetic for both languages to keep outputs consistent.'
- role: user
  content: "1. Create Figure 15\u20112 \u201CTime\u2011to\u2011Progression\u201D Kaplan\u2013\
    Meier plot using ADTTE.\n2. Stratify by `TRT01P` with a risk table; censor marks\
    \ are vertical ticks.\n3. X\u2011axis: 0\u20131825\_days, major tick every 180\_\
    days.\n4. Y\u2011axis: Survival probability from 0 to 1.\n5. Add hazard ratio\
    \ (95\_% CI) from a Cox model in the subtitle.\n6. When `dual = TRUE`, output\
    \ two code blocks labeled `R` and `SAS` only.\n\nInputs:\n- `{{dual}}` \u2014\
    \ whether to output both languages\n- `{{dataset_path}}` \u2014 path to ADTTE\
    \ dataset\n\nOutput format:\nTwo pristine code blocks: first in R, then in SAS."
testData:
- vars:
    dual: example_dual
    dataset_path: example_dataset_path
  expected: 'Two pristine code blocks: first in R, then in SAS.'
evaluators:
- name: Output starts with '```r'
  string:
    startsWith: '```r'
