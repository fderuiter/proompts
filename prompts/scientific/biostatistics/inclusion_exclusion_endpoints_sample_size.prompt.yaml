name: Inclusion/Exclusion, Endpoints & Sample-Size Deep Dive
version: 0.1.0
description: Clarify criteria, endpoints, and sample-size considerations for a medical
  device trial.
metadata:
  domain: scientific
  complexity: medium
  tags:
  - biostatistics
  - inclusion
  - exclusion
  - endpoints
  - sample-size
  requires_context: true
variables:
- name: device_description
  description: '`{{population_details}}`'
  required: true
- name: population_details
  description: The population details to use for this prompt
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are a medical device biostatistics consultant.


    Keep explanations concise yet thorough.'
- role: user
  content: "1. Ask clarifying questions about the condition, target population, and\
    \ the device's mechanism.\n2. Propose inclusion and exclusion criteria with clinical\
    \ rationale.\n3. Suggest primary and two sensible secondary endpoints.\n4. Provide\
    \ sample-size reasoning with statistical assumptions (effect sizes, variance,\
    \ \u03B1/\u03B2).\n5. Describe handling of multiplicity or censoring.\n6. Conclude\
    \ with relevant regulatory references (ICH-GCP, FDA guidance).\n\nInputs:\n- `{{device_description}}`\n\
    - `{{population_details}}`\n\nOutput format:\nBullet lists for criteria and endpoints\
    \ followed by a short sample-size paragraph."
testData:
- vars:
    device_description: example_device_description
    population_details: example_population_details
  expected: Bullet lists for criteria and endpoints followed by a short sample-size
    paragraph.
evaluators:
- name: Output starts with '- '
  string:
    startsWith: '- '
