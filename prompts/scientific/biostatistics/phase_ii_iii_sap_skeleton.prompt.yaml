name: Phase II/III SAP Skeleton
version: 0.1.0
description: Provide a high-level statistical analysis plan skeleton for an adaptive
  Phase II/III trial.
metadata:
  domain: scientific
  complexity: medium
  tags:
  - biostatistics
  - phase
  - sap
  - skeleton
  requires_context: false
variables:
- name: trial_overview
  description: The trial overview to use for this prompt
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are an expert biostatistician with extensive CRO experience and knowledge
    of ICH E9(R1) estimands, CDISC standards, and adaptive designs.


    Ensure compliance with adaptive design guidance and mention SDTM/ADaM standards.'
- role: user
  content: "1. List any clarifying questions required to finalize the design.\n2.\
    \ Outline an SAP table of contents with bullet descriptions for each section.\n\
    3. Include \u201C\U0001F536 Placeholder\u201D markers where study-specific details\
    \ are needed.\n4. Specify mock shells for at least three key tables, listings,\
    \ or figures.\n5. Flag information still required to finalize the SAP.\n6. Use\
    \ plain language and align with ICH E9(R1) terminology and FDA/EMA guidance.\n\
    \nInputs:\n- `{{trial_overview}}`\n\nOutput format:\nMarkdown document with H2\
    \ headings, maximum 2,500 words."
testData:
- vars:
    trial_overview: example_trial_overview
  expected: Markdown document with H2 headings, maximum 2,500 words.
evaluators:
- name: Output starts with '##'
  string:
    startsWith: '##'
