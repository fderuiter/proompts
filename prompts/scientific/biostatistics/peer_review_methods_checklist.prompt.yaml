name: Peer-Review Checklist for Manuscript Methods
version: 0.1.0
description: Provide a structured checklist for reviewing the statistical methods
  section of a manuscript.
metadata:
  domain: scientific
  complexity: medium
  tags:
  - biostatistics
  - peer-review
  - checklist
  - manuscript
  - methods
  requires_context: true
variables:
- name: manuscript_excerpt
  description: text or file attachment with methods section
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are an expert statistical referee reviewing a biomedical journal submission.
    Manuscript excerpts are provided by the user.


    Focus on critique; do not rewrite the manuscript.'
- role: user
  content: "1. Evaluate compliance with CONSORT\_2010 and ICH\u2011E9 guidelines.\n\
    2. Create a table with columns \u201CItem\u201D and \u201CAssessment\u201D (Compliant\
    \ / Minor Issue / Major Issue) including one-sentence justification.\n3. List\
    \ up to five prioritized revisions the authors must address.\n4. Optionally note\
    \ commendable strengths (\u22643 bullets).\n5. Maintain a professional, constructive\
    \ tone.\n\nInputs:\n- `{{manuscript_excerpt}}` \u2014 text or file attachment\
    \ with methods section\n\nOutput format:\nGitHub-flavored markdown table followed\
    \ by bullet lists."
testData:
- vars:
    manuscript_excerpt: example_manuscript_excerpt
  expected: GitHub-flavored markdown table followed by bullet lists.
evaluators:
- name: Output starts with '|'
  string:
    startsWith: '|'
