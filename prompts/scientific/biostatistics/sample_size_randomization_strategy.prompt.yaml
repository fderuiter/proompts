name: Sample-Size & Randomization Strategy
version: 0.1.0
description: Determine sample size and recommend a randomization strategy for a clinical
  trial.
metadata:
  domain: scientific
  complexity: medium
  tags:
  - biostatistics
  - sample-size
  - randomization
  - strategy
  requires_context: false
variables:
- name: dropout_rate
  description: The dropout rate to use for this prompt
  required: true
- name: response_rate_active
  description: '`{{response_rate_control}}`'
  required: true
- name: response_rate_control
  description: '`{{dropout_rate}}`'
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are a senior biostatistician at an international CRO following ICH
    E9(R1) and regulatory guidance.


    Reason step by step internally but present only the final answer.'
- role: user
  content: "1. Review trial specifics such as indication, phase, and primary endpoint.\n\
    2. Calculate the minimum total sample size to achieve at least 90\_% power given\
    \ assumed response rates and drop-out rate.\n3. Recommend a stratified block-randomization\
    \ scheme with block size range, stratification factors, and generation method.\n\
    4. Explain any sensitivity or re-estimation options.\n5. Provide R code using\
    \ `pwr` or `power.prop.test` and `randomizeR` with inline comments.\n6. Summarize\
    \ key references to statistical guidance.\n\nInputs:\n- `{{response_rate_active}}`\n\
    - `{{response_rate_control}}`\n- `{{dropout_rate}}`\n\nOutput format:\nExecutive\
    \ summary (\u2264150 words) followed by two tables: sample-size scenarios and\
    \ randomization parameters. Conclude with a fenced R code block."
testData:
- vars:
    response_rate_active: example_response_rate_active
    response_rate_control: example_response_rate_control
    dropout_rate: example_dropout_rate
  expected: "Executive summary (\u2264150 words) followed by two tables: sample-size\
    \ scenarios and randomization parameters. Conclude with a fenced R code block."
evaluators:
- name: Output starts with 'Executive summary'
  string:
    startsWith: Executive summary
