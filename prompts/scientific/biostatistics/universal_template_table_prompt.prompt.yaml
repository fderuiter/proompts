name: Universal Template-Table Prompt
version: 0.1.0
description: Create a formatted safety table from an ADaM ADAE dataset using either
  R or SAS.
metadata:
  domain: scientific
  complexity: medium
  tags:
  - biostatistics
  - universal
  - template-table
  - prompt
  requires_context: false
variables:
- name: dataset_path
  description: path to ADAE dataset
  required: true
- name: language
  description: '`R` or `SAS`'
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are a senior clinical-trial statistical programmer proficient in CDISC
    ADaM, R (tidyverse/gt), and SAS 9.4.


    Use a structured Task/Data/Rules/Output approach for reproducibility.'
- role: user
  content: "1. Produce Table 14-1 \u201CTreatment-Emergent Adverse Events by System\
    \ Organ Class and Preferred Term.\u201D\n2. Use ADAE with variables `TRT01A`,\
    \ `AESOC`, `AEDECOD`, and `SAFFL`.\n3. Include subjects with `SAFFL='Y'`; order\
    \ rows by descending `n` in the active arm.\n4. Count `n` and `%` within `TRT01A`\
    \ for each SOC/PT; overall row first.\n5. Output code in the language specified\
    \ (R or SAS).\n6. Return a `gt`/PROC REPORT table ready for the CSR with footnote\
    \ \u201CPercent based on safety population (N displayed in header).\u201D\n7.\
    \ Confirm understanding briefly, then emit only the code block and table.\n\n\
    Inputs:\n- `{{language}}` \u2014 `R` or `SAS`\n- `{{dataset_path}}` \u2014 path\
    \ to ADAE dataset\n\nOutput format:\nCode block followed by the generated table."
testData:
- vars:
    language: example_language
    dataset_path: example_dataset_path
  expected: Code block followed by the generated table.
evaluators:
- name: Output starts with '```'
  string:
    startsWith: '```'
