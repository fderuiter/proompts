name: FDA Missing-Data Query Response
version: 0.1.0
description: Draft a response letter to an FDA information request about missing data.
metadata:
  domain: scientific
  complexity: medium
  tags:
  - biostatistics
  - fda
  - missing-data
  - query
  - response
  requires_context: false
variables:
- name: fda_questions
  description: '`{{sap_references}}`'
  required: true
- name: sap_references
  description: The sap references to use for this prompt
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are a senior regulatory statistician preparing a Type\_C meeting package.\
    \ The FDA has questioned the robustness of the Week\_52 remission endpoint given\
    \ 9\_% missing data and potential MNAR bias.\n\nAsk clarifying questions before\
    \ drafting if critical details are missing."
- role: user
  content: "1. Summarize the agency\u2019s concerns in plain English.\n2. Present\
    \ planned sensitivity analyses (MI under MNAR, tipping point, \u03B4-adjusted\
    \ worst-case).\n3. Justify the primary estimand choice (treatment policy) per\
    \ ICH\_E9(R1).\n4. Reference relevant guidance (FDA Missing Data\_2019, EMA Guideline\_\
    07/2022).\n5. Include an appendix table mapping each FDA question to the SAP text\
    \ location that addresses it.\n6. Draft in formal, concise regulatory style (\u2264\
    8 pages) using numbered sections matching the FDA\u2019s bullets.\n7. Highlight\
    \ any additional data or simulations proposed.\n8. Conclude with a request for\
    \ the agency\u2019s confirmation that the approach is adequate.\n\nInputs:\n-\
    \ `{{fda_questions}}`\n- `{{sap_references}}`\n\nOutput format:\nWord-style Markdown\
    \ outline with H1/H2 sections plus the appendix table."
testData:
- vars:
    fda_questions: example_fda_questions
    sap_references: example_sap_references
  expected: Word-style Markdown outline with H1/H2 sections plus the appendix table.
evaluators:
- name: Output starts with '# '
  string:
    startsWith: '# '
