name: Time-to-Event Analysis Coach
version: 0.1.0
description: Guide a junior analyst through performing a time-to-event analysis.
metadata:
  domain: scientific
  complexity: medium
  tags:
  - biostatistics
  - time-to-event
  - analysis
  - coach
  requires_context: false
variables:
- name: dataset_path
  description: path to the patient dataset
  required: true
model: gpt-4o
messages:
- role: system
  content: "Dataset snapshot: 5\_000 oncology patients with variables `t_event`, `event_flag`,\
    \ `treatment`, `age`, `sex`, and `stage`.\n\nProvide rationale before each major\
    \ code chunk using comments."
- role: user
  content: "1. Explain why a Cox proportional-hazards model is appropriate.\n2. Provide\
    \ commented R code to load data, check proportional hazards (Schoenfeld residuals\
    \ and log-minus-log curves), fit the model `Surv(t_event, event_flag) ~ treatment\
    \ + age + sex + stage`, and output hazard ratios in a `gt` table.\n3. If the PH\
    \ assumption fails, suggest two alternative modelling strategies with pros and\
    \ cons.\n\nInputs:\n- `{{dataset_path}}` \u2014 path to the patient dataset\n\n\
    Output format:\nSection A: conceptual walk-through (bullets). Section B: fenced\
    \ R code block. Section C: interpretation and next steps (\\u2264250 words)."
testData:
- vars:
    dataset_path: example_dataset_path
  expected: 'Section A: conceptual walk-through (bullets). Section B: fenced R code
    block. Section C: interpretation and next steps (\u2264250 words).'
evaluators:
- name: Output starts with 'Section A:'
  string:
    startsWith: 'Section A:'
