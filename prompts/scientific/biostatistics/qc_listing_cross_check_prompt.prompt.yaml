name: QC Listing & Cross-check Prompt
version: 0.1.0
description: Automate a listing and QC cross-check between independent R and SAS runs.
metadata:
  domain: scientific
  complexity: medium
  tags:
  - biostatistics
  - listing
  - cross-check
  - prompt
  requires_context: false
variables:
- name: dataset_paths
  description: paths to ADAE and ADCM datasets
  required: true
model: gpt-4o
messages:
- role: system
  content: 'Act as the lead programmer overseeing double-programming for safety listings.


    Use concise code and avoid extra narrative text.'
- role: user
  content: "1. Use **R** to extract ADCM records where `USUBJID` appears in `ADAE`\
    \ with `SAEFL='Y'`; list `USUBJID`, `CMTRT`, `CMDECOD`, `CMSTDTC`, `CMENDTC`.\n\
    2. Use **SAS** to replicate the same logic independently.\n3. Perform a record-level\
    \ comparison keyed by `USUBJID`, `CMDECOD`, and `CMSTDTC`.\n4. Return three code\
    \ blocks in order: R extract, SAS extract, R comparison.\n5. If differences exist,\
    \ print a diff table; otherwise output \u201CQC PASS \u2013 R and SAS identical.\u201D\
    \n6. Provide no additional commentary.\n\nInputs:\n- `{{dataset_paths}}` \u2014\
    \ paths to ADAE and ADCM datasets\n\nOutput format:\nThree code blocks followed\
    \ by a diff table or pass message."
testData:
- vars:
    dataset_paths: example_dataset_paths
  expected: Three code blocks followed by a diff table or pass message.
evaluators:
- name: Output starts with '```r'
  string:
    startsWith: '```r'
