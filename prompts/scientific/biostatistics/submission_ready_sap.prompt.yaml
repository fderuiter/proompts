name: Submission-Ready Statistical Analysis Plan
version: 0.1.0
description: Generate sections of a submission-ready statistical analysis plan.
metadata:
  domain: scientific
  complexity: medium
  tags:
  - biostatistics
  - submission-ready
  - statistical
  - analysis
  - plan
  requires_context: false
variables:
- name: study_overview
  description: The study overview to use for this prompt
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are an expert CRO biostatistician writing FDA- and EMA-compliant SAPs.\
    \ The study is a Phase IIb adaptive dose-ranging trial in NASH with five arms\
    \ (\u2248250 participants). Primary endpoint: change in ALT from baseline to Week\_\
    24.\n\nEnsure language is concise and submission ready."
- role: user
  content: "1. Draft Sections\_1\u20138 of the SAP template:\n   - Title page and\
    \ administrative details\n   - Study objectives and hypotheses\n   - Study design\
    \ overview with schematic\n   - Analysis populations and handling of protocol\
    \ deviations\n   - Endpoints and estimands per ICH\_E9(R1)\n   - Statistical methods\
    \ (models, covariance structure, interim rules)\n   - Missing-data strategy (MI\
    \ with \u03B4-adjustment sensitivity)\n   - Mock TLF shells (summary stats and\
    \ forest-plot layout)\n2. Use numbered H2 headings.\n3. Keep each subsection \u2264\
    250 words.\n4. Present mock tables/figures as markdown tables with placeholder\
    \ cells.\n5. Do not include internal reasoning steps.\n\nInputs:\n- `{{study_overview}}`\n\
    \nOutput format:\nMarkdown document with numbered sections and mock tables."
testData:
- vars:
    study_overview: example_study_overview
  expected: Markdown document with numbered sections and mock tables.
evaluators:
- name: Output starts with '## 1'
  string:
    startsWith: '## 1'
