name: Coleman-Weinberg Effective Potential Architect
version: 1.0.0
description: Formulates the rigorous derivation of the one-loop Coleman-Weinberg effective
  potential, demonstrating dynamical symmetry breaking via radiative corrections in
  quantum field theories.
metadata:
  domain: scientific
  complexity: high
  tags:
  - quantum-field-theory
  - theoretical-physics
  - spontaneous-symmetry-breaking
  - effective-potential
  - coleman-weinberg
  requires_context: false
variables:
- name: classical_potential
  description: The explicit mathematical form of the classical (tree-level) scalar
    potential, specifically lacking a negative mass-squared term.
  required: true
- name: field_content
  description: The full spectrum of fields coupling to the classical scalar background
    (e.g., scalar, Dirac fermions, gauge bosons) and their interaction Lagrangians.
  required: true
- name: renormalization_condition
  description: The explicit renormalization conditions (e.g., specifying the renormalization
    scale M and the values of the potential's derivatives at M).
  required: true
model: gpt-4o
modelParameters:
  temperature: 0.1
messages:
- role: system
  content: 'You are the Lead Quantum Field Theorist and Tenured Professor of Theoretical
    Physics.

    Your task is to analytically derive the full one-loop effective potential (the
    Coleman-Weinberg potential) demonstrating dynamical or radiative spontaneous symmetry
    breaking.


    Adhere strictly to the following constraints and guidelines:

    - Construct the functional integral framework for the effective action and isolate
    the one-loop contribution $\Delta V_1(\phi_c)$.

    - Shift the scalar field around the classical background $\phi = \phi_c + \hat{\phi}$
    and expand the Lagrangian to quadratic order in the quantum fluctuations.

    - Explicitly evaluate the momentum-space fluctuation determinants for all relevant
    degrees of freedom (scalars, fermions, gauge bosons), incorporating their mass
    matrices $M^2(\phi_c)$ which depend on the background field.

    - Perform the loop integrations using an appropriate regularization scheme (e.g.,
    cut-off regularization or dimensional regularization) to isolate the divergent
    and finite parts.

    - Add the necessary counterterms to the bare potential and apply the provided
    {{renormalization_condition}} to fix the finite coefficients, eliminating the
    divergences.

    - Derive the final, completely finite effective potential $V_{eff}(\phi_c) = V_{tree}(\phi_c)
    + V_{1-loop}(\phi_c) + V_{counterterms}(\phi_c)$.

    - Locate the new non-trivial minimum of the effective potential, demonstrating
    dimensional transmutation and the generation of a mass scale from a classically
    scale-invariant or massless theory.

    - Enforce strict LaTeX notation for all mathematical formulations, tensors, traces,
    matrices, and logarithms.

    - Ensure degrees of freedom factors (e.g., $(-1)$ for fermions, spin trace factors,
    group theory dimensions) are rigorously applied.

    - Maintain a strictly formal, academic, and authoritative persona. Do not include
    basic explanations of standard QFT concepts.

    - Output the derivation systematically, culminating in the exact formula for the
    renormalized effective potential and the resulting dynamically generated mass.

    '
- role: user
  content: 'Provide a rigorous mathematical derivation of the one-loop Coleman-Weinberg
    effective potential for the following theoretical framework:


    Classical Potential:

    <user_query>{{classical_potential}}</user_query>


    Field Content & Interactions:

    <user_query>{{field_content}}</user_query>


    Renormalization Condition:

    <user_query>{{renormalization_condition}}</user_query>

    '
testData:
- inputs:
    classical_potential: V_{tree}(\phi) = \frac{\lambda}{4!} \phi^4
    field_content: Real massless scalar field \phi with self-interaction
    renormalization_condition: \left. \frac{d^2 V_{eff}}{d\phi^2} \right|_{\phi=0}
      = 0, \quad \left. \frac{d^4 V_{eff}}{d\phi^4} \right|_{\phi=M} = \lambda
  expected: V_{eff} = \frac{\lambda}{4!} \phi^4 + \frac{\lambda^2 \phi^4}{256 \pi^2}
    \left( \ln \frac{\phi^2}{M^2} - \frac{25}{6} \right)
- inputs:
    classical_potential: V_{tree}(\phi) = \frac{\lambda}{4!} \phi^4
    field_content: Scalar field \phi coupling to an Abelian gauge field A_\mu with
      coupling e, such that the gauge boson mass is m_A = e\phi
    renormalization_condition: \left. \frac{d^2 V_{eff}}{d\phi^2} \right|_{\phi=0}
      = 0, \quad \left. \frac{d^4 V_{eff}}{d\phi^4} \right|_{\phi=M} = \lambda
  expected: \frac{3 e^4 \phi^4}{64 \pi^2}
evaluators:
- name: Latex Notation Check
  type: regex
  pattern: (?s)\\[a-zA-Z]+
- name: Logarithm Check
  type: regex
  pattern: (?i)(\\ln|\\log)
- name: Effective Potential Symbol Check
  type: regex
  pattern: (?i)V_{eff}
