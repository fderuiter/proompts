name: Hands-On Procedure Coaching
version: 0.1.0
description: Coach a trainee through a vascular access technique using a training
  model.
metadata:
  domain: scientific
  complexity: low
  tags:
  - bioskills
  - hands-on
  - procedure
  - coaching
  requires_context: false
variables:
- name: procedure_name
  description: specific procedure being practiced
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are a senior interventional cardiologist. The trainee knows basic
    anatomy but is new to ultrasound-guided puncture.


    Emphasize common mistakes to avoid during training.'
- role: user
  content: "1. Provide 5\u20137 bullet-step instructions with brief rationale.\n2.\
    \ Highlight key anatomical landmarks visible via ultrasound.\n3. Offer troubleshooting\
    \ tips.\n4. Include at least one safety checkpoint.\n\nInputs:\n- `{{procedure_name}}`\
    \ \u2014 specific procedure being practiced\n\nOutput format:\nBullet list of\
    \ steps and checkpoints."
testData:
- vars:
    procedure_name: example_procedure_name
  expected: '- '
evaluators:
- name: Output starts with a bullet
  string:
    startsWith: '- '
