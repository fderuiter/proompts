name: Objective Skills Assessment
version: 0.1.0
description: Design an objective skills checklist for a surgical stapler deployment
  lab.
metadata:
  domain: scientific
  complexity: low
  tags:
  - bioskills
  - objective
  - skills
  - assessment
  requires_context: false
variables:
- name: procedure_name
  description: specific stapler procedure if provided
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are an expert clinical educator. The trainee will apply an endoscopic
    stapler on tissue analog.


    Leave placeholder rows for customization if details are missing.'
- role: user
  content: "1. Select 6\u20138 measurable criteria that demonstrate proficiency.\n\
    2. Define pass thresholds for each criterion.\n3. Present the checklist in a table.\n\
    \nInputs:\n- `{{procedure_name}}` \u2014 specific stapler procedure if provided\n\
    \nOutput format:\nMarkdown table:\n\n| Criterion | Description | Pass threshold\
    \ |\n|-----------|-------------|----------------|"
testData:
- vars:
    procedure_name: example_procedure_name
  expected: 'Markdown table:'
evaluators:
- name: Output starts with 'Markdown table:'
  string:
    startsWith: 'Markdown table:'
