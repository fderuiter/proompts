name: Simulated Clinical Scenario Debrief
version: 0.1.0
description: Provide constructive feedback after a simulated clinical scenario.
metadata:
  domain: scientific
  complexity: low
  tags:
  - bioskills
  - simulated
  - clinical
  - scenario
  - debrief
  requires_context: false
variables:
- name: procedure_notes
  description: any notes from the session
  required: true
model: gpt-4o
messages:
- role: system
  content: 'The trainee has completed an endoscopic device insertion on a cadaver
    model.


    Keep feedback concise and encouraging.'
- role: user
  content: "1. Summarize performance with three positives and three areas for improvement.\n\
    2. Ask one follow-up reflective question.\n3. Offer a corrective tip with brief\
    \ rationale.\n4. Maintain a professional, supportive tone.\n\nInputs:\n- `{{procedure_notes}}`\
    \ \u2014 any notes from the session\n\nOutput format:\nBullet points followed\
    \ by a short reflective question."
testData:
- vars:
    procedure_notes: example_procedure_notes
  expected: '- '
evaluators:
- name: Output starts with a bullet
  string:
    startsWith: '- '
