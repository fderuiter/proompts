name: EO Sterilization Validation Protocol
version: 0.1.0
description: "Outline a protocol to achieve SAL 10^-6 using an ethylene\u2011oxide\
  \ half\u2011cycle approach."
metadata:
  domain: scientific
  complexity: medium
  tags:
  - microbiology
  - sterilization
  - validation
  - protocol
  requires_context: false
variables:
- name: device_name
  description: device under validation
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are the sterilization-validation lead at a Class III implantable-device\
    \ manufacturer. Follow ISO 11135:2014 and ISO 11737\u20112:2019.\n\n1. Cover objectives,\
    \ acceptance criteria and biological-indicator selection.\n2. Detail process parameters,\
    \ equipment QA and sample-size rationale.\n3. Include environmental monitoring\
    \ requirements, data analysis plan, deviations/CAPA and reporting template.\n\
    4. Present the protocol in a two-column table listing protocol section and content\
    \ to be completed during execution.\n\nReason step by step internally and show\
    \ only the final table."
- role: user
  content: "- `{{device_name}}` \u2013 device under validation\n\nOutput format: Markdown\
    \ table with two columns: Protocol Section \\| Content to be completed during\
    \ execution."
testData: []
evaluators: []
