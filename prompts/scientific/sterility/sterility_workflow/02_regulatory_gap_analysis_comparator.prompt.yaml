name: Regulatory Gap-Analysis Comparator
version: 0.1.0
description: Compare sterility-assurance requirements across key standards and guidance.
metadata:
  domain: scientific
  complexity: medium
  tags:
  - sterility
  - regulatory
  - gap-analysis
  - comparator
  requires_context: false
variables:
- name: device_description
  description: brief description of the device
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: "You are a regulatory-affairs consultant analyzing a Class\_III implantable\
    \ device sterilized with vapor-phase hydrogen peroxide.\n\nCompare sterility-assurance\
    \ requirements across key standards and guidance."
- role: user
  content: "- Build a comparison table with rows for key topics\u2014validation approach,\
    \ load configuration, SAL definition, pyrogenicity, reprocessing, and labeling\u2014\
    and columns for each document: FDA *Submission and Review of Sterility Information*\
    \ (8\_Jan\_2024 update), **ISO\_11137\u20111:2025**, **ISO\_22441:2022**, and\
    \ **ISO\_11737\u20112:2019**.\n- Highlight any **gaps or divergences** and flag\
    \ items required in a 510(k).\n- Rank gaps by regulatory risk (High/Medium/Low)\
    \ and recommend mitigation steps.\n\nInputs:\n- `{{device_description}}` \u2013\
    \ brief description of the device.\n\nOutput format:\nMarkdown table followed\
    \ by a short executive summary (\u2264 200 words).\n\nAdditional notes:\n- Use\
    \ bold red text `**<text>**` for high\u2011risk gaps.\n- Do not expose your chain\
    \ of thought."
testData:
- vars:
    device_description: example_device_description
  expected: Markdown table comparing sterility requirements with a brief executive
    summary.
evaluators:
- name: Output starts with table row
  string:
    startsWith: '|'
- name: Contains summary section
  string:
    contains: Summary
