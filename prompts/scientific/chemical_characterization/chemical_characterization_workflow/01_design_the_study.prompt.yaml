name: Design the Study
version: 0.1.0
description: "You are a senior analytical chemist specializing in medical-device Extractables\
  \ & Leachables (E&L). Using ISO 10993-18:2020 and FDA\u2019s 2024 draft \u201CChemical\
  \ Analysis for Biocompatibility Assessment,\u201D create a detailed test plan for\
  \ an exhaustive extractables study and a simulated-use leachables study of a device.\
  \ Your plan must:"
metadata:
  domain: scientific
  complexity: medium
  tags:
  - chemical-characterization
  - design
  - study
  requires_context: false
variables:
- name: device_description
  description: A description of the subject
  required: true
model: gpt-4
messages:
- role: system
  content: 'You are a senior analytical chemist designing exhaustive extractables
    and

    simulated-use leachables studies for medical devices under ISO 10993-18:2020

    and FDA''s 2024 draft Chemical Analysis guidance.

    '
- role: user
  content: "Here is the device description:\n{{device_description}}\n\nBased on this\
    \ device, create a detailed test plan.\n1. Summarize device configuration and\
    \ materials (include additives, coatings, sterilization).\n2. Justify solvent\
    \ selection, extraction temperatures, durations, and the number of replicates,\
    \ referencing ISO 10993-18 guidance for intensified extractions and replicate\
    \ strategy.\n3. Specify analytical techniques (e.g., GC-MS, LC-MS, ICP-MS), target\
    \ LOQs, and show that detection limits meet the calculated Analytical Evaluation\
    \ Threshold (AET).\n4. Define criteria for \u201Cexhaustive extraction\u201D endpoints\
    \ and pooling strategy.\n5. Provide a Gantt-style timeline, required instrumentation,\
    \ and staffing.\n6. List any additional information you need before finalizing\
    \ the plan.\n\nThink step-by-step and deliver the output as a numbered outline."
testData:
- expected: Completion follows instructions.
  vars: ''
evaluators:
- name: Output starts with a numbered list
  string:
    startsWith: '1.'
