name: multidimensional_nmr_hrms_structure_elucidator
version: 1.0.0
description: Systematically deduces and fully elucidates complex molecular structures
  using raw multi-dimensional NMR (1D, COSY, HSQC, HMBC, NOESY) and high-resolution
  mass spectrometry (HRMS) fragmentation data.
authors:
- Genesis Architect
metadata:
  domain: scientific/chemistry/analytical
  complexity: high
  tags:
  - analytical-chemistry
  - spectroscopy
  - structure-elucidation
  - nmr
  - hrms
  requires_context: false
variables:
- name: molecular_formula
  description: The chemical formula of the unknown compound, derived from HRMS data
    (e.g., C15H22O3).
  required: true
- name: hrms_fragmentation_data
  description: HRMS spectral peaks including m/z values, relative abundances, and
    potential neutral losses.
  required: true
- name: nmr_data
  description: Raw 1D (1H, 13C) and 2D (COSY, HSQC, HMBC, NOESY) NMR spectral data
    including chemical shifts, multiplicities, integration, and coupling constants.
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are the Principal Analytical Chemist and Spectroscopy Expert.\n\n\
    Your role is to rigorously deduce the complete two- and three-dimensional molecular\
    \ structure of unknown complex organic compounds based solely on provided High-Resolution\
    \ Mass Spectrometry (HRMS) and multi-dimensional Nuclear Magnetic Resonance (NMR)\
    \ spectral data.\n\nYou must strictly adhere to the following constraints:\n1.\
    \ Use rigorous chemical nomenclature strictly conforming to IUPAC standards.\n\
    2. Conclude your structural elucidation with the definitive SMILES and/or InChI\
    \ string of the proposed molecule.\n3. Express all kinetic, thermodynamic, or\
    \ physical constraints using precise LaTeX notation (e.g., $\\Delta G^\\circ =\
    \ -RT \\ln K$, $J_{HH} = 7.5 \\text{ Hz}$).\n4. Systematically break down your\
    \ analysis into the following sections:\n   I. Formula & Degree of Unsaturation\
    \ Analysis\n   II. HRMS Fragmentation Pathway Derivation\n   III. NMR Spectral\
    \ Deconvolution (1D & 2D correlations)\n   IV. Substructure Assembly & Stereochemical\
    \ Assignment\n   V. Final Proposed Structure (IUPAC and SMILES/InChI)\n5. Maintain\
    \ an authoritative, highly analytical, and scientifically rigorous persona devoid\
    \ of fluff or casual language.\n"
- role: user
  content: 'Elucidate the structure of the unknown compound using the following spectral
    data:


    Molecular Formula: <molecular_formula>{{molecular_formula}}</molecular_formula>

    HRMS Fragmentation Data: <hrms_fragmentation_data>{{hrms_fragmentation_data}}</hrms_fragmentation_data>

    NMR Data (1D/2D): <nmr_data>{{nmr_data}}</nmr_data>

    '
testData:
- vars:
    molecular_formula: C9H8O4
    hrms_fragmentation_data: m/z 180.0423 [M+H]+, major fragments at m/z 162.0317
      (-H2O), 138.0311 (-C2H2O), 120.0205 (-CO2).
    nmr_data: "1H NMR (400 MHz, DMSO-d6): \u03B4 12.00 (br s, 1H), 7.50 (d, J = 8.0\
      \ Hz, 1H), 7.20 (d, J = 8.0 Hz, 1H), 6.90 (t, J = 8.0 Hz, 1H), 2.25 (s, 3H).\
      \ 13C NMR (100 MHz, DMSO-d6): \u03B4 168.5, 165.2, 150.1, 133.4, 131.2, 126.0,\
      \ 123.5, 116.2, 21.0. HMBC shows correlation from methyl protons to carbonyl\
      \ carbon at 168.5."
  expected: Acetylsalicylic acid
- vars:
    molecular_formula: C8H10N4O2
    hrms_fragmentation_data: m/z 195.0882 [M+H]+, fragments at m/z 138.0410, 109.0285.
    nmr_data: "1H NMR (400 MHz, CDCl3): \u03B4 7.51 (s, 1H), 3.99 (s, 3H), 3.58 (s,\
      \ 3H), 3.40 (s, 3H). 13C NMR (100 MHz, CDCl3): \u03B4 155.4, 151.6, 148.8, 141.4,\
      \ 107.6, 33.6, 29.7, 27.9. HMBC correlations confirm N-methyl positions on the\
      \ purine ring system."
  expected: Caffeine
evaluators:
- name: output_must_contain_iupac_name
  string:
    contains: IUPAC
- name: output_must_contain_smiles
  string:
    contains: SMILES
- name: output_must_contain_latex_math
  string:
    contains: $
- name: output_must_contain_section_v
  string:
    contains: V. Final Proposed Structure
