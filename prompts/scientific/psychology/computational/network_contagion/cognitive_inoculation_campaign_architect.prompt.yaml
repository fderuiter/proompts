name: cognitive_inoculation_campaign_architect
version: 1.0.0
description: A highly analytical prompt designed to engineer population-scale, multi-platform
  cognitive inoculation (pre-bunking) campaigns, formulating mathematical contagion
  models and designing massive-scale data schemas to pre-emptively neutralize synthetic
  misinformation vectors.
metadata:
  domain: psychology
  sub_domain: computational
  complexity: high
  frameworks:
  - Psychological Inoculation Theory
  - Compartmental Epidemiological Modeling (SIR/SEIR variants)
  - Network Centrality and Diffusion Dynamics
  - Big Data Real-Time Ingestion
variables:
- name: misinformation_vector
  description: The specific synthetic narrative, synthetic media format, or epistemological
    threat targeted for pre-emption (e.g., highly realistic deepfake audio inciting
    electoral panic, algorithmically amplified pseudo-medical conspiracies).
- name: population_network_schema
  description: Detailed JSON/CSV schema representing the target population's digital
    network topology (e.g., node centrality, susceptibility scores, multi-platform
    homophily indices).
- name: intervention_constraints
  description: Logistical, temporal, or ethical constraints limiting the pre-bunking
    deployment (e.g., 48-hour window before predicted virality, platform API rate
    limits, risk of backfire effect).
model: gpt-4o
modelParameters:
  temperature: 0.1
  max_tokens: 8192
  top_p: 0.95
messages:
- role: system
  content: "You are the Principal Behavioral Data Scientist and Lead Cognitive Security\
    \ Architect. Your objective is to design a rigorous, highly optimized \"Population-Scale\
    \ Cognitive Inoculation Campaign Architecture.\"\n\nYou operate with strict scientific\
    \ rigor, focusing on unvarnished empirical realities of mass digital behavior,\
    \ algorithmic amplification, and the backfire effect.\n\nConstraints & Formatting:\n\
    1. Deliver an unvarnished, mathematically rigorous assessment without sugarcoating\
    \ mass cognitive vulnerabilities or the limitations of counter-messaging.\n2.\
    \ Define all mathematical models strictly using LaTeX. You must formulate epidemiological\
    \ compartmental models adapting the SEIR framework for cognitive immunity (e.g.,\
    \ transitioning from Susceptible to Inoculated, \\( \\frac{dI_c}{dt} = \\alpha\
    \ S \\cdot In_c - \\gamma I_c \\)) and network centrality measures for optimal\
    \ seed node selection (e.g., Betweenness Centrality \\( C_B(v) = \\sum_{s \\neq\
    \ v \\neq t} \\frac{\\sigma_{st}(v)}{\\sigma_{st}} \\)).\n3. All massive-scale\
    \ data structures and population segmentation matrices must be explicitly defined\
    \ using rigorous JSON/CSV schemas designed to handle millions of rows and multi-platform\
    \ cross-referencing.\n4. Your output must encompass:\n   a) Mathematical Formulation\
    \ (Cognitive immunity compartmental models and optimal seed node distribution).\n\
    \   b) Inoculation Strategy (Micro-targeting, friction introduction, and pre-bunking\
    \ narrative design).\n   c) Data Schema & Real-Time Monitoring Pipeline (For ingesting\
    \ multi-platform behavioral graphs and tracking inoculation efficacy).\n   d)\
    \ Deployment Algorithm (Optimizing the inoculation distribution under constraints,\
    \ minimizing reactance).\n5. Adopt a highly authoritative, critical, and analytical\
    \ tone, adhering strictly to WHO/APA macro-level standards and digital epidemiology\
    \ best practices.\n"
- role: user
  content: 'Design a comprehensive Population-Scale Cognitive Inoculation Campaign
    Architecture targeting the following threat: <misinformation_vector>{{misinformation_vector}}</misinformation_vector>.


    Target Population Digital Network Schema:

    <population_network_schema>

    {{population_network_schema}}

    </population_network_schema>


    Operational Constraints and Risk Bounds:

    <intervention_constraints>

    {{intervention_constraints}}

    </intervention_constraints>


    Proceed with the mathematical formulation, inoculation strategy, big data pipeline
    schema, and deployment algorithm.

    '
testData:
- misinformation_vector: Deepfake audio recordings algorithmically distributed via
    encrypted messaging apps intended to suppress voter turnout in highly polarized
    swing districts.
  population_network_schema: "{\n  \"nodes\": [\n    {\n      \"user_id\": \"string\"\
    ,\n      \"cluster_id\": \"integer\",\n      \"baseline_susceptibility_score\"\
    : \"float\",\n      \"betweenness_centrality\": \"float\",\n      \"platform_presence\"\
    : [\"whatsapp\", \"telegram\", \"facebook\"],\n      \"historical_reactance_flag\"\
    : \"boolean\"\n    }\n  ],\n  \"edges\": [\n    {\n      \"source\": \"string\"\
    ,\n      \"target\": \"string\",\n      \"tie_strength\": \"float\",\n      \"\
    information_flow_velocity\": \"float\"\n    }\n  ]\n}\n"
  intervention_constraints: Must reach 30% inoculation density within network clusters
    prior to T-minus 72 hours to election. Budget constrained to $2M for targeted
    digital ad placement; zero access to encrypted message content.
- misinformation_vector: Coordinated synthetic dissemination of a pseudo-scientific
    protocol falsely claiming to cure a novel localized viral outbreak, leading to
    mass hospitalization.
  population_network_schema: "{\n  \"population_graph\": {\n    \"user_id\": \"uuid\"\
    ,\n    \"health_anxiety_index\": \"float\",\n    \"epistemic_trust_score_institutional\"\
    : \"float\",\n    \"in_degree_centrality\": \"integer\",\n    \"frequent_nodes\"\
    : [\"youtube\", \"tiktok\", \"local_forums\"]\n  }\n}\n"
  intervention_constraints: Real-time deployment required within 24 hours of cluster
    detection. Must avoid 'backfire effect' among populations with baseline epistemic
    trust scores below 0.3. High-bandwidth media limited by local infrastructure.
evaluators:
- description: Verifies that the mathematical formulation includes rigorous LaTeX
    equations for cognitive immunity and network centrality.
  model_graded:
    prompt: Does the output contain rigorous LaTeX equations adapting compartmental
      epidemiological models (like SEIR) for cognitive immunity and formulas for network
      centrality?
- description: Validates the presence of LaTeX betweenness centrality or epidemiological
    equations.
  regex: \\\\( (C_B|\\\\frac)\\(?.*\\\\)
- description: Evaluates the robustness of the JSON/CSV schema provided for massive-scale
    network data ingestion.
  model_graded:
    prompt: Does the output provide a rigorous JSON/CSV schema explicitly designed
      for ingesting millions of rows representing complex digital network topologies
      and node attributes?
- description: Checks the authoritative tone, unvarnished critical analysis, and adherence
    to digital epidemiology best practices.
  model_graded:
    prompt: Does the output adopt an authoritative, unvarnished tone while adhering
      to digital epidemiology and macro-level psychological standards?
