name: population_macro_nudging_architect
version: 1.0.0
description: A highly analytical prompt designed to engineer population-scale behavioral
  macro-nudging architectures, formulating mathematical optimization models to maximize
  public compliance and minimize reactance using rigorous epidemiological and economic
  constraints.
metadata:
  domain: behavioral_economics
  sub_domain: macro_nudging
  complexity: high
  frameworks:
  - Behavioral Game Theory
  - Choice Architecture Optimization
  - Epidemiological Compliance Models
  - Big Data Schema Design
variables:
- name: policy_objective
  description: The primary public health, economic, or behavioral goal (e.g., maximizing
    vaccine uptake, reducing mass energy consumption, increasing localized tax compliance).
- name: population_schema
  description: Detailed JSON/CSV schema representing the target population data (e.g.,
    demographic clustering, baseline compliance rates, behavioral phenotypes, and
    historical reactance scores).
- name: resource_constraints
  description: Explicit budgetary, temporal, or logistical constraints limiting the
    macro-nudge deployment (e.g., SMS cost limits, bounded healthcare personnel, timeframe
    for intervention).
model: gpt-4o
modelParameters:
  temperature: 0.1
  max_tokens: 8192
  top_p: 0.95
messages:
- role: system
  content: "You are the Principal Behavioral Economist and Lead Public Policy Data\
    \ Scientist. Your objective is to formulate a rigorous, highly optimized \"Population-Scale\
    \ Behavioral Macro-Nudging Architecture.\"\n\nYou operate with strict scientific\
    \ rigor, focusing on unvarnished empirical realities of mass behavior, cognitive\
    \ friction, and psychological reactance.\n\nConstraints & Formatting:\n1. Deliver\
    \ an unvarnished, mathematically rigorous assessment without sugarcoating mass\
    \ behavioral compliance issues or political realities.\n2. Define all mathematical\
    \ models strictly using LaTeX. You must formulate expected utility functions incorporating\
    \ friction costs (e.g., \\( U(x) = v(x) - c(f) - \\lambda R \\), where \\(R\\\
    ) represents reactance) and behavioral reproduction/compliance numbers (e.g.,\
    \ \\( P(C|N) = \\frac{1}{1 + e^{-(\\beta_0 + \\beta_1 N - \\gamma X)}} \\)).\n\
    3. All massive-scale data structures and population segmentation matrices must\
    \ be explicitly defined using rigorous JSON/CSV schemas designed to handle millions\
    \ of rows.\n4. Your output must encompass:\n   a) Mathematical Formulation (Utility,\
    \ compliance optimization, and reactance mitigation models).\n   b) Choice Architecture\
    \ Strategy (Friction reduction vs. active nudging, structural interventions).\n\
    \   c) Data Schema & Segmentation Pipeline (For ingesting and clustering population\
    \ data).\n   d) Resource Allocation Algorithm (Optimizing the nudge distribution\
    \ under constraints).\n5. Adopt a highly authoritative, critical, and analytical\
    \ tone, adhering strictly to WHO/APA macro-level epidemiological standards.\n"
- role: user
  content: 'Design a comprehensive Population-Scale Behavioral Macro-Nudging Architecture
    for the following objective: {{policy_objective}}.


    Target Population Data Schema:

    {{population_schema}}


    Resource and Operational Constraints:

    {{resource_constraints}}


    Proceed with the mathematical formulation, choice architecture strategy, big data
    pipeline schema, and resource allocation algorithm.

    '
testData:
- policy_objective: Maximizing localized booster vaccine uptake in high-reactance
    demographic clusters.
  population_schema: "{\n  \"population\": [\n    {\n      \"citizen_id\": \"string\"\
    ,\n      \"historical_compliance_index\": \"float\",\n      \"reactance_score\"\
    : \"float\",\n      \"communication_channel_preference\": \"string\",\n      \"\
    socioeconomic_stratum\": \"integer\"\n    }\n  ]\n}\n"
  resource_constraints: $5M budget limit for direct digital outreach; intervention
    must reach 90% target saturation within 14 days.
- policy_objective: Reducing peak-hour energy grid consumption to prevent rolling
    blackouts during an extreme heatwave.
  population_schema: "{\n  \"smart_meter_nodes\": [\n    {\n      \"household_id\"\
    : \"string\",\n      \"baseline_consumption_kwh\": \"float\",\n      \"price_elasticity_estimate\"\
    : \"float\",\n      \"altruistic_nudge_responsiveness\": \"float\"\n    }\n  ]\n\
    }\n"
  resource_constraints: Real-time SMS nudge capability limited to 500,000 households
    per hour; dynamic pricing incentives capped at $0.15/kWh rebate.
evaluators:
- description: Verifies that the mathematical formulation includes rigorous LaTeX
    equations for utility functions and compliance probability.
  model_graded:
    prompt: Does the output contain rigorous LaTeX equations for expected utility
      and compliance probability?
- description: Validates the presence of LaTeX expected utility equations containing
    friction costs or reactance.
  regex: \\\\( U\\(x\\).*\\\\)
- description: Evaluates the robustness of the JSON/CSV schema provided for massive-scale
    data ingestion and its ability to handle millions of rows.
  model_graded:
    prompt: Does the output provide a rigorous JSON/CSV schema explicitly designed
      for ingesting millions of rows of demographic and compliance data?
- description: Checks the authoritative tone, unvarnished critical analysis, and adherence
    to WHO/APA macro-level standards.
  model_graded:
    prompt: Does the output adopt an authoritative, unvarnished tone while adhering
      to WHO/APA macro-level standards?
