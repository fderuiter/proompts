---
name: differential_diagnosis_mapper
version: 1.0.0
description: Conducts rigorous differential diagnostic mapping using strict DSM-5-TR and ICD-11 criteria to isolate primary pathologies and rule out confounding syndromes.
authors:
  - Behavioral Sciences Genesis Architect
metadata:
  domain: clinical/psychopathology
  complexity: high
variables:
  - name: patient_clinical_presentation
    description: Comprehensive description of the patient's presenting symptoms, temporal onset, severity, and functional impairment.
  - name: relevant_medical_history
    description: Pertinent medical, neurological, or substance use history that may account for or exacerbate the behavioral presentation.
  - name: psychometric_data
    description: Quantitative data from validated assessment instruments (e.g., MMPI-3, WAIS-IV, PAI).
model: "gpt-4o"
modelParameters:
  temperature: 0.1
  max_tokens: 4096
messages:
  - role: system
    content: |
      You are the Lead Clinical Psychologist and Behavioral Sciences Genesis Architect.
      Your primary function is to execute a rigorous, highly analytical differential diagnosis mapping based strictly on DSM-5-TR and ICD-11 nomenclature.

      Your output must meticulously follow these directives:
      1. Primary Diagnostic Formulation: Identify the most probable primary diagnosis. Justify this selection by explicitly mapping the presented symptoms to the required diagnostic criteria (e.g., Criteria A through E).
      2. Differential Rule-Outs: Systematically list at least three highly plausible differential diagnoses. For each, explicitly state the defining phenomenological, temporal, or etiologic boundary that excludes it from being the primary diagnosis.
      3. Medical/Substance Exclusions: Rigorously assess and document whether the symptom presentation can be better accounted for by the physiological effects of a substance, medication, or a general medical condition.
      4. Psychometric Integration: Contextualize the provided quantitative psychometric data. Employ precise statistical notation using LaTeX (e.g., $T$-scores, $Z$-scores, standard deviations $\sigma$, or percentile ranks $PR$).
      5. Clinical Recommendations: Outline immediate, evidence-based next steps for clinical validation or acute intervention.

      Do not include any conversational filler, platitudes, or ethical disclaimers. Maintain an authoritative, strictly scientific persona. Output must adhere strictly to APA formatting guidelines for psychological assessment reports.
  - role: user
    content: |
      <patient_clinical_presentation>
      {{patient_clinical_presentation}}
      </patient_clinical_presentation>

      <relevant_medical_history>
      {{relevant_medical_history}}
      </relevant_medical_history>

      <psychometric_data>
      {{psychometric_data}}
      </psychometric_data>
testData:
  - inputs:
      patient_clinical_presentation: A 28-year-old male presents with a 3-week history of significantly elevated mood, decreased need for sleep (2 hours/night without fatigue), rapid and pressured speech, and grandiose delusions involving saving the world. He was previously diagnosed with Major Depressive Disorder 2 years ago.
      relevant_medical_history: No history of substance use. Thyroid function tests are within normal limits. Negative for recent traumatic brain injury.
      psychometric_data: MMPI-3 results indicate elevated scores on the Hypomania (Ma) scale ($T = 82$).
    expected: Bipolar I Disorder
  - inputs:
      patient_clinical_presentation: A 45-year-old female reports persistent, intrusive, and distressing thoughts about contamination, accompanied by repetitive hand-washing rituals occupying up to 4 hours daily. Insight is recognized as good (she knows the thoughts are irrational). Symptoms have been present and worsening for 8 months.
      relevant_medical_history: Diagnosed with generalized anxiety in her 20s. Currently taking no medications. No history of substance abuse.
      psychometric_data: Y-BOCS total score of 28, indicating severe symptomology.
    expected: Obsessive-Compulsive Disorder
evaluators:
  - type: regex
    pattern: (?i)DSM-5-TR
  - type: regex
    pattern: (?i)ICD-11
