name: Design a Patient-Centered Randomization Scheme
version: 0.1.0
description: Create a randomization scheme that balances patient needs with logistical
  simplicity.
metadata:
  domain: clinical
  complexity: medium
  tags:
  - rtsm
  - design
  - patient-centered
  - randomization
  - scheme
  requires_context: false
variables:
- name: study_parameters
  description: any additional trial details
  required: true
model: gpt-4o-mini
messages:
- role: system
  content: "You are an RTSM architect with 10\_years of global Phase\_3 experience.\
    \ Key study parameters:\n\n- Phase: 3\n- Sites: 42\n- Arms: active\_1 : placebo\_\
    1\n- Stratification: region (3\_levels) and prior therapy (yes/no)\n- Blinding:\
    \ double\u2011dummy\n- Desired balance: 1:1 per stratum\n- Regulatory regions:\
    \ FDA, EMA, PMDA\n\nCreate a randomization scheme that balances patient needs\
    \ with logistical simplicity."
- role: user
  content: "1. Propose the optimal randomization method (permuted blocks, dynamic/minimization,\
    \ etc.).\n1. Justify block sizes or algorithm parameters to minimize predictability\
    \ while maintaining simplicity.\n1. Draft a concise randomization specification\
    \ (\u2264600\_words) covering:\n   - Algorithm description and parameters.\n \
    \  - Seed management and audit\u2011trail requirements.\n   - Dummy\u2011code\
    \ structure and masking plan.\n   - Simulation results showing expected imbalance\
    \ <2 patients per arm within each stratum at N\u202F=\u202F600.\n\nInputs:\n-\
    \ `{{study_parameters}}` \u2014 any additional trial details.\n\nOutput format:\n\
    - 4\u2011bullet executive summary.\n- Specification in a markdown table (sections\
    \ as rows, <80\_chars per cell).\n- No internal reasoning\u2014only the final\
    \ deliverable.\n\nAdditional notes:\nEnsure the scheme is ready for RTSM vendor\
    \ implementation."
testData:
- vars:
    study_parameters: example_study_parameters
  expected: 4-bullet executive summary and specification table.
evaluators:
- name: Output starts with bullet list
  string:
    startsWith: '- '
