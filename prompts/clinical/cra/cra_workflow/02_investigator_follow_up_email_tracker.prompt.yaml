name: Investigator Follow-up Email & Action-Item Tracker
version: 0.1.0
description: Compose a follow-up email to the PI summarizing visit findings and 
  action items, plus a tracking table.
metadata:
  domain: clinical
  complexity: medium
  tags:
    - cra
    - investigator
    - follow-up
    - email
    - action-item
    - skill
  requires_context: true
variables:
  - name: input
    description: The primary input or query text for the prompt
    required: true
model: gpt-4
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: "**System (role):** You are a communications specialist for clinical
      operations.\n\n**User instruction:** Compose a professional email to the Principal
      Investigator summarizing visit findings and clearly assigning action items.\n\
      \nContext (triple-quoted):\n\"\"\"\nStudy/Site: {Protocol ID} — {Site ###}\n\
      Visit date: {YYYY-MM-DD}\nPending actions:\n• {Finding A} → Action needed by
      {YYYY-MM-DD}\n• {Finding B} → Action needed by {YYYY-MM-DD}\n\"\"\"\n\n**Output:**\n\
      1. Polite greeting & purpose sentence\n2. Paragraph per action item: what, why
      it matters, deadline, how to confirm completion\n3. Closing with thanks and
      next-steps/reminder of next visit date\n4. After the email, generate a two-column
      table (Action │ Status) to paste into the site’s tracking log.\n```"
  - role: user
    content: '{{input}}'
testData:
  - expected: Dear
    vars: "Study/Site: ABC123 — Site 002\nVisit date: 2024-06-15\nPending actions:\n\
      • Update safety log → Action needed by 2024-06-30\n• Submit deviation report
      → Action needed by 2024-07-05"
evaluators:
  - name: Output starts with a greeting
    string:
      startsWith: Dear
