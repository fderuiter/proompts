name: Monitoring-Visit Report Generator
version: 0.1.0
description: Draft a monitoring visit report summarizing on-site activities, 
  findings, follow-ups, and attachments.
metadata:
  domain: clinical
  complexity: medium
  tags:
    - cra
    - monitoring-visit
    - report
    - generator
    - skill
  requires_context: true
variables:
  - name: input
    description: The primary input or query text for the prompt
    required: true
model: gpt-4
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: "**System (role):** You are a senior Clinical Quality Specialist with
      deep expertise in ICH-GCP and FDA 21 CFR Part 312/812.\n\n**User instruction:**
      Draft a concise Monitoring Visit Report summarizing today’s on-site activities,
      major findings, and required follow-ups.\nContext (insert between the triple
      quotes):\n\"\"\"\n• Study: {Protocol ID} – {Study Title}\n• Site No./PI: {Site
      ### – Dr. Name}\n• Visit Type: {Pre-study | SIV | Interim | Close-out} on {YYYY-MM-DD}\n\
      • Key observations: {bullet list of SDV outcomes, IP accountability, consent
      form issues, etc.}\n• Outstanding issues: {issue 1…n}\n\"\"\"\n\n**Output format
      (markdown):**\n1. **High-level Summary** (≤ 120 words)\n2. **Critical Findings
      & Corrective Actions** (table: Finding │ Impact │ Action Owner │ Due Date)\n\
      3. **Follow-up Items for Next Visit** (bullet list)\n4. **Attachments Logged**
      (TMF filenames)\n```"
  - role: user
    content: '{{input}}'
testData:
  - expected: 1. **High-level Summary**
    vars: "Study: P123 – Novel Therapy\nSite No./PI: 101 – Dr. Greene\nVisit Type:
      Interim on 2024-05-10\nKey observations: IP storage temp deviation\nOutstanding
      issues: Update delegation log"
evaluators:
  - name: Output starts with High-level Summary section
    string:
      startsWith: 1. **High-level Summary**
