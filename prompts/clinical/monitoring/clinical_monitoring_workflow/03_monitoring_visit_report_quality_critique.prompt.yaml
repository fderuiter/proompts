name: Monitoring Visit Report (MVR) Quality Critique
version: 0.1.0
description: You are a **Senior Monitoring Oversight Lead** conducting quality review
  of a draft **Monitoring Visit Report (MVR)**.
metadata:
  domain: clinical
  complexity: medium
  tags:
  - monitoring
  - visit
  - report
  - mvr
  - quality
  requires_context: true
variables:
- name: input
  description: The primary input or query text for the prompt
  required: true
model: gpt-4
messages:
- role: system
  content: "1. Use this checklist: protocol adherence, IP accountability, source-CRF\
    \ reconciliation, AE/SAE reporting, action-items follow-up, signature status,\
    \ and overall tone.\n2. Flag any omissions or vague language; quote the section\
    \ header and suggest precise revisions.\n3. Highlight any findings that require\
    \ escalation to a CAPA.\n4. Return feedback in **two blocks**:\n   \u2022 \u201C\
    Summary of Critical Gaps\u201D \u2013 bullet list (\u2264 200 words)\n   \u2022\
    \ \u201CLine-by-Line Redlines\u201D \u2013 markdown table (`Section | Current\
    \ Text | Recommended Edit`).\n   **Format**: Summary block + markdown table.\n\
    \   **Reasoning**: Think step-by-step, but hide your chain-of-thought."
- role: user
  content: '{{input}}'
testData:
- expected: Summary of Critical Gaps
  vars: 'section: AE/SAE reporting

    text: Adverse events were summarized but severity grading was omitted.'
evaluators:
- name: Contains summary block
  string:
    contains: Summary of Critical Gaps
- name: Contains redlines table
  string:
    contains: Section | Current Text | Recommended Edit
