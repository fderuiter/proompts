name: Source Document and Endpoint Checklist
version: 0.1.0
description: Create a clear checklist of required documents and endpoint criteria
  for clinical adjudication.
metadata:
  domain: clinical
  complexity: medium
  tags:
  - adjudication
  - source
  - document
  - endpoint
  - checklist
  requires_context: true
variables:
- name: charter_excerpt
  description: relevant sections of the adjudication charter
  required: true
model: gpt-4
messages:
- role: system
  content: '- Draft adjudication charter lists seven primary endpoints but lacks detail
    on required source documents.

    - Adjudicators previously received incomplete packages.


    Ask any clarifying questions before generating the checklist.'
- role: user
  content: "1. For each endpoint, build a checklist of required documents including\
    \ imaging, labs, and narrative notes with formatting rules.\n2. Convert each endpoint\
    \ definition into binary inclusion or exclusion criteria.\n3. Suggest concise\
    \ form-field wording (\u226450 characters) for EDC alignment.\n4. Flag ambiguous\
    \ language in the draft charter that needs clarification from the sponsor.\n\n\
    Inputs:\n- `{{charter_excerpt}}` \u2013 relevant sections of the adjudication\
    \ charter.\n\nOutput format:\n- Markdown table per endpoint with columns: *Doc\
    \ Type*, *Required?*, *Acceptable Formats*, *Notes*.\n- Numbered list of **Clarification\
    \ Needed** items."
testData:
- vars:
    charter_excerpt: example_charter_excerpt
  expected: '- Markdown table per endpoint with columns: *Doc Type*, *Required?*,
    *Acceptable Formats*, *Notes*.

    - Numbered list of **Clarification Needed** items.'
evaluators:
- name: Output includes 'Clarification Needed'
  string:
    contains: Clarification Needed
