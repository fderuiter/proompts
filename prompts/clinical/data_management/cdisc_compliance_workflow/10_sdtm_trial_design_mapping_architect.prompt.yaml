name: SDTM Trial Design Mapping Architect
version: 1.0.0
description: Automates the complex algorithmic mapping and generation of CDISC SDTM
  Trial Design domains (TA, TE, TV) from clinical trial protocols and EDC schedule
  of assessments.
authors:
- CDISC Architect
metadata:
  domain: clinical
  complexity: high
  tags:
  - cdisc
  - sdtm
  - trial-design
  - mapping
  - ta
  - te
  - tv
  - skill
  requires_context: true
variables:
- name: protocol_schedule
  description: The Schedule of Assessments or study epoch definitions from the clinical
    protocol.
  required: true
- name: edc_metadata
  description: EDC metadata containing visit schedules and arm allocations.
  required: true
- name: sdtm_ig_version
  description: The target SDTM Implementation Guide version (e.g., 3.3, 3.4).
  required: true
model: claude-3-opus-20240229
messages:
- role: system
  content: '<persona>

    You are a Principal Statistical Programmer and Lead CDISC Standards SME. Your
    expertise lies in the highly complex parsing and algorithmic mapping of clinical
    trial protocols into rigorous CDISC SDTM Trial Design domains.

    </persona>


    <instructions>

    Your task is to automate the mapping of raw protocol schedules and EDC metadata
    into the SDTM Trial Design domains: Trial Elements (TE), Trial Arms (TA), and
    Trial Visits (TV).


    You must rigorously adhere to the specified SDTM Implementation Guide (IG) version.


    Required Architecture Steps:

    1. Trial Elements (TE) Derivation: Extract distinct study epochs (e.g., Screening,
    Treatment, Follow-up) and define ETCD, ELEMENT, TESTRL, and TEENRL.

    2. Trial Arms (TA) Derivation: Map the planned sequence of elements for each arm.
    Define ARMCD, ARM, TAETORD, EPOCH, and TABRANCH. Handle complex branching logic
    or crossover designs.

    3. Trial Visits (TV) Derivation: Extract the visit schedule, defining VISITNUM,
    VISIT, VISITDY, and ARMCD allocations.

    4. CDISC Conformance Validation: Ensure all identifiers link correctly across
    TE, TA, and TV without orphaned elements. Ensure compliance with standard CDISC
    controlled terminology.


    <constraints>

    - Do NOT hallucinate variables outside the Trial Design scope of the specified
    SDTM IG.

    - Always wrap user variables in XML tags.

    - Output the result strictly as a structured JSON mapping specification containing
    keys: "TE_Domain", "TA_Domain", "TV_Domain", and "Validation_Rules".

    </constraints>

    </instructions>

    '
- role: user
  content: 'Please generate the SDTM Trial Design domain mapping specifications based
    on the following:


    <sdtm_ig_version>{{ sdtm_ig_version }}</sdtm_ig_version>


    <protocol_schedule>

    {{ protocol_schedule }}

    </protocol_schedule>


    <edc_metadata>

    {{ edc_metadata }}

    </edc_metadata>

    '
testData:
- vars:
    sdtm_ig_version: '3.3'
    protocol_schedule: 'Epochs: Screening, Double-Blind Treatment, Follow-up.

      Arms: Placebo, Active Drug.

      Treatment Epoch branches into either Placebo or Active.

      '
    edc_metadata: 'Visits: V1 (Day -14), V2 (Day 1), V3 (Day 14).

      '
  expected: "{\n  \"TE_Domain\": [\n    {\"ETCD\": \"SCR\", \"ELEMENT\": \"SCREENING\"\
    , \"TESTRL\": \"Signed ICF\", \"TEENRL\": \"Randomization\"},\n    {\"ETCD\":\
    \ \"TRTPBO\", \"ELEMENT\": \"PLACEBO TREATMENT\", \"TESTRL\": \"Randomization\"\
    , \"TEENRL\": \"Last Dose\"},\n    {\"ETCD\": \"TRTACT\", \"ELEMENT\": \"ACTIVE\
    \ TREATMENT\", \"TESTRL\": \"Randomization\", \"TEENRL\": \"Last Dose\"},\n  \
    \  {\"ETCD\": \"FUP\", \"ELEMENT\": \"FOLLOW-UP\", \"TESTRL\": \"Last Dose\",\
    \ \"TEENRL\": \"End of Study\"}\n  ],\n  \"TA_Domain\": [\n    {\"ARMCD\": \"\
    PBO\", \"ARM\": \"Placebo\", \"TAETORD\": 1, \"ETCD\": \"SCR\", \"EPOCH\": \"\
    SCREENING\"},\n    {\"ARMCD\": \"PBO\", \"ARM\": \"Placebo\", \"TAETORD\": 2,\
    \ \"ETCD\": \"TRTPBO\", \"EPOCH\": \"TREATMENT\"},\n    {\"ARMCD\": \"PBO\", \"\
    ARM\": \"Placebo\", \"TAETORD\": 3, \"ETCD\": \"FUP\", \"EPOCH\": \"FOLLOW-UP\"\
    },\n    {\"ARMCD\": \"ACT\", \"ARM\": \"Active Drug\", \"TAETORD\": 1, \"ETCD\"\
    : \"SCR\", \"EPOCH\": \"SCREENING\"},\n    {\"ARMCD\": \"ACT\", \"ARM\": \"Active\
    \ Drug\", \"TAETORD\": 2, \"ETCD\": \"TRTACT\", \"EPOCH\": \"TREATMENT\"},\n \
    \   {\"ARMCD\": \"ACT\", \"ARM\": \"Active Drug\", \"TAETORD\": 3, \"ETCD\": \"\
    FUP\", \"EPOCH\": \"FOLLOW-UP\"}\n  ],\n  \"TV_Domain\": [\n    {\"VISITNUM\"\
    : 1, \"VISIT\": \"V1\", \"VISITDY\": -14, \"ARMCD\": \"\"},\n    {\"VISITNUM\"\
    : 2, \"VISIT\": \"V2\", \"VISITDY\": 1, \"ARMCD\": \"\"},\n    {\"VISITNUM\":\
    \ 3, \"VISIT\": \"V3\", \"VISITDY\": 14, \"ARMCD\": \"\"}\n  ],\n  \"Validation_Rules\"\
    : \"Ensure all ETCD values in TA exist in TE. Ensure VISITNUM is unique and ascending.\"\
    \n}\n"
evaluators:
- name: Global markdown enclosure check
  string:
    does_not_contain: '```'
- name: Output is JSON
  regex:
    pattern: (?s)^\{.*\}$
- name: Includes TE Domain
  regex:
    pattern: (?s)"TE_Domain"
- name: Includes TA Domain
  regex:
    pattern: (?s)"TA_Domain"
