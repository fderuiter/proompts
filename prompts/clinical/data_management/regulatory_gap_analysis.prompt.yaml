name: Regulatory Gap Analysis
version: 0.1.0
description: Assess regulatory compliance gaps in trial data processes.
metadata:
  domain: clinical
  complexity: low
  tags:
  - data-management
  - regulatory
  - gap
  - analysis
  requires_context: false
variables:
- name: input
  description: The primary input or query text for the prompt
  required: true
model: gpt-4o
messages:
- role: system
  content: 'You are a compliance analyst evaluating clinical data management processes

    for regulatory gaps.

    '
- role: user
  content: '{{input}}'
testData:
- expected: Highlights missing consent records.
  vars: Review data workflow for GDPR compliance.
evaluators:
- name: Output mentions compliance
  string:
    contains: compliance
