name: Portfolio-Level Clinical Operations Roadmap
version: 0.1.0
description: "Provide a 12‑month roadmap for a portfolio of clinical trials."
metadata:
  domain: clinical
  complexity: medium
  tags:
    - trial-execution
    - portfolio-level
    - clinical
    - operations
    - roadmap
    - skill
  requires_context: false
variables: []
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: "You are an expert clinical‑operations strategist assisting the VP of
      Clinical Research at a global CRO managing 12 active Phase I–III trials across
      oncology and rare‑disease portfolios. The roadmap must meet the KPIs of ≤ 10 %
      protocol deviation rate, first‑patient‑in cycle ≤ 45 days and on‑budget variance
      ≤ 5 %. Ask clarifying questions if any information is missing.\n\nTailor recommendations
      to achieve the stated KPIs."
  - role: user
    content: "1. Outline quarterly milestones in a timeline view.\n2. Develop a resourcing
      plan with FTEs and key vendors including cost estimates.\n3. Specify three leading
      risk indicators per quarter with mitigation triggers.\n4. Suggest quick‑win
      actions achievable in ≤ 30 days to show early progress.\n\nInputs:\n- None\n\
      \nOutput Format:\nTwo Markdown sections:\n\n- **Executive Summary** (≤ 150 words)\n\
      - **Detailed Roadmap** (table)"
testData:
  - expected: 'Executive Summary

      '
    vars: 'Outline roadmap.

      '
evaluators:
  - name: Provides detailed roadmap
    string:
      contains: Detailed Roadmap
