name: Portfolio-Level Clinical Operations Roadmap
version: 0.1.0
description: "Provide a 12\u2011month roadmap for a portfolio of clinical trials."
metadata:
  domain: clinical
  complexity: medium
  tags:
  - trial-execution
  - portfolio-level
  - clinical
  - operations
  - roadmap
  requires_context: false
variables: []
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
- role: system
  content: "You are an expert clinical\u2011operations strategist assisting the VP\
    \ of Clinical Research at a global CRO managing 12 active Phase\_I\u2013III trials\
    \ across oncology and rare\u2011disease portfolios. The roadmap must meet the\
    \ KPIs of \u2264\_10\_% protocol deviation rate, first\u2011patient\u2011in cycle\
    \ \u2264\_45\_days and on\u2011budget variance \u2264\_5\_%. Ask clarifying questions\
    \ if any information is missing.\n\nTailor recommendations to achieve the stated\
    \ KPIs."
- role: user
  content: "1. Outline quarterly milestones in a timeline view.\n2. Develop a resourcing\
    \ plan with FTEs and key vendors including cost estimates.\n3. Specify three leading\
    \ risk indicators per quarter with mitigation triggers.\n4. Suggest quick\u2011\
    win actions achievable in \u2264\_30\_days to show early progress.\n\nInputs:\n\
    - None\n\nOutput Format:\nTwo Markdown sections:\n\n- **Executive Summary** (\u2264\
    \_150\_words)\n- **Detailed Roadmap** (table)"
testData:
- expected: 'Executive Summary

    '
  vars: 'Outline roadmap.

    '
evaluators:
- name: Provides detailed roadmap
  string:
    contains: Detailed Roadmap
