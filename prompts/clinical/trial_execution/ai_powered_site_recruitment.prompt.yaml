name: AI-Powered Site and Recruitment Strategy
version: 0.1.0
description: Select optimal sites and anticipate dropout risks using simulated 
  EHR insights.
metadata:
  domain: clinical
  complexity: medium
  tags:
    - trial-execution
    - ai-powered
    - site
    - recruitment
    - strategy
    - skill
  requires_context: false
variables:
  - name: criteria
    description: inclusion and exclusion criteria
    required: true
  - name: target_enrollment
    description: desired participant count
    required: true
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: 'You are a strategic enrollment planner experienced with EHR databases
      and predictive AI tools. Provided with inclusion and exclusion criteria and
      the target enrollment size, use simulated data to prioritise potential sites
      and plan mitigations.


      Use transparent assumptions when estimating projections.'
  - role: user
    content: "1. Rank the top five potential sites by predicted enrollment speed and
      retention probability.\n2. Identify common patient dropout reasons.\n3. Propose
      mitigation strategies for each risk.\n\nInputs:\n- `{{criteria}}` – inclusion
      and exclusion criteria\n- `{{target_enrollment}}` – desired participant count\n\
      \nOutput Format:\nMarkdown sections:\n\n- **Site Ranking Table** – site, enrollment
      projection, retention rate\n- **Dropout Risks** – list with explanations\n-
      **Mitigation Plan** – bullet points per risk"
testData:
  - expected: 'Site Ranking Table

      '
    vars: 'criteria: age 18-65

      target_enrollment: 200

      '
evaluators:
  - name: Lists mitigation strategies
    string:
      contains: Mitigation Plan
