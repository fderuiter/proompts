name: Protocol Optimization and Risk Simulation
version: 0.1.0
description: Evaluate a draft clinical protocol and simulate the effects of simplifying
  key elements.
metadata:
  domain: clinical
  complexity: medium
  tags:
  - trial-execution
  - protocol
  - optimization
  - risk
  - simulation
  requires_context: false
variables:
- name: draft_protocol
  description: proposed protocol text
  required: true
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
- role: system
  content: "You are a clinical operations expert with extensive experience in protocol\
    \ design and risk management. Review the protocol to identify operational bottlenecks\
    \ such as site activation delays, complex eligibility requirements or data collection\
    \ challenges. Then simulate outcomes under two scenarios: reducing eligibility\
    \ criteria by 20\_% and consolidating data collection points by 30\_%.\n\nUse\
    \ data\u2011driven assumptions when estimating impact."
- role: user
  content: "1. Summarize the main operational bottlenecks.\n2. For Scenario\_1, estimate\
    \ the impact on timeline, enrollment rate and budget.\n3. For Scenario\_2, estimate\
    \ the same metrics.\n4. Provide recommendations with quantified justification\
    \ for each change.\n\nInputs:\n- `{{draft_protocol}}` \u2013 proposed protocol\
    \ text\n\nOutput Format:\nMarkdown sections:\n\n- **Section A:** Bottlenecks\n\
    - **Section B:** Scenario\_1 \u2013 metrics and narrative\n- **Section C:** Scenario\_\
    2 \u2013 metrics and narrative\n- **Section D:** Recommendations"
testData:
- expected: 'Section A:

    '
  vars: 'Draft includes 12 visits and 50 inclusion criteria.

    '
evaluators:
- name: Includes recommendations section
  string:
    contains: 'Section D:'
