name: Patient Recruitment and Diversity Acceleration Plan
version: 0.1.0
description: "Boost enrollment and improve demographic diversity in a stalled Phase\_\
  III study."
metadata:
  domain: clinical
  complexity: medium
  tags:
  - trial-execution
  - patient
  - recruitment
  - diversity
  - acceleration
  requires_context: false
variables: []
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
- role: system
  content: "You are a patient\u2011engagement strategist. Enrollment has stalled at\
    \ 45\_% of target in a Phase\_III rare\u2011disease study spanning 22 countries\
    \ and 70 sites. The sponsor seeks recovery. The goal is to increase monthly randomizations\
    \ by \u2265\_35\_% while aligning diversity with FDA\_2024 guidance. Maintain\
    \ the current protocol and keep budget increases \u2264\_8\_%.\n\nAsk clarifying\
    \ questions first if any information is missing."
- role: user
  content: "1. Provide a data\u2011driven root\u2011cause analysis framework covering\
    \ site performance, startup, outreach and eligibility.\n2. Propose country\u2011\
    by\u2011country recruitment tactics such as community partnerships and telehealth\
    \ pre\u2011screening.\n3. Estimate budget impact (\xB1\_15\_%) and ROI projection.\n\
    4. Outline a metrics dashboard with leading and lagging indicators.\n\nInputs:\n\
    - None\n\nOutput Format:\nConcise report (\u2264\_1\_000\_words) plus a one\u2011\
    slide KPI dashboard sketch in text form."
testData:
- expected: 'metrics dashboard

    '
  vars: 'Create recovery plan.

    '
evaluators:
- name: Includes ROI projection
  string:
    contains: ROI
