name: Adaptive Recruitment and Retention Strategy
version: 0.1.0
description: Design an optimized recruitment and retention plan for a multi-site pivotal
  study.
metadata:
  domain: clinical
  complexity: medium
  tags:
  - trial-execution
  - adaptive
  - recruitment
  - retention
  - strategy
  requires_context: false
variables:
- name: device_or_ivd
  description: device or diagnostic under study
  required: true
- name: patient_population
  description: target population
  required: true
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
- role: system
  content: "You are a clinical trial CRO strategist planning a study of **{{device_or_ivd}}**\
    \ in **{{patient_population}}**. The strategy should incorporate AI\u2011enhanced\
    \ pre\u2011screening, site\u2011level engagement tactics and metrics to monitor\
    \ recruitment risk and retention performance.\n\nEnsure the plan is adaptable\
    \ to varying enrollment rates."
- role: user
  content: "1. Outline an AI\u2011assisted pre\u2011screening workflow (e.g., tele\u2011\
    calls, transportation support).\n2. Describe site\u2011level engagement tactics\
    \ such as CRO\u2013site alignment and digital outreach.\n3. Define metrics to\
    \ track recruitment risk and retention performance.\n\nInputs:\n- `{{device_or_ivd}}`\
    \ \u2013 device or diagnostic under study\n- `{{patient_population}}` \u2013 target\
    \ population\n\nOutput Format:\nMarkdown list or table covering:\n1. Pre\u2011\
    screening workflow\n2. Site-level engagement tactics\n3. Recruitment and retention\
    \ metrics"
testData:
- expected: "Pre\u2011screening workflow\n"
  vars: 'device_or_ivd: glucose monitor

    patient_population: adults with diabetes

    '
evaluators:
- name: Contains metrics section
  string:
    contains: Recruitment and retention metrics
