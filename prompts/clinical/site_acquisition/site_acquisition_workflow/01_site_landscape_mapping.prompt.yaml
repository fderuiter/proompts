name: Site Landscape Mapping & Prioritization
version: 0.1.0
description: Rank investigative sites for an upcoming study.
metadata:
  domain: clinical
  complexity: medium
  tags:
    - site-acquisition
    - site
    - landscape
    - mapping
    - prioritization
    - skill
  requires_context: true
variables:
  - name: protocol_summary
    description: final study synopsis
    required: true
model: gpt-4o-mini
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: 'You are a senior clinical-operations strategist at a global CRO. Use
      the provided study synopsis.


      Rank investigative sites for an upcoming study.'
  - role: user
    content: "1. Ask up to three clarifying questions if details are missing.\n1.
      Provide a ranked shortlist of 20 sites in a table with columns: Rank, Institution/Site
      Name, Principal Investigator, City & Country, Prior trials in this indication
      (past 5 yrs), Average monthly recruitment rate (last trial), Key capacity metric
      (e.g., open beds), Contact e-mail/phone, and Source links.\n\nInputs:\n- `{{protocol_summary}}`
      – final study synopsis.\n\nOutput format:\nMarkdown table listing recommended
      sites.\n\nAdditional notes:\n- Include only sites whose current trial load is
      ≤ 80% of historical maximum.\n- Cover at least three geographic regions.\n-
      Base recommendations on public registries and sponsor data.\n- Cite every data
      source in column 9."
testData:
  - expected: Rank
    vars: 'protocol_summary: Example Phase II oncology study synopsis'
evaluators:
  - name: Output starts with 'Rank'
    string:
      startsWith: Rank
