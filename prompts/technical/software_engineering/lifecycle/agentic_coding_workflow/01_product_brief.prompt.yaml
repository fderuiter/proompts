name: Product Brief Template
version: 0.1.0
description: Outline the high-level vision, features, and architecture for a new software
  project.
metadata:
  domain: technical
  complexity: high
  tags:
  - software-engineering
  - sdlc
  - product
  - brief
  - template
  requires_context: false
variables:
- name: architecture
  description: overview of proposed architecture
  required: true
- name: context_notes
  description: constraints or risks
  required: true
- name: features
  description: feature list organised by phase
  required: true
- name: vision
  description: short statement of the desired end state
  required: true
model: gpt-4
messages:
- role: system
  content: 'Use this brief when kicking off a new application or clarifying scope
    with collaborators.


    This template helps align teams before development begins.'
- role: user
  content: "1. Describe the overall product vision.\n1. List key features with associated\
    \ phases or milestones.\n1. Summarize the chosen architectural style and component\
    \ interactions.\n1. Capture additional context, constraints, or stakeholder expectations.\n\
    Inputs:\n- `{{vision}}` \u2013 short statement of the desired end state\n- `{{features}}`\
    \ \u2013 feature list organised by phase\n- `{{architecture}}` \u2013 overview\
    \ of proposed architecture\n- `{{context_notes}}` \u2013 constraints or risks\n\
    Output format:\nMarkdown sections titled **Vision**, **Key Features and Roadmap**,\
    \ **Overall Architecture**, and **Additional Context**."
testData:
- vars:
    vision: example_vision
    architecture: example_architecture
    features: example_features
    context_notes: example_context_notes
  expected: Markdown sections titled **Vision**, **Key Features and Roadmap**, **Overall
    Architecture**, and **Additional Context**.
evaluators:
- name: Output starts with 'Vision'
  string:
    startsWith: Vision
