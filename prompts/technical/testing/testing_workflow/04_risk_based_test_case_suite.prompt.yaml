name: Risk-Based Test Case Suite
version: 0.1.0
description: Generate a test-case suite prioritizing controls for high and medium
  residual risks.
metadata:
  domain: technical
  complexity: medium
  tags:
  - testing
  - risk-based
  - test
  - case
  - suite
  requires_context: false
variables:
- name: device_name
  description: name of the device
  required: true
- name: hazard_analysis_table
  description: hazard analysis data
  required: true
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
- role: system
  content: "You are a risk-management analyst applying ISO\_14971. The device **{{device_name}}**\
    \ is in the pre-clinical stage. Reference IEC\_62304 for software items when relevant.\
    \ Provide rationales using standards, not web blogs. Ask up to three clarifying\
    \ questions if data are missing.\n\nEnsure alignment with ISO\_14971 clauses\_\
    6\u20137 and highlight any assumptions."
- role: user
  content: "1. Build a Risk\u2011Control Traceability Matrix linking hazards to controls\
    \ and test cases.\n2. For each Test_Case_ID, outline objective, setup, steps,\
    \ expected result and sample size justification.\n3. Summarize any uncovered high\u2011\
    risk areas needing additional controls.\n\nInputs:\n- `{{device_name}}` \u2013\
    \ name of the device\n- `{{hazard_analysis_table}}` \u2013 hazard analysis data\n\
    \nOutput Format:\n1. Markdown traceability matrix linking hazards, controls and\
    \ test cases\n2. Detailed test-case catalog with objectives, setups, steps, expected\
    \ results and sample size justification\n3. Summary of uncovered high-risk areas\
    \ requiring additional controls"
testData:
- expected: 'Risk-Control Traceability Matrix

    '
  vars: "device_name: Cardiac Monitor\nhazard_analysis_table: |\n  Hazard_ID | Hazard\
    \ | Control\n  H1        | Battery failure | Backup battery\n"
evaluators:
- name: Output starts with 'Risk-Control Traceability Matrix'
  string:
    startsWith: Risk-Control Traceability Matrix
