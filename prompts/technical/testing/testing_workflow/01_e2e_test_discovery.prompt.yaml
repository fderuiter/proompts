name: E2E Test Discovery Template
version: 0.1.0
description: "Guide a model to analyze a codebase and produce a comprehensive end\u2011\
  to\u2011end test plan."
metadata:
  domain: technical
  complexity: high
  tags:
  - testing
  - e2e
  - test
  - discovery
  - template
  requires_context: true
variables:
- name: business_goal
  description: overall objective
  required: true
- name: languages_frameworks
  description: The programming or natural language to use
  required: true
- name: project_name
  description: name of the project
  required: true
model: gpt-4o
messages:
- role: system
  content: "This prompt is used with a repository URL or zipped source tree for **{{project_name}}**.\
    \ Provide the primary tech stack and the high\u2011level business goal. The assistant\
    \ acts as an expert test architect and senior software engineer.\n\nAim for exhaustive\
    \ coverage. Respond only with the open questions list until all unknowns are resolved."
- role: user
  content: "1. Map the structure: apps, packages, routes, entry points and existing\
    \ test frameworks.\n2. Outline critical user journeys with triggers, expected\
    \ behaviour, data mutations and side effects.\n3. Catalogue REST/GraphQL endpoints,\
    \ message queues and third\u2011party APIs with schemas and auth methods.\n4.\
    \ Identify state management and seed data needed for deterministic tests.\n5.\
    \ Capture non\u2011functional requirements such as performance, a11y, security\
    \ and compliance.\n6. List validation rules, error branches and retry logic.\n\
    7. Describe how to spin up the system locally or in CI and recommend tooling if\
    \ needed.\n8. Produce a table grouping E2E scenarios by theme with priority and\
    \ test data.\n9. Highlight coverage gaps and risk areas.\n10. After the first\
    \ pass, list any open questions before finalizing.\n\nInputs:\n- `{{project_name}}`\
    \ \u2013 name of the project\n- `{{languages_frameworks}}` \u2013 tech stack\n\
    - `{{business_goal}}` \u2013 overall objective\n\nOutput Format:\nMarkdown report\
    \ with sections:\n\n1. Repository Overview\n2. Critical User Journeys\n3. API\
    \ / Interface Catalogue\n4. State & Data Requirements\n5. Non\u2011Functional\
    \ Requirements\n6. Edge Cases & Negative Paths\n7. Environment & Tooling\n8. Proposed\
    \ E2E Test Suite\n9. Coverage Gaps & Risk Register"
testData:
- expected: 'Repository Overview

    '
  vars: 'project_name: Cartify

    languages_frameworks: Django, React

    business_goal: Enable online shopping for users

    '
evaluators:
- name: Output starts with 'Repository Overview'
  string:
    startsWith: Repository Overview
