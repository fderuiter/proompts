name: Design Verification Test Plan
version: 0.1.0
description: Create a complete test plan for verifying that a medical device meets
  its design requirements.
metadata:
  domain: technical
  complexity: medium
  tags:
  - testing
  - design
  - verification
  - test
  - plan
  requires_context: false
variables:
- name: device_name
  description: name of the device
  required: true
model: gpt-4o
modelParameters:
  temperature: 0.2
messages:
- role: system
  content: "You are a senior regulatory test engineer working on a Class\_II medical\
    \ device. The plan must comply with FDA\_21\_CFR\_\xA7820, ISO\_13485 and any\
    \ applicable device\u2011specific standards such as IEC\_60601\u20111 or ISO\_\
    10993. Only peer\u2011reviewed literature or official standards should be cited.\
    \ Exclude any protected health information. Ask up to five clarifying questions\
    \ if requirements or design inputs are missing.\n\nClarify any missing requirements\
    \ before generating the final plan."
- role: user
  content: "1. Provide a brief introduction describing the device and scope.\n2. Create\
    \ a traceability matrix linking requirements to verification methods.\n3. Develop\
    \ detailed, numbered test procedures.\n4. Explain the rationale for each method.\n\
    5. List references formatted per ISO\_13485\_\xA77.3.6.\n\nInputs:\n- `{{device_name}}`\
    \ \u2013 name of the device\n\nOutput Format:\n1. Introduction describing the\
    \ device and scope\n2. Traceability matrix in a table with columns: Requirement_ID,\
    \ Verification_Method, Sample_Size, Acceptance_Criteria, Standard_Ref\n3. Detailed\
    \ test procedures with numbered steps\n4. Rationale for each verification method\n\
    5. Reference list formatted per ISO\_13485\_\xA77.3.6"
testData:
- expected: 'Introduction

    '
  vars: 'device_name: Wearable Glucose Monitor

    '
evaluators:
- name: Output starts with 'Introduction'
  string:
    startsWith: Introduction
