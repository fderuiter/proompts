---
name: Medical Device Cybersecurity Threat Modeling
version: 1.0.0
description: Analyze system architecture using STRIDE.
metadata:
  domain: technical
  complexity: high
  tags:
  - security
  - medical
  - device
  - cybersecurity
  - threat
  - domain:technical
  requires_context: false
variables:
- name: system_architecture
  description: The detailed system architecture to analyze.
  required: true
model: gpt-4o
modelParameters:
  temperature: 0.1
messages:
- role: system
  content: |-
    You are a Senior Medical Device Cybersecurity Architect. Your task is to perform a rigorous STRIDE threat modeling analysis for a medical device system, strictly adhering to FDA Premarket Cybersecurity Guidance (FDA-2018-D-3443).

    Analyze the provided system architecture description for potential vulnerabilities across all STRIDE categories:
    - **S**poofing
    - **T**ampering
    - **R**epudiation
    - **I**nformation Disclosure
    - **D**enial of Service
    - **E**levation of Privilege

    Provide a structured report including an Executive Summary, a detailed STRIDE Analysis table, and prioritized Mitigation Strategies.
- role: user
  content: |-
    Analyze the following medical device system architecture:

    <system_architecture>
    {{ system_architecture }}
    </system_architecture>

    Generate a comprehensive Threat Modeling Report.

    Output format:

    # Executive Summary
    [Brief overview of the system's risk profile]

    ## STRIDE Threat Analysis
    | Threat Category | Potential Vulnerability | Impact | Likelihood |
    | :--- | :--- | :--- | :--- |
    | Spoofing | ... | ... | ... |
    | ... | ... | ... | ... |

    ## Mitigation Strategies
    1. **[Threat ID]**: [Specific technical control]
    2. ...

    ## Compliance Note
    Confirm alignment with FDA Premarket Cybersecurity Guidance.
testData:
- expected: Detailed STRIDE analysis covering BLE spoofing, Man-in-the-Middle attacks on OTA updates, and cloud data breaches.
  vars:
    system_architecture: 'NeuroLink BCI System: A brain-computer interface implant communicating via BLE 5.0 to a patient
      mobile app (iOS/Android). The app syncs data to a cloud backend (AWS HIPAA-compliant) via HTTPS/TLS 1.3. OTA updates
      are pushed from the cloud to the implant via the mobile app. The implant has no physical ports.'
- expected: Analysis focusing on physical access threats, USB-based malware introduction (Tampering), and insider threats
    (Service Technicians).
  vars:
    system_architecture: 'Legacy Mechanical Ventilator (Model V-200): A standalone life-support device with no network connectivity
      (WiFi/Bluetooth disabled/removed). It features a USB port for firmware updates and maintenance logs, accessible only
      by authorized service technicians using a physical key to open the port cover.'
- expected: Critical analysis highlighting the risks of 'security by obscurity', lack of standard protocols, and potential
    implementation flaws in proprietary encryption.
  vars:
    system_architecture: 'Secure Box: A generic medical device that claims to be ''unhackable'' because it uses ''proprietary
      encryption''.'
evaluators:
- name: Executive Summary Header
  regex:
    pattern: (?m)^# Executive Summary
- name: STRIDE Analysis Header
  regex:
    pattern: (?m)^## STRIDE Threat Analysis
- name: Mitigation Strategies Header
  regex:
    pattern: (?m)^## Mitigation Strategies
- name: STRIDE Categories
  regex:
    pattern: (?s)Spoofing.*Tampering.*Repudiation.*Information Disclosure.*Denial of Service.*Elevation of Privilege
- name: FDA Compliance Reference
  regex:
    pattern: (?i)FDA Premarket Cybersecurity Guidance
