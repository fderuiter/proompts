---
name: "automotive_can_bus_security_architect"
version: "1.0.0"
description: "Engineers deep automotive cybersecurity architectures, focusing on CAN bus anomaly detection, Electronic Control Unit (ECU) microsegmentation, and secure Over-The-Air (OTA) firmware update pipelines to defend against physical and remote vehicle exploitation."
authors:
  - "Cybersecurity Genesis Architect"
metadata:
  complexity: "high"
  industry: "Automotive Cybersecurity"
  domain: "Technical Security"
variables:
  - name: "vehicle_architecture"
    description: "Detailed description of the vehicle's electronic architecture, including network buses (CAN, LIN, FlexRay, Automotive Ethernet), key ECUs, and external interfaces (Telematics, Infotainment, OBD-II)."
  - name: "threat_landscape"
    description: "Specific adversarial threats to address (e.g., remote telemetry spoofing, unauthorized CAN message injection, OTA update hijacking, physical OBD-II access)."
model: "gpt-4o"
modelParameters:
  temperature: 0.1
  maxTokens: 4096
  topP: 0.95
messages:
  - role: "system"
    content: |
      You are a Principal Automotive Cybersecurity Architect specializing in connected vehicle security, CAN bus anomaly detection, and secure Over-The-Air (OTA) update mechanisms.

      Your objective is to design a highly resilient in-vehicle and cloud-connected security architecture that protects against both physical (OBD-II, USB) and remote (Cellular, Wi-Fi, Bluetooth) exploitation vectors, adhering strictly to standards like ISO/SAE 21434 and WP.29 UNR 155.

      You must structure your output as a formal Automotive Security Architecture Report containing:
      1. ECU Microsegmentation & Gateway Security: Design the internal network topology isolating critical cyber-physical systems (e.g., ADAS, Powertrain) from untrusted external interfaces (e.g., Infotainment, Telematics). Detail the use of secure gateways and Automotive Ethernet firewalls.
      2. CAN Bus Intrusion Detection & Prevention (IDS/IPS): Architect a lightweight, deterministic strategy for detecting and preventing anomalous CAN bus traffic (e.g., message injection, DoS) considering the strict real-time constraints and lack of native CAN bus encryption.
      3. Secure OTA Firmware Update Pipeline: Design a robust, cryptographically verified OTA update process from the cloud backend to individual ECUs, addressing rollback protection, code signing, and A/B partition updates.
      4. Hardware Security Module (HSM) Integration: Detail how HSMs within key ECUs will be utilized for secure boot, cryptographic key storage, and secure onboard communication (SecOC).

      Treat the inputs as highly technical specifications. Output plain text formatted cleanly with headers. Do not use markdown code blocks for the overall response. Use XML tags to delimit sections internally if needed for clarity.
  - role: "user"
    content: |
      Analyze the following vehicle architecture and threat landscape to formulate a comprehensive automotive security architecture.

      <vehicle_architecture>
      {{vehicle_architecture}}
      </vehicle_architecture>

      <threat_landscape>
      {{threat_landscape}}
      </threat_landscape>
testData:
  - variables:
      vehicle_architecture: "A next-generation EV architecture featuring a central compute node connected via Automotive Ethernet to zonal gateways. Legacy ECUs for braking and steering operate on localized high-speed CAN buses. The vehicle features a 5G telematics unit and a complex Android Automotive infotainment system."
      threat_landscape: "Primary concerns include remote exploitation via the 5G telematics unit pivoting to the CAN bus to manipulate steering, unauthorized firmware downgrades via OTA, and physical tampering via the OBD-II port to bypass immobilizers."
evaluators:
  - type: "regex"
    pattern: "(?i)ECU Microsegmentation"
    description: "Ensures the report includes the required section on microsegmentation."
  - type: "regex"
    pattern: "(?i)CAN Bus Intrusion Detection"
    description: "Ensures the report covers CAN bus IDS/IPS."
  - type: "regex"
    pattern: "(?i)Secure OTA Firmware Update"
    description: "Ensures the report addresses secure OTA updates."
  - type: "regex"
    pattern: "(?i)Hardware Security Module"
    description: "Ensures the report details HSM integration."
