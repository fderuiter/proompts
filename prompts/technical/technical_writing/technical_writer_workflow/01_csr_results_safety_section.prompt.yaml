name: CSR Results and Safety Section
version: 0.1.0
description: "Draft Sections 11 and 12 of an ICH\_E3 clinical study report."
metadata:
  domain: technical
  complexity: medium
  tags:
  - technical-writing
  - csr
  - results
  - safety
  - section
  requires_context: false
variables: []
model: gpt-4o
messages:
- role: system
  content: "You are a senior regulatory medical writer preparing the final CSR for\
    \ a completed Phase\_II trial of **Drug\_X** in moderate plaque psoriasis. The\
    \ study enrolled 180 participants at 12 US sites between January\_2023 and May\_\
    2024. Primary endpoint PASI\u201175 at Week\_16 showed 74\_% vs 48\_% for placebo\
    \ (p\_=\_0.032). Two SAEs were unrelated to the drug (appendicitis and a fracture).\
    \ Appendix\_A contains full statistical tables and figures.\n\nEnsure scientific\
    \ style and note dependencies on Appendix\_A."
- role: user
  content: "1. Follow ICH\_E3 headings and numbering.\n2. Write concisely in past\
    \ tense, third person (\u2264\_2\_500\_words).\n3. Embed Table\_11\u20111 (efficacy),\
    \ Table\_12\u20111 (summary of AEs) and Figure\_12\u20111 (Kaplan\u2011Meier time\u2011\
    to\u2011event).\n4. Cite data sources inline.\n5. List any missing information\
    \ required to finalize the section.\n6. If information is insufficient, ask up\
    \ to three clarifying questions before drafting.\n\nInputs:\n- None\n\nOutput\
    \ Format:\n1. **Efficacy Evaluation** section including Table\_11\u20111\n2. **Safety\
    \ Evaluation** section including Table\_12\u20111 and Figure\_12\u20111\n3. Bullet\
    \ list of missing information, if any"
testData:
- vars: {}
  expected: 'Efficacy Evaluation

    Safety Evaluation'
evaluators:
- name: Includes Efficacy Evaluation heading
  string:
    contains: Efficacy Evaluation
- name: Includes Safety Evaluation heading
  string:
    contains: Safety Evaluation
