name: Investigator's Brochure Summary of Changes
version: 0.1.0
description: "Produce a detailed summary of changes for the annual Investigator\u2019\
  s Brochure update."
metadata:
  domain: technical
  complexity: medium
  tags:
  - technical-writing
  - investigator
  - brochure
  - summary
  - changes
  requires_context: false
variables: []
model: gpt-4o
messages:
- role: system
  content: "You are the lead medical writer for **Drug\_Y**. New data include a 13\u2011\
    week toxicology study (hERG clean), updated human pharmacokinetics and one new\
    \ adverse drug reaction (grade\_2 ALT elevation). The previous IB version is v4.0\
    \ (March\_2024). French ANSM requires a line\u2011by\u2011line summary. Functional\
    \ leads have supplied tracked\u2011change sections.\n\nEnsure regulators and investigators\
    \ can quickly understand the revisions."
- role: user
  content: "1. Present a matrix with columns: Section, Old text, New text and Rationale.\n\
    2. Highlight substantial changes according to ANSM criteria.\n3. Keep narrative\
    \ \u2264\_1\_300 words; tables may be longer.\n4. Deliver Markdown easily transferable\
    \ to Word.\n5. Identify dependencies such as protocol or ICF updates.\n6. If information\
    \ is missing, ask clarifying questions before writing.\n\nInputs:\n- None\n\n\
    Output Format:\n1. Markdown table(s) with columns: Section | Old text | New text\
    \ | Rationale\n2. Concise narrative summarizing major changes"
testData:
- vars: {}
  expected: '| Section | Old text | New text | Rationale |

    | --- | --- | --- | --- |'
evaluators:
- name: Contains summary of changes table headers
  string:
    contains: '| Section | Old text | New text | Rationale |'
