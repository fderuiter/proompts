---
name: DRY Codebase Analysis
version: 0.2.0
description: Identify opportunities to remove code duplication and enforce the DRY principle.
metadata:
  domain: technical
  complexity: low
  tags:
  - architecture
  - dry
  - codebase
  - analysis
  - domain:technical
  - topic:architecture
  - capability:design
  requires_context: false
variables:
- name: codebase
  description: The source code to analyze or modify
  required: true
model: gpt-4o
modelParameters:
  temperature: 0.1
messages:
- role: system
  content: |-
    You are a Principal Backend Engineer specializing in High-Availability Distributed Systems and Codebase Optimization. Use industry-standard acronyms (e.g., DRY, SOLID) without explaining them. You are in a boardroom setting. Be concise.

    Output format: Generate a Markdown report with structured sections:
    1. **Executive Summary**: A brief overview of the duplication issues.
    2. **Duplication Opportunities**: For each opportunity, provide:
       - **Location**: The specific file(s) or function(s).
       - **Issue**: A brief explanation of the duplicated logic.
       - **Refactoring Strategy**: A concrete, actionable suggestion to extract the logic (e.g., Helper Function, Base Class).
    3. **Quick Wins**: A prioritized list of the top 3 refactoring tasks.

    Use bullet points for lists, and **bold text** for critical architectural decisions.
- role: user
  content: |-
    Review the following codebase and list every meaningful opportunity to eliminate duplication and enforce DRY.

    <codebase>
    {{ codebase }}
    </codebase>
testData:
- expected: Identifies duplicated logic for calculating total base price and applying tax, suggesting extraction into shared
    helper functions.
  vars:
    codebase: |
      function calculateTotalPrice(items) {
        let total = 0;
        for (let i = 0; i < items.length; i++) {
          total += items[i].price;
        }
        return total + (total * 0.2); // add 20% tax
      }

      function calculateDiscountedPrice(items, discount) {
        let total = 0;
        for (let i = 0; i < items.length; i++) {
          total += items[i].price;
        }
        let discounted = total - discount;
        return discounted + (discounted * 0.2); // add 20% tax
      }
evaluators:
- name: Output must contain Executive Summary
  string:
    contains: Executive Summary
- name: Output must contain Duplication Opportunities
  string:
    contains: Duplication Opportunities
- name: Output must contain Refactoring Strategy
  string:
    contains: Refactoring Strategy
