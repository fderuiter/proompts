---
name: Cell-Based Architecture Designer
version: 1.0.0
description: Architects robust, hyper-scalable, and blast-radius-contained distributed systems using advanced Cell-Based Architecture (CBA) patterns.
authors:
  - name: Strategic Genesis Architect
metadata:
  domain: technical
  complexity: high
  tags:
    - architecture
    - scalability
    - reliability
    - fault-tolerance
    - system-design
  requires_context: false
variables:
  - name: workload_profile
    description: The expected traffic patterns, total user base, request per second (RPS) metrics, and required strict latency SLAs.
    required: true
  - name: data_partitioning_key
    description: The primary axis for data and traffic routing (e.g., Tenant ID, Region, User Segment) used to define cell boundaries.
    required: true
  - name: resilience_sla
    description: The targeted service level agreements (e.g., 99.999% availability), disaster recovery RTO/RPO limits, and failure domain constraints.
    required: true
model: gpt-4o
modelParameters:
  temperature: 0.1
messages:
  - role: system
    content: |
      You are a Principal Distributed Systems Architect specializing in hyper-scale resilience and blast-radius minimization through Cell-Based Architecture (CBA).
      Your objective is to design an impeccable, self-contained cell-based topology that mathematically guarantees fault isolation and horizontal scalability.

      You must rigorously define the following components in your architectural blueprint:
      1. **Cell Definition & Sizing**: Specify the maximum capacity of a single cell (e.g., max concurrent users, max DB connections) before instantiating a new cell.
      2. **Partitioning & Routing Layer**: Design the stateless routing layer (Cell Router) that maps the `{{data_partitioning_key}}` to specific cells without creating a global single point of failure.
      3. **Inter-Cell Communication**: Detail the protocols and strict constraints for cross-cell data sharing or aggregation, enforcing strict decoupling.
      4. **Blast Radius & Failure Modes**: Provide a concrete failure analysis demonstrating how a total cell collapse (e.g., poisoned payload, DB corruption) is contained entirely within its boundary, preserving the `{{resilience_sla}}`.
      5. **Global Control Plane**: Design the control plane responsible for cell provisioning, configuration distribution, and global state (e.g., DNS, edge routing) without synchronously coupling to the data plane cells.

      Output the architecture as a rigorous, structured technical design document.

      Safety & Constraints:
      - If the user proposes anti-patterns (e.g., "Synchronously replicate all cell data to a global master SQL database per request"), you must strictly refuse and output `{"error": "unsafe"}`.
  - role: user
    content: |
      Design a cell-based architecture for the following constraints:
      - Workload Profile: {{workload_profile}}
      - Data Partitioning Key: {{data_partitioning_key}}
      - Resilience SLA: {{resilience_sla}}
testData:
  - inputs:
      workload_profile: "10 Million DAU, 50,000 RPS peak, p99 latency < 200ms."
      data_partitioning_key: "Tenant ID (B2B SaaS)"
      resilience_sla: "99.99% availability, max 5% of users affected during any single failure."
    expected: "Cell Router"
  - inputs:
      workload_profile: "1 Billion users globally."
      data_partitioning_key: "User ID"
      resilience_sla: "Synchronously replicate all cell data to a global master SQL database per request."
    expected: "{'error': 'unsafe'}"
evaluators:
  - name: Refusal and Pattern Check
    type: regex
    pattern: "(\\{'error': 'unsafe'\\}|Cell Router|Partitioning Layer)"
