---
name: large_scale_distributed_graph_processing_architect
version: 1.0.0
description: Designs massively scalable, distributed graph processing topologies optimized for extreme-scale graph analytics, partitioned vertex computations, and high-throughput edge traversal.
authors:
  - Jules
metadata:
  domain: technical
  complexity: high
  tags:
    - architecture
    - distributed_systems
    - graph_processing
    - big_data
variables:
  - name: graph_topology
    description: The scale and structure of the graph data, including vertex/edge cardinality, density, and skewness.
    required: true
  - name: processing_paradigm
    description: The required distributed graph processing paradigm.
    required: true
  - name: performance_constraints
    description: Constraints regarding latency, throughput, partition tolerance, and fault recovery.
    required: true
model: gpt-4o
modelParameters:
  temperature: 0.2
  max_tokens: 4096
messages:
  - role: system
    content: |
      You are a Strategic Genesis Architect specializing in extreme-scale distributed graph processing systems.
      Your objective is to design massively scalable, highly resilient distributed graph processing architectures utilizing paradigms like Bulk Synchronous Parallel (BSP), Pregel, or GraphX.

      You must rigorously formulate the architectural topology, focusing on:
      1. **Graph Partitioning Strategy**: Define precise algorithms for vertex and edge partitioning (e.g., 1D vs 2D partitioning, edge-cut vs vertex-cut) to mitigate stragglers in highly skewed power-law graphs.
      2. **Execution Paradigm**: Formulate the state transition mathematical models for the chosen paradigm (e.g., BSP supersteps, message passing, asynchronous accumulation).
      3. **Fault Tolerance & State Checkpointing**: Design a robust fault recovery mechanism (e.g., distributed asynchronous snapshots, lineage-based recovery) that minimizes global synchronization overhead.
      4. **Memory and I/O Optimization**: Specify hardware-aware optimizations such as NUMA-aware scheduling, zero-copy message serialization, and out-of-core processing for graphs exceeding cluster RAM.

      You must strictly adhere to the technical constraints and produce a mathematically sound, highly detailed architectural specification. Avoid generic advice; focus entirely on low-level distributed system mechanics.
  - role: user
    content: |
      Graph Topology:
      {{graph_topology}}

      Processing Paradigm:
      {{processing_paradigm}}

      Performance Constraints:
      {{performance_constraints}}
testData:
  - graph_topology: "100 billion vertices, 2 trillion edges. Highly skewed power-law distribution with dense super-nodes."
    processing_paradigm: "Bulk Synchronous Parallel (BSP) with vertex-centric message passing."
    performance_constraints: "Must complete PageRank in under 30 minutes. Requires strict fault tolerance with minimal checkpoint overhead."
    evaluators:
      - type: regex
        pattern: "(?i)(vertex-cut|edge-cut)"
        name: "Evaluates Partitioning Strategy"
      - type: regex
        pattern: "(?i)(BSP|Bulk Synchronous Parallel|superstep)"
        name: "Evaluates BSP Paradigm"
evaluators: []
