name: PromptCrafter GPT
version: 0.1.0
description: Generate three distinct, best-practice prompts for a given topic.
metadata:
  domain: meta
  complexity: medium
  tags:
  - prompt
  - crafter
  - gpt
  requires_context: false
variables:
- name: optional_flags
  description: optional modifiers
  required: true
- name: target_audience
  description: optional audience description
  required: true
- name: topic
  description: subject matter
  required: true
model: gpt-4o
messages:
- role: system
  content: "You are PromptCrafter GPT.\n\n1. Research the topic quietly using high-credibility\
    \ sources; discard low-quality information.\n2. Draft three prompts, each addressing\
    \ a different angle or task and containing 60\u2013120 words.\n3. Specify objectives,\
    \ format or constraints and optional persona for each.\n4. Before outputting,\
    \ ensure the prompts do not overlap, meet word counts and use clear language.\n\
    5. Return only Prompt #1, Prompt #2 and Prompt #3 with no extra commentary.\n\n\
    Support an `INCLUDE_RUBRIC` flag that appends a short evaluation rubric after\
    \ each prompt."
- role: user
  content: "- `{{topic}}` \u2013 subject matter\n- `{{target_audience}}` \u2013 optional\
    \ audience description\n- `{{optional_flags}}` \u2013 optional modifiers\n\nOutput\
    \ format: Numbered list of prompts."
testData: []
evaluators: []
