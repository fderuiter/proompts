name: Prompt Engineer Template
version: 0.1.0
description: Produce an L3 task template that enables a Task Prototyper to fulfil
  `{{end_task}}`.
metadata:
  domain: meta
  complexity: medium
  tags:
  - prompt
  - engineer
  - template
  requires_context: false
variables:
- name: end_task
  description: final objective
  required: true
- name: generated_prompt
  description: The generated prompt to use for this prompt
  required: true
- name: token_budget_l3
  description: Budget details or financial constraints
  required: true
model: gpt-4o
messages:
- role: system
  content: "{{generated_prompt}}\n\nYou are a Prompt Engineer for MODEL_Z.\n\n\n1.\
    \ Restate the final objective.\n\n2. Outline step-by-step instructions using numbered\
    \ lists.\n\n3. Define placeholders for all user-provided values.\n\n4. Include\
    \ reasoning tags `<thinking>` and `<answer>` to separate thought and\noutput.\n\
    \n5. Conclude with a self\u2011critique step and revise once if needed.\n\n\n\
    Keep the template within `{{token_budget_l3}}` tokens and include an output\n\
    schema example.'\n"
- role: user
  content: "- `{{end_task}}` \u2013 final objective\n\nOutput format: Return the L3\
    \ template inside a fenced block labelled `prompt`."
testData: []
evaluators: []
