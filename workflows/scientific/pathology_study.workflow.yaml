name: Preclinical Pathology Study Workflow
description: A workflow to design a pathology study protocol, evaluate the device-tissue
  interface, and plan the slide reporting. This follows the sequence in the pathology_prompts
  directory.
inputs:
- name: study_details
  description: A summary of the medical device and the objectives of the pathology
    study.
steps:
- step_id: design_protocol
  prompt_file: prompts/scientific/pathology/pathology_study_workflow/01_study_protocol_outline.prompt.md
  map_inputs:
    study_details: '{{inputs.study_details}}'
- step_id: evaluate_interface
  prompt_file: prompts/scientific/pathology/pathology_study_workflow/02_device_tissue_interface_evaluation.prompt.md
  map_inputs:
    study_protocol: '{{steps.design_protocol.output}}'
- step_id: plan_reporting
  prompt_file: prompts/scientific/pathology/pathology_study_workflow/03_slides_and_reporting_workflow.prompt.md
  map_inputs:
    interface_evaluation: '{{steps.evaluate_interface.output}}'
testData:
- inputs:
    study_details: Sample study_details
version: 0.1.0
metadata:
  domain: scientific
  topic: pathology_study
  complexity: medium
  tags: []
