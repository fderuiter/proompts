name: Clinical Prompts Workflow
description: A workflow to generate a CRF shell, audit it, and create a CDASH mapping
  guide.
inputs:
- name: protocol_summary
  description: A summary of the protocol to generate the CRF shell.
- name: variable_list
  description: A list of variables for the CDASH mapping guide.
steps:
- step_id: crf_shell
  prompt_file: prompts/clinical/forms/clinical_prompts_workflow/01_crf_shell_generator.prompt.md
  map_inputs:
    input: '{{inputs.protocol_summary}}'
- step_id: quality_audit
  prompt_file: prompts/clinical/forms/clinical_prompts_workflow/02_crf_quality_auditor.prompt.md
  map_inputs:
    input: '{{steps.crf_shell.output}}'
- step_id: cdash_mapping
  prompt_file: prompts/clinical/forms/clinical_prompts_workflow/03_cdash_mapping_completion_guide.prompt.md
  map_inputs:
    input: '{{inputs.variable_list}}'
testData:
- inputs:
    variable_list: Sample variable_list
    protocol_summary: Sample protocol_summary
version: 0.1.0
metadata:
  domain: clinical
  topic: clinical_prompts
  complexity: medium
  tags: []
