name: Protocol Workflow
description: A workflow to create, review, and refine a clinical trial protocol.
inputs:
- name: summary_sheet
  description: A one-page summary of the study to create the protocol.
- name: process_information
  description: Scope, audience, and regulatory context for the SOP.
- name: condition
  description: The disease or study condition for protocol section refinement.
- name: draft_section
  description: The current text of the protocol section to be refined.
steps:
- step_id: protocol_creator
  prompt_file: prompts/clinical/protocol/protocol_workflow/01_clinical_trial_protocol_creator.prompt.md
  map_inputs:
    summary_sheet: '{{inputs.summary_sheet}}'
- step_id: sop_architect
  prompt_file: prompts/clinical/protocol/protocol_workflow/02_ultimate_sop_architect.prompt.md
  map_inputs:
    process_information: '{{inputs.process_information}}'
- step_id: protocol_reviewer
  prompt_file: prompts/clinical/protocol/protocol_workflow/03_protocol_reviewer_gap_analysis_coach.prompt.md
  map_inputs:
    protocol_text_or_nct: '{{steps.protocol_creator.output}}'
- step_id: protocol_refinement
  prompt_file: prompts/clinical/protocol/protocol_workflow/04_protocol_section_refinement.prompt.md
  map_inputs:
    condition: '{{inputs.condition}}'
    draft_section: '{{inputs.draft_section}}'
testData:
- inputs:
    condition: Sample condition
    draft_section: Sample draft_section
    summary_sheet: Sample summary_sheet
    process_information: Sample process_information
version: 0.1.0
metadata:
  domain: clinical
  topic: protocol
  complexity: medium
  tags: []
