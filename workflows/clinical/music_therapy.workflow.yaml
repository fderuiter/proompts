name: Compassionate Music Therapy Workflow
description: A 4-step workflow to deconstruct venting, plan a therapeutic arc, compose
  a musical blueprint, and write lyrics.
inputs:
- name: venting_text
  description: The user's venting text to analyze.
steps:
- step_id: compassionate_analyst
  prompt_file: prompts/clinical/therapy/music_therapy_workflow/01_compassionate_analyst.prompt.md
  map_inputs:
    venting_text: '{{inputs.venting_text}}'
- step_id: iso_strategist
  prompt_file: prompts/clinical/therapy/music_therapy_workflow/02_iso_strategist.prompt.md
  map_inputs:
    psychological_profile: '{{steps.compassionate_analyst.output}}'
- step_id: sonic_architect
  prompt_file: prompts/clinical/therapy/music_therapy_workflow/03_sonic_architect.prompt.md
  map_inputs:
    psychological_profile: '{{steps.compassionate_analyst.output}}'
    therapeutic_arc: '{{steps.iso_strategist.output}}'
- step_id: lyricist
  prompt_file: prompts/clinical/therapy/music_therapy_workflow/04_lyricist.prompt.md
  map_inputs:
    psychological_profile: '{{steps.compassionate_analyst.output}}'
    therapeutic_arc: '{{steps.iso_strategist.output}}'
    musical_blueprint: '{{steps.sonic_architect.output}}'
testData:
- inputs:
    venting_text: Sample venting_text
version: 0.1.0
metadata:
  domain: clinical
  topic: music_therapy
  complexity: medium
  tags: []
