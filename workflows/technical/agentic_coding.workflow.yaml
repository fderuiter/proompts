name: 'Agentic Coding: From Idea to Epics'
description: A workflow that takes a product concept, generates a product brief, and
  then creates project epics from that brief.
inputs:
- name: product_concept
  description: A short description of the product idea to be developed.
steps:
- step_id: generate_product_brief
  prompt_file: prompts/technical/software_engineering/lifecycle/agentic_coding_workflow/01_product_brief.prompt.yaml
  map_inputs:
    vision: '{{inputs.product_concept}}'
    features: TBD
    architecture: TBD
    context_notes: None
- step_id: create_project_epics
  prompt_file: prompts/technical/software_engineering/lifecycle/agentic_coding_workflow/02_project_brief_epic.prompt.yaml
  map_inputs:
    project_description: '{{steps.generate_product_brief.output}}'
    key_features: TBD
    data_models: TBD
    business_rules: TBD
    success_metrics: TBD
testData:
- inputs:
    product_concept: Sample product_concept
version: 0.1.0
metadata:
  domain: technical
  topic: agentic_coding
  complexity: medium
  tags: []
