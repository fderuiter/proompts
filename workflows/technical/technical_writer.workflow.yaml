name: Technical Writer Workflow
description: A workflow for drafting a CSR results and safety section, an Investigator's
  Brochure summary of changes, and an SAE reporting SOP.
inputs:
- name: study_context
- name: sponsor_requirements
steps:
- step_id: csr_section
  prompt_file: prompts/technical/technical_writing/technical_writer_workflow/01_csr_results_safety_section.prompt.yaml
  map_inputs: {}
- step_id: ib_summary
  prompt_file: prompts/technical/technical_writing/technical_writer_workflow/02_ib_detailed_soc.prompt.yaml
  map_inputs: {}
- step_id: sae_sop
  prompt_file: prompts/technical/technical_writing/technical_writer_workflow/03_sae_reporting_sop.prompt.yaml
  map_inputs:
    study_context: '{{ inputs.study_context }}'
    sponsor_requirements: '{{ inputs.sponsor_requirements }}'
testData:
- inputs:
    study_context: Sample study_context
    sponsor_requirements: Sample sponsor_requirements
version: 0.1.0
metadata:
  domain: technical
  topic: technical_writer
  complexity: medium
  tags: []
