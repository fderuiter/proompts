repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.32.0
    hooks:
      - id: yamllint
        args: [--strict]

  - repo: local
    hooks:
      - id: promptops-validate
        name: Validate and Format Prompts
        entry: uv run promptops validate
        language: system
        files: ^(prompts|workflows)/.*
        pass_filenames: true

      - id: promptops-docs
        name: Update Docs Index
        entry: uv run promptops docs
        language: system
        files: ^(prompts|workflows)/.*
        pass_filenames: false
metadata:
  domain: general
  complexity: low
  tags:
    - skill
  requires_context: false
