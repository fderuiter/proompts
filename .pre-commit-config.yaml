repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.32.0
    hooks:
      - id: yamllint
        args: [--strict]

  - repo: local
    hooks:
      - id: check-bypasses
        name: Check for raw filesystem/YAML bypasses
        entry: python3 scripts/check_bypasses.py
        language: python
        types: [python]
        pass_filenames: true

      - id: promptops-validate
        name: Validate and Format Prompts
        entry: uv run promptops validate --strict
        language: system
        files: ^(prompts|workflows)/.*
        pass_filenames: true

      - id: promptops-docs
        name: Update Docs Index
        entry: uv run promptops docs
        language: system
        files: ^(prompts|workflows)/.*
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      - id: ruff
        args: [ --config=promptops/ruff.toml ]
        files: ^promptops/.*\.py$
      - id: ruff
        name: ruff (tools)
        args: [ --config=tools/ruff.toml ]
        files: ^tools/.*\.py$
      - id: ruff
        name: ruff (studio)
        args: [ --config=studio/ruff.toml ]
        files: ^studio/.*\.py$
